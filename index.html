<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cultivate</title>

<!-- PWA: installable app metadata -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7a4b2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cultivate">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">

<!-- Firebase (accounts + cross-device sync + reminders; app still works in guest/local-only mode without it) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<style>
  :root{
    --bg:#faf7f2;
    --card:#ffffff;
    --ink:#2b2620;
    --ink-soft:#6b6255;
    --line:#e7ded0;
    --accent:#7a4b2e;
    --accent-soft:#f0e4d4;
    --good:#3f7a4f;
    --good-soft:#e5f2e7;
    --skip:#b8860b;
    --skip-soft:#faf0d8;
    --bad:#a83e3e;
    --bad-soft:#f7e3e3;
    --shadow: 0 1px 3px rgba(40,30,10,0.08), 0 1px 2px rgba(40,30,10,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.4;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  }
  #app{max-width:1180px; margin:0 auto; padding:24px 20px 80px;}
  header.top{display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:18px;}
  header.top h1{font-size:1.5rem; margin:0; font-weight:700;}
  header.top .sub{color:var(--ink-soft); font-size:0.9rem;}
  .sync-pill{
    display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; font-size:0.78rem; font-weight:700; margin-top:6px; margin-right:6px;
  }
  .sync-pill.synced{background:var(--good-soft); color:var(--good);}
  .sync-pill.offline{background:var(--skip-soft); color:var(--skip);}
  .sync-pill.unconfigured{background:var(--accent-soft); color:var(--accent);}
  .sync-pill.error{background:var(--bad-soft); color:var(--bad);}
  .checkin-banner{
    background:var(--skip-soft); border:1px solid var(--skip); border-radius:10px; padding:14px 16px;
    font-size:0.88rem; margin-bottom:18px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
  }
  nav.tabs{display:flex; gap:6px; margin-bottom:22px; border-bottom:1px solid var(--line); flex-wrap:wrap;}
  nav.tabs button{
    background:none; border:none; padding:10px 16px; font-size:0.95rem; cursor:pointer;
    color:var(--ink-soft); border-bottom:2px solid transparent; font-weight:600;
  }
  nav.tabs button.active{color:var(--accent); border-bottom-color:var(--accent);}
  .toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
  .toolbar input[type=date]{
    padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; background:var(--card);
  }
  .btn{
    padding:7px 14px; border-radius:8px; border:1px solid var(--line); background:var(--card);
    cursor:pointer; font-size:0.85rem; font-weight:600; color:var(--ink);
  }
  .btn:hover{background:var(--accent-soft);}
  .btn.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  .btn.primary:hover{opacity:0.9;}
  .btn.primary:disabled{opacity:0.6; cursor:default;}
  .btn.danger{color:var(--bad); border-color:var(--bad-soft);}
  .btn.small{padding:4px 10px; font-size:0.78rem;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:14px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px;
    box-shadow:var(--shadow); border-left:5px solid var(--cat-color, var(--accent));
  }
  .card .cat-name{font-weight:700; font-size:0.95rem; margin-bottom:4px;}
  .card .due{font-size:1.15rem; font-weight:700; margin:6px 0 2px;}
  .card .meta{color:var(--ink-soft); font-size:0.8rem; margin-bottom:12px;}
  .card .actions{display:flex; gap:8px; flex-wrap:wrap;}
  .status-pill{
    display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:999px;
    font-size:0.78rem; font-weight:700; margin-bottom:10px;
  }
  .status-pill.complete{background:var(--good-soft); color:var(--good);}
  .status-pill.skipped{background:var(--skip-soft); color:var(--skip);}
  .today-log-list{font-size:0.78rem; color:var(--ink-soft); margin-top:8px;}
  .today-log-list div{margin-bottom:2px;}
  table.logtable{width:100%; border-collapse:collapse; font-size:0.82rem;}
  table.logtable th, table.logtable td{
    border:1px solid var(--line); padding:6px 8px; text-align:left; white-space:nowrap;
  }
  table.logtable th{background:var(--accent-soft); position:sticky; top:0;}
  table.logtable td.cell-complete{color:var(--good); font-weight:600;}
  table.logtable td.cell-skipped{color:var(--skip); font-weight:600;}
  .log-scroll{overflow-x:auto; border:1px solid var(--line); border-radius:10px;}
  details.month-group{margin-bottom:12px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:0 0 4px;}
  details.month-group summary{
    cursor:pointer; font-weight:700; padding:12px 16px; list-style:none; display:flex; justify-content:space-between;
  }
  details.month-group summary::-webkit-details-marker{display:none;}
  .dash-summary{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:12px; margin-bottom:26px;}
  .dash-summary .stat{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; box-shadow:var(--shadow);}
  .dash-summary .stat .num{font-size:1.6rem; font-weight:800; color:var(--accent);}
  .dash-summary .stat .label{font-size:0.78rem; color:var(--ink-soft); font-weight:600;}
  .cat-block{margin-bottom:26px;}
  .cat-block h3{
    display:flex; align-items:center; gap:8px; font-size:1.05rem; margin-bottom:2px;
  }
  .cat-block h3 .swatch{width:12px; height:12px; border-radius:3px; display:inline-block;}
  .cat-block .cat-sub{color:var(--ink-soft); font-size:0.8rem; margin-bottom:10px;}
  .book-row{display:grid; grid-template-columns:170px 1fr 90px 70px; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid var(--line); font-size:0.85rem;}
  .book-row:last-child{border-bottom:none;}
  .bar-track{background:#efe8db; border-radius:6px; height:10px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:6px;}
  .passes-badge{
    background:var(--accent-soft); color:var(--accent); font-weight:700; font-size:0.72rem;
    padding:2px 8px; border-radius:999px; text-align:center;
  }
  footer.app-footer{margin-top:40px; padding-top:16px; border-top:1px solid var(--line); color:var(--ink-soft); font-size:0.78rem; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  .empty-note{color:var(--ink-soft); font-size:0.85rem; padding:20px; text-align:center;}
  input[type=file]{display:none;}
  .settings-box{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; max-width:640px; box-shadow:var(--shadow); margin-bottom:20px;}
  .settings-box h3{margin-top:0;}
  .settings-box ol{padding-left:20px; font-size:0.88rem; color:var(--ink-soft);}
  .settings-box ol li{margin-bottom:6px;}
  .settings-box code{background:var(--accent-soft); padding:1px 5px; border-radius:4px;}

  /* ---- Groups ---- */
  .group-tabs{display:flex; gap:4px; margin-bottom:16px; background:var(--accent-soft); border-radius:10px; padding:4px; max-width:640px; flex-wrap:wrap;}
  .group-tabs button{
    flex:1; min-width:fit-content; background:none; border:none; padding:8px 14px; border-radius:8px;
    font-size:0.85rem; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .group-tabs button.active{background:var(--card); color:var(--accent); box-shadow:var(--shadow);}
  .role-badge{
    display:inline-flex; align-items:center; padding:2px 9px; border-radius:999px;
    font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.02em;
  }
  .role-badge.owner{background:var(--accent-soft); color:var(--accent);}
  .role-badge.admin{background:var(--skip-soft); color:var(--skip);}
  .role-badge.member{background:#efe8db; color:var(--ink-soft);}
  .book-picker{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(148px,1fr)); gap:7px;
    max-height:200px; overflow-y:auto; border:1px solid var(--line); border-radius:10px;
    padding:10px; background:var(--bg);
  }
  .book-tile{
    position:relative; display:flex; align-items:center; justify-content:center;
    padding:7px 12px; border-radius:999px; border:1.5px solid transparent;
    cursor:pointer; font-size:0.8rem; font-weight:700; text-align:center;
    background:var(--tile-soft, var(--accent-soft)); color:var(--tile-color, var(--accent));
    transition:background .15s ease, color .15s ease, box-shadow .15s ease, transform .1s ease;
  }
  .book-tile:hover{box-shadow:var(--shadow); transform:translateY(-1px);}
  .book-tile input{position:absolute; opacity:0; width:0; height:0; margin:0; pointer-events:none;}
  .book-tile:has(input:checked){
    background:var(--tile-color, var(--accent)); color:#fff; box-shadow:var(--shadow);
  }
  .book-tile-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .reading-preset-row{display:flex; gap:8px; margin:6px 0 10px; flex-wrap:wrap;}
  .reading-summary-line{font-size:0.82rem; color:var(--ink-soft); margin-top:2px;}
  .book-chip-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:2px;}
  .book-chip{
    display:inline-flex; align-items:center; gap:5px; background:var(--accent-soft); color:var(--accent);
    border-radius:999px; padding:4px 6px 4px 12px; font-size:0.78rem; font-weight:600;
  }
  .book-chip .chip-remove{
    background:none; border:none; color:inherit; font-size:0.95rem; line-height:1; cursor:pointer;
    padding:2px 6px; border-radius:50%; opacity:0.7;
  }
  .book-chip .chip-remove:hover{opacity:1; background:rgba(0,0,0,0.06);}
  .book-picker-details{margin-top:10px; border:1px solid var(--line); border-radius:10px; padding:2px 14px;}
  .book-picker-details summary{
    cursor:pointer; font-size:0.85rem; font-weight:600; padding:10px 0; color:var(--accent);
    list-style:none;
  }
  .book-picker-details summary::-webkit-details-marker{display:none;}
  .book-picker-details summary::before{content:'▸ '; font-size:0.75rem;}
  .book-picker-details[open] summary::before{content:'▾ '; }
  .book-picker-body{padding-bottom:14px;}
  .book-picker-body input{width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.85rem; font-family:inherit; margin-bottom:10px;}
  .book-picker-section{margin-bottom:12px;}
  .book-picker-section:last-child{margin-bottom:0;}
  .book-picker-section-label{font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); margin-bottom:5px;}
  .empty-note-inline{font-size:0.8rem; color:var(--ink-soft); padding:8px 0;}
  .group-row{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--line);}
  .group-row:last-child{border-bottom:none;}
  .group-row .name{font-weight:700;}
  .group-row .meta{font-size:0.8rem; color:var(--ink-soft); margin-top:2px;}
  .group-dir-header{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  .group-dir-header h3{margin:0;}
  .group-search-row{margin-bottom:14px;}
  .group-search-row input{width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; font-family:inherit;}
  .group-card-list{display:flex; flex-direction:column; gap:10px;}
  .group-card{
    display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--line);
    border-radius:12px; background:var(--bg);
  }
  .group-card .group-icon{flex-shrink:0;}
  .group-card .group-info{flex:1; min-width:0;}
  .group-card .group-info .name{font-weight:700; font-size:0.95rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .group-card .group-info .meta{font-size:0.78rem; color:var(--ink-soft); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .group-card .group-action{flex-shrink:0;}
  .group-card .pending-note{font-size:0.78rem; color:var(--ink-soft); white-space:nowrap;}
  .group-detail-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:6px;}
  .group-detail-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;}
  .group-message{padding:10px 0; border-bottom:1px solid var(--line);}
  .group-message:last-child{border-bottom:none;}
  .group-message .who{font-size:0.78rem; color:var(--ink-soft); margin-bottom:3px;}
  .group-message .who strong{color:var(--ink);}
  .group-message .body{font-size:0.92rem; line-height:1.5;}
  .group-member-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .group-member-row:last-child{border-bottom:none;}
  .group-member-row .name{flex:1; cursor:pointer;}
  .group-week-card{background:var(--accent-soft); border:1px solid var(--accent); border-radius:10px; padding:14px 16px; margin-bottom:16px;}
  .group-week-card .week-label{font-weight:700; margin-bottom:4px;}
  .invite-link-row{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:8px;}
  .invite-link-row input{flex:1; min-width:180px; padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.78rem; background:var(--bg);}
  .install-banner{
    background:var(--accent-soft); border:1px solid var(--accent); border-radius:10px; padding:12px 16px;
    font-size:0.85rem; margin-bottom:18px; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .auth-wrap{max-width:420px; margin:60px auto; padding:0 20px;}
  .auth-brand{text-align:center; margin-bottom:24px;}
  .auth-brand .name{font-size:1.6rem; font-weight:800; color:var(--accent);}
  .auth-brand .tag{color:var(--ink-soft); font-size:0.85rem; margin-top:4px;}
  .auth-error{color:var(--bad); font-size:0.85rem; background:var(--bad-soft); padding:8px 12px; border-radius:8px; margin-bottom:14px;}
  .auth-field label{font-size:0.8rem; font-weight:600; display:block; margin-bottom:4px;}
  .auth-field input{width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:12px; font-size:0.9rem; font-family:inherit;}
  .auth-links{text-align:center; margin-top:14px; font-size:0.82rem; display:flex; flex-direction:column; gap:8px;}
  .auth-links a{color:var(--accent); text-decoration:none;}
  .auth-links a.muted{color:var(--ink-soft);}
  .onboard-wrap{max-width:900px; margin:0 auto;}
  .plan-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px; margin:20px 0;}
  .plan-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:10px;}
  .plan-card h4{margin:0; font-size:1.05rem;}
  .plan-card p{margin:0; font-size:0.82rem; color:var(--ink-soft); flex-grow:1;}
  .plan-card .swatches{display:flex; gap:4px; flex-wrap:wrap;}
  .plan-card .swatches span{width:14px; height:14px; border-radius:4px; display:inline-block;}
  .builder-cat{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:var(--shadow);}
  .builder-cat-head{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;}
  .builder-cat-head input[type=text]{flex:1; min-width:160px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.95rem; font-weight:700; font-family:inherit;}
  .color-swatch-row{display:flex; gap:5px; flex-wrap:wrap;}
  .color-swatch-row button{width:20px; height:20px; border-radius:5px; border:2px solid transparent; cursor:pointer; padding:0;}
  .color-swatch-row button.selected{border-color:var(--ink);}
  .builder-book-row{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:5px 0; border-bottom:1px solid var(--line); font-size:0.85rem;}
  .builder-book-row:last-child{border-bottom:none;}
  .builder-add-row{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .builder-add-row select{flex:1; min-width:180px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.85rem; font-family:inherit;}
  .journal-form{max-width:none;}
  .journal-tag-picker{display:flex; gap:6px; flex-wrap:wrap;}
  .journal-tag-btn{
    padding:7px 12px; border-radius:999px; border:2px solid var(--tc); background:#fff; color:var(--tc);
    font-size:0.8rem; font-weight:700; cursor:pointer;
  }
  .journal-tag-btn.selected{background:var(--tc); color:#fff;}
  .journal-tag{
    display:inline-flex; padding:3px 10px; border-radius:999px; font-size:0.72rem; font-weight:700;
  }
  .journal-entry{border-bottom:1px solid var(--line); padding:12px 0;}
  .journal-entry:last-child{border-bottom:none;}
  .journal-entry-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .journal-date{font-size:0.8rem; color:var(--ink-soft); font-weight:600;}
  .journal-title{font-weight:700; margin-bottom:4px;}
  .journal-content{font-size:0.88rem; color:var(--ink); white-space:pre-wrap;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------- Book library (canonical 66 books) ---------------- */
const BOOK_LIBRARY = [
  {name:'Genesis',chapters:50},{name:'Exodus',chapters:40},{name:'Leviticus',chapters:27},{name:'Numbers',chapters:36},{name:'Deuteronomy',chapters:34},
  {name:'Joshua',chapters:24},{name:'Judges',chapters:21},{name:'Ruth',chapters:4},{name:'1 Samuel',chapters:31},{name:'2 Samuel',chapters:24},
  {name:'1 Kings',chapters:22},{name:'2 Kings',chapters:25},{name:'1 Chronicles',chapters:29},{name:'2 Chronicles',chapters:36},
  {name:'Ezra',chapters:10},{name:'Nehemiah',chapters:13},{name:'Esther',chapters:10},
  {name:'Job',chapters:42},{name:'Psalms',chapters:150},{name:'Proverbs',chapters:31},{name:'Ecclesiastes',chapters:12},{name:'Song of Solomon',chapters:8},
  {name:'Isaiah',chapters:66},{name:'Jeremiah',chapters:52},{name:'Lamentations',chapters:5},{name:'Ezekiel',chapters:48},{name:'Daniel',chapters:12},
  {name:'Hosea',chapters:14},{name:'Joel',chapters:3},{name:'Amos',chapters:9},{name:'Obadiah',chapters:1},{name:'Jonah',chapters:4},{name:'Micah',chapters:7},
  {name:'Nahum',chapters:3},{name:'Habakkuk',chapters:3},{name:'Zephaniah',chapters:3},{name:'Haggai',chapters:2},{name:'Zechariah',chapters:14},{name:'Malachi',chapters:4},
  {name:'Matthew',chapters:28},{name:'Mark',chapters:16},{name:'Luke',chapters:24},{name:'John',chapters:21},{name:'Acts',chapters:28},
  {name:'Romans',chapters:16},{name:'1 Corinthians',chapters:16},{name:'2 Corinthians',chapters:13},{name:'Galatians',chapters:6},{name:'Ephesians',chapters:6},
  {name:'Philippians',chapters:4},{name:'Colossians',chapters:4},{name:'1 Thessalonians',chapters:5},{name:'2 Thessalonians',chapters:3},
  {name:'1 Timothy',chapters:6},{name:'2 Timothy',chapters:4},{name:'Titus',chapters:3},{name:'Philemon',chapters:1},{name:'Hebrews',chapters:13},
  {name:'James',chapters:5},{name:'1 Peter',chapters:5},{name:'2 Peter',chapters:3},{name:'1 John',chapters:5},{name:'2 John',chapters:1},{name:'3 John',chapters:1},
  {name:'Jude',chapters:1},{name:'Revelation',chapters:22}
];
const BIBLE_TOTAL_CHAPTERS = BOOK_LIBRARY.reduce((s,b)=>s+b.chapters,0);
function chaptersFor(bookName){ const b = BOOK_LIBRARY.find(x=>x.name===bookName); return b ? b.chapters : 0; }
function bookObj(bookName){ return {name: bookName, chapters: chaptersFor(bookName)}; }

const COLOR_PALETTE = ['#7a4b2e','#8a5a2b','#2f6b4f','#3d6b8a','#4a5f8a','#8a3d5c','#a34b3e','#6b4f8a','#b8860b','#5c5248','#4b6b3a','#6b3a5c'];
// A soft/tinted counterpart for each COLOR_PALETTE entry, same index-for-index, the same way
// --accent pairs with --accent-soft elsewhere in the app — used for pill-style tags (like the
// book picker) that need a light unselected fill and a solid selected fill of the same hue.
const COLOR_PALETTE_SOFT = ['#f0e4d4','#f2e6d6','#e1efe7','#e0ecf2','#e4e8f2','#f3e2ea','#f6e5e2','#eae3f2','#faf0d8','#eae6e0','#e5eee0','#f0e2ec'];
function hashIndex(str, len){
  str = str || '';
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h % len;
}
// Deterministic color for things that don't have a saved profile color of their own (e.g. group
// icons, book tags) — same name always maps to the same palette entry, so a card's color stays stable.
function colorForName(str){ return COLOR_PALETTE[hashIndex(str, COLOR_PALETTE.length)]; }
function softColorForName(str){ return COLOR_PALETTE_SOFT[hashIndex(str, COLOR_PALETTE_SOFT.length)]; }

// Now that other people's text (group discussion messages, viewed profiles) renders on YOUR
// screen — not just your own private journal — anything sourced from another user must be
// escaped before going into innerHTML, or one user could break/inject markup into another's view.
function escapeHtml(s){
  return (s==null ? '' : String(s)).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function cloneCategories(categories){
  return categories.map(c => ({ id:c.id, name:c.name, color:c.color, books: c.books.map(b=>({name:b.name, chapters:b.chapters})) }));
}
function deriveCategory(cat){
  let flat=[], ranges=[];
  cat.books.forEach(b=>{
    const start=flat.length;
    for(let ch=1; ch<=b.chapters; ch++) flat.push({book:b.name, chapter:ch});
    ranges.push({name:b.name, chapters:b.chapters, start, end:flat.length});
  });
  return { ...cat, flat, bookRanges:ranges, total:flat.length };
}

function defaultState(){

    memorization:[], extraLog:[], checkins:[],
    profile:{ displayName:'', bio:'', color: COLOR_PALETTE[0], photo:'', aboutMe:'', location:'', favoriteSong:'', lifeVerse:'', visibility:'friends' }
  };
}
// Photos are resized/compressed client-side to a small square thumbnail before ever reaching
// here (see the profilePhotoInput handler in attachEvents), so 200,000 chars (~150KB, generous
// for a base64 JPEG this small) is just a sanity ceiling against something going wrong upstream —
// not the expected size in normal use.
const PROFILE_PHOTO_MAX_LEN = 200000;
function sanitizeProfile(p){
  if(!p || typeof p !== 'object') return defaultState().profile;
  const photo = typeof p.photo === 'string' && p.photo.startsWith('data:image/') && p.photo.length <= PROFILE_PHOTO_MAX_LEN
    ? p.photo : '';
  return {
    displayName: typeof p.displayName === 'string' ? p.displayName.slice(0,60) : '',
    bio: typeof p.bio === 'string' ? p.bio.slice(0,240) : '',
    color: typeof p.color === 'string' ? p.color : COLOR_PALETTE[0],
    photo,
    aboutMe: typeof p.aboutMe === 'string' ? p.aboutMe.slice(0,1000) : '',
    location: typeof p.location === 'string' ? p.location.slice(0,80) : '',
    favoriteSong: typeof p.favoriteSong === 'string' ? p.favoriteSong.slice(0,120) : '',
    lifeVerse: typeof p.lifeVerse === 'string' ? p.lifeVerse.slice(0,40) : '',
    // 'friends' (default) = only accepted friends can view the fuller profile. 'public' = any
    // signed-in Cultivate user can view it (still never journal/log data — just the profile fields).
    visibility: p.visibility === 'public' ? 'public' : 'friends'
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return {
      cursors: parsed.cursors || {},
      cycles: parsed.cycles || {},
      log: Array.isArray(parsed.log) ? parsed.log : [],
      plan: parsed.plan || null,
      journal: Array.isArray(parsed.journal) ? parsed.journal : [],
      readingApp: READING_APPS[parsed.readingApp] ? parsed.readingApp : 'biblegateway',
      memorization: Array.isArray(parsed.memorization) ? parsed.memorization : [],
      extraLog: Array.isArray(parsed.extraLog) ? parsed.extraLog : [],
      checkins: Array.isArray(parsed.checkins) ? parsed.checkins : [],
      profile: sanitizeProfile(parsed.profile)
    };
  }catch(e){ return defaultState(); }
}
function saveState(opts){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(!opts || !opts.skipSync) scheduleRemoteSync();
}
function ensurePlanReady(){
  if(state.plan && Array.isArray(state.plan.categories) && state.plan.categories.length){
    setActivePlan(state.plan.categories);
  } else if(state.log.length > 0){
    // Existing activity but no plan on record (older data) -> assume the original default plan.
    state.plan = { presetId:'balanced10', categories: cloneCategories(PRESET_PLANS.balanced10.categories) };
    setActivePlan(state.plan.categories);
    saveState();
  } else {
    ACTIVE_CATEGORIES = [];
  }
}
function needsPlanOnboarding(){
  return !state.plan && state.log.length === 0;
}
function applyPlan(presetIdOrCustom, categories){
  state.plan = { presetId: presetIdOrCustom, categories: cloneCategories(categories) };
  state.cursors = {}; state.cycles = {};
  setActivePlan(state.plan.categories);
  saveState(); render();
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function daysBetween(isoA, isoB){
  const [ay,am,ad] = isoA.split('-').map(Number);
  const [by,bm,bd] = isoB.split('-').map(Number);
  const a = Date.UTC(ay,am-1,ad), b = Date.UTC(by,bm-1,bd);
  return Math.round((b-a)/86400000);
}
function fmtDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}

/* ---------------- Core actions ---------------- */
function getDue(catId){
  const cat = catById(catId);
  const idx = state.cursors[catId]||0;
  return cat.flat[idx % cat.total];
}
function logEntriesFor(catId, date){
  return state.log.filter(e=>e.categoryId===catId && e.date===date);
}
function lastActivityDate(){
  if(!state.log.length) return null;
  return state.log.reduce((max,e)=> e.date > max ? e.date : max, state.log[0].date);
}
function lastLogEntry(catId){
  for(let i=state.log.length-1;i>=0;i--){
    if(state.log[i].categoryId===catId) return {entry:state.log[i], index:i};
  }
  return null;
}
function completeReading(catId, date){
  const cat = catById(catId);
  const idx = state.cursors[catId]||0;
  const due = cat.flat[idx];
  state.log.push({date, categoryId:catId, book:due.book, chapter:due.chapter, status:'complete', ts:Date.now()});
  let next = idx+1;
  if(next >= cat.total){ next = 0; state.cycles[catId] = (state.cycles[catId]||0)+1; }
  state.cursors[catId] = next;
  saveState(); render();
}
function skipReading(catId, date){
  const cat = catById(catId);
  const idx = state.cursors[catId]||0;
  const due = cat.flat[idx];
  state.log.push({date, categoryId:catId, book:due.book, chapter:due.chapter, status:'skipped', ts:Date.now()});
  saveState(); render();
}
function undoLast(catId){
  const found = lastLogEntry(catId);
  if(!found) return;
  const { entry, index } = found;
  state.log.splice(index,1);
  if(entry.status==='complete'){
    const cat = catById(catId);
    let idx = state.cursors[catId]-1;
    if(idx < 0){
      idx = cat.total-1;
      state.cycles[catId] = Math.max(0, (state.cycles[catId]||0)-1);
    }
    state.cursors[catId] = idx;
  }
  saveState(); render();
}

function addJournalEntry(date, tag, content, title, reference){
  if(!JOURNAL_TAGS.includes(tag)) tag = 'prayer';
  const entry = {
    id: 'j' + Math.random().toString(36).slice(2,9) + Date.now().toString(36),
    date, tag,
    title: (title||'').trim(),
    content: (content||'').trim(),
    reference: (reference && reference.book) ? { book: reference.book, chapter: reference.chapter || null, verse: reference.verse || null } : null,
    ts: Date.now()
  };
  state.journal.push(entry);
  saveState(); render();
}
function formatReference(ref){
  if(!ref || !ref.book) return '';
  let out = ref.book;
  if(ref.chapter) out += ' ' + ref.chapter;
  if(ref.verse) out += ':' + ref.verse;
  return out;
}
function deleteJournalEntry(id){
  state.journal = state.journal.filter(e=>e.id!==id);
  saveState(); render();
}
function journalSorted(){
  return state.journal.slice().sort((a,b)=> a.date===b.date ? b.ts-a.ts : (a.date < b.date ? 1 : -1));
}

  return {
    year: yr,
    chaptersRead: yearLog.length,

  };
}

/* ---------------- Book stats for dashboard ---------------- */
function bookStats(cat){
  const idx = state.cursors[cat.id]||0;
  const cycles = state.cycles[cat.id]||0;
  return cat.bookRanges.map(b=>{
    let passes, progress;
    if(idx >= b.end){ passes = cycles+1; progress = 100; }
    else if(idx >= b.start && idx < b.end){ passes = cycles; progress = Math.round((idx-b.start)/b.chapters*100); }
    else { passes = cycles; progress = 0; }
    let lastDate = null;
    for(let i=state.log.length-1;i>=0;i--){
      const e = state.log[i];
      if(e.book===b.name && e.status==='complete'){ lastDate = e.date; break; }
    }
    return { ...b, passes, progress, lastDate };
  });
}

function subscribeToUserDoc(){

      syncPublicActivity(); ensureUserDirectory();
      return;
    }
    const data = snap.data();
    const isFirstSnapshot = !fbFirstSnapshotHandled;
    // Only treat "this looks like our own write" as a no-op AFTER the first snapshot of this
    // subscription. On the very first snapshot (right after signup/login), CLIENT_ID can coincidentally
    // match a write from earlier in the same page session (e.g. logging out and back in without a
    // reload) — that first snapshot must always be processed so the account's real cloud data loads.
    if(!isFirstSnapshot && data._writerId === CLIENT_ID){

        }

        pushStateNow(docRef); syncStatus='synced'; lastSyncedAt=Date.now(); render();
        syncPublicActivity(); ensureUserDirectory();
        return;
      }

      cursors: data.cursors || {},
      cycles: data.cycles || {},

      plan: data.plan || null,

// Names for a PENDING request's other party can't come from publicActivity — that collection
// is friend-gated (accepted friends only), so reading it for someone you're not yet connected to
// would just fail. userDirectory is the broadly-readable, name-only collection built for exactly
// this kind of lookup, so pending incoming/outgoing rows use it instead (no photo there by design —
// falls back to a colored initial until/unless the request is accepted).
let friendNameCache = {}; // uid -> displayName, for pending links
let friendsSubRetryCount = 0;
let friendsListenerError = ''; // surfaced in the Friends tab's troubleshooting panel, not just the console
function subscribeFriends(){
  if(!fbDb || !currentUser) return;
  if(friendsUnsub) friendsUnsub();
  friendsUnsub = fbDb.collection('friendLinks').where('userIds','array-contains',currentUser.uid)
    .onSnapshot(snap=>{
      friendsSubRetryCount = 0; // a good snapshot means the connection is healthy again
      friendsListenerError = '';
      friendLinksData = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      const acceptedUids = friendLinksData.filter(l=>l.status==='accepted').map(l=> l.userIds.find(u=>u!==currentUser.uid));
      const pendingUids = friendLinksData.filter(l=>l.status==='pending').map(l=> l.userIds.find(u=>u!==currentUser.uid));
      acceptedUids.forEach(uid=>{
        if(!friendActivityCache[uid]){
          fbDb.collection('publicActivity').doc(uid).get().then(doc=>{
            if(doc.exists){ friendActivityCache[uid] = doc.data(); render(); return; }
            // Deliberately NOT cached as a permanent "unknown" placeholder — that document tends
            // to simply not exist yet for someone who hasn't synced since this feature shipped.
            // Leaving the cache empty means this retries the next time the friends list refreshes
            // (reconnect, a new/removed connection, etc.) instead of showing "Unknown" forever
            // for the rest of the session.
          }).catch(()=>{});
        }
      });
      pendingUids.forEach(uid=>{
        if(!friendNameCache[uid]){
          fbDb.collection('userDirectory').doc(uid).get().then(doc=>{
            friendNameCache[uid] = doc.exists ? doc.data().displayName : '(unknown)';
            render();
          }).catch(()=>{});
        }
      });
      render();
    }, err=>{
      console.warn('friends listener error', err);
      friendsListenerError = (err && err.code) ? `${err.code}: ${err.message||''}` : String(err);
      render();
      // Without this, a single transient error (a permission hiccup, a brief network drop, the
      // kind of thing that can happen mid-way through changing Firestore data) kills this listener
      // PERMANENTLY for the rest of the session — Firestore does not auto-retry a failed onSnapshot,
      // and nothing was re-subscribing, so requests/friends would silently stop updating until the
      // user manually reloaded the page. Retry with backoff instead, capped so a persistent problem
      // (e.g. a genuine rules issue) doesn't retry forever.
      if(friendsSubRetryCount < 5 && currentUser){
        friendsSubRetryCount++;
        setTimeout(()=>{ if(currentUser) subscribeFriends(); }, 2000 * friendsSubRetryCount);
      }
    });
}
// Shared core: create the pending link doc once we already know the target uid.
function createFriendLink(targetUid){
  if(targetUid === currentUser.uid) return Promise.reject({ message: "That's your own account." });
  const linkId = friendLinkId(currentUser.uid, targetUid);
  const ref = fbDb.collection('friendLinks').doc(linkId);
  return ref.get().then(existing=>{
    if(existing.exists) throw { message: 'You already have a connection (or pending request) with this person.' };
    return ref.set({
      userIds: [currentUser.uid, targetUid].sort(),
      status:'pending', requestedBy: currentUser.uid, createdAt: Date.now()
    });
  });
}
function sendFriendRequest(email){

  const key = sanitizeEmailKey(email);
  // Single chained promise all the way through, so ANY failure at ANY step — including ones
  // that used to be an orphaned inner .then() with no .catch() — reliably lands in the one
  // .catch() at the bottom instead of leaving the button stuck on "Sending…" forever.
  fbDb.collection('emailIndex').doc(key).get().then(doc=>{
    if(!doc.exists) throw { message: 'No Cultivate account found with that email. Have they opened Cultivate and signed in at least once?' };
    return createFriendLink(doc.data().uid);
  }).then(()=>{
    friendRequestBusy = false; friendRequestEmail = ''; friendRequestSent = true; render();
  }).catch(err=>{
    friendRequestError = (err && err.message) || 'Something went wrong sending that request — check your connection and try again.';
    friendRequestBusy = false; render();
  });
}
function sendFriendRequestToUid(targetUid){
  friendRequestError = ''; friendRequestSent = false; render();
  createFriendLink(targetUid).then(()=>{
    friendRequestSent = true; render();
  }).catch(err=>{
    friendRequestError = (err && err.message) || 'Something went wrong sending that request.';
    render();
  });
}

function friendStatusWith(uid){
  const linkId = friendLinkId(currentUser.uid, uid);
  const link = friendLinksData.find(l=>l.id===linkId);

let viewedProfileUid = null;

/* ---------------- Friend search (search-as-you-type, by name or exact email) ---------------- */
let friendSearchQuery = '';
let friendSearchResults = [];
let friendSearchBusy = false;
let friendSearchToken = 0;
let friendSearchDebounce = null;
const FRIEND_SEARCH_LIMIT = 10;

// Firestore can only do prefix-range queries efficiently (">= q" / "<= q+"), which means
// typing "jo" would find "John" but never "Marjorie" — real substring/"contains" search has to
// happen client-side. The user base is still small, so the simplest reliable approach is to cache
// the whole (name-only, non-sensitive) userDirectory in memory and filter it in JS on every
// keystroke — instant results, true partial matching, and zero extra Firestore reads per character
// typed. Re-fetched at most once a minute, or whenever it's actually needed again after that.
let friendDirectoryCache = [];
let friendDirectoryCacheAt = 0;
let friendDirectoryLoading = null; // in-flight promise, so parallel callers share one fetch
function loadFriendDirectory(force){
  if(!fbDb || !currentUser) return Promise.resolve();
  const FRESH_MS = 60000;
  if(!force && friendDirectoryCache.length && (Date.now() - friendDirectoryCacheAt) < FRESH_MS){
    return Promise.resolve();
  }
  if(friendDirectoryLoading) return friendDirectoryLoading;
  friendDirectoryLoading = fbDb.collection('userDirectory').limit(500).get().then(snap=>{
    friendDirectoryCache = snap.docs.map(d=>{
      const data = d.data();
      const displayName = data.displayName || '';
      return { uid: d.id, displayName, displayNameLower: data.displayNameLower || displayName.toLowerCase() };
    });
    friendDirectoryCacheAt = Date.now();
    friendDirectoryLoading = null;
  }).catch(()=>{ friendDirectoryLoading = null; });
  return friendDirectoryLoading;
}
function searchFriends(queryText){
  friendSearchQuery = queryText;
  const q = queryText.trim();
  if(!q){ friendSearchResults = []; friendSearchBusy = false; render(); return; }
  const myToken = ++friendSearchToken;
  friendSearchBusy = true; render();
  const tasks = [];
  if(q.includes('@')){
    const key = sanitizeEmailKey(q);
    tasks.push(
      fbDb.collection('emailIndex').doc(key).get().then(doc=>{
        if(!doc.exists) return null;
        const uid = doc.data().uid;
        return fbDb.collection('userDirectory').doc(uid).get().then(dirDoc=>({
          uid, displayName: dirDoc.exists ? dirDoc.data().displayName : q
        }));
      }).catch(()=>null)
    );
  }
  const qLower = q.toLowerCase();
  tasks.push(
    loadFriendDirectory().then(()=>{
      const scored = [];
      friendDirectoryCache.forEach(entry=>{
        if(entry.uid === currentUser.uid) return;
        const idx = entry.displayNameLower.indexOf(qLower);
        if(idx === -1) return;
        // Names starting with what was typed rank above names that merely contain it somewhere
        // in the middle; shorter names break ties (they're closer to an exact match).
        const score = (idx === 0 ? 0 : 1000) + entry.displayName.length;
        scored.push({ uid: entry.uid, displayName: entry.displayName, score });
      });
      scored.sort((a,b)=> a.score - b.score);
      return scored.slice(0, FRIEND_SEARCH_LIMIT).map(r=>({ uid:r.uid, displayName:r.displayName }));
    })
  );
  Promise.all(tasks).then(resultsArrays=>{
    if(myToken !== friendSearchToken) return; // a newer keystroke already superseded this search
    const seen = new Set(); const merged = [];
    resultsArrays.flat().filter(Boolean).forEach(r=>{
      if(r.uid !== currentUser.uid && !seen.has(r.uid)){ seen.add(r.uid); merged.push(r); }
    });
    friendSearchResults = merged.slice(0, FRIEND_SEARCH_LIMIT);
    friendSearchBusy = false;
    render();
  });
}

/* ---------------- Groups (Bible studies, tables, devotion groups) ----------------
   Design notes, since this touches Firestore rules in a way that bit us once already this
   project (the friendLinks list-query bug): every LIST rule below is either (a) a blanket
   auth-only condition with zero dependency on the matched documents' data, or (b) a condition
   based only on a get() of a path derived from request.auth.uid (the CALLER's own membership
   doc) — never a condition that depends on each individual matched document's own fields. Both
   of those are things Firestore can prove hold for an entire query's potential result set, which
   is what made the friendLinks bug happen the first time (an ID-split rule couldn't be correlated
   with a query filtered on a different field). Single-document get/create/update/delete rules
   don't have this restriction at all — they can reference resource.data freely.

   Progress within a group (paced or free) is tracked as a single "cursor": how many chapters
   into the group's flattened reading outline this member has personally read. For a free-pace
   group that's the whole story. For a paced group, the SAME cursor is kept, but the group also
   has a chaptersPerWeek + startDate, so "this week's assigned reading" can be computed on the fly
   without needing a separately-stored week-by-week schedule.
------------------------------------------------------------------------------- */
function generateInviteCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous 0/O/1/I
  let out = '';
  for(let i=0;i<8;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}
// Turns an ordered list of {book, chapters} into a flat ordered list of {book, chapter} —
// the group's actual reading sequence, used identically whether the group is paced or free.
function flattenOutline(outline){
  const out = [];
  (outline||[]).forEach(entry=>{
    const total = entry.chapters || chaptersFor(entry.book);
    for(let c=1;c<=total;c++) out.push({ book: entry.book, chapter: c });
  });
  return out;
}
function outlineTotalChapters(outline){
  return (outline||[]).reduce((s,e)=> s + (e.chapters || chaptersFor(e.book)), 0);
}
// Which week (0-indexed) a paced group is currently on, based on its start date.
function currentGroupWeekIndex(startDate){
  if(!startDate) return 0;
  const start = new Date(startDate + 'T00:00:00');
  const now = new Date();
  const days = Math.floor((now - start) / 86400000);
  return Math.max(0, Math.floor(days / 7));
}
// The slice of the flattened outline assigned to a given week of a paced group.
function chaptersForWeek(outline, chaptersPerWeek, weekIndex){
  const flat = flattenOutline(outline);
  const perWeek = Math.max(1, chaptersPerWeek||1);
  return flat.slice(weekIndex*perWeek, weekIndex*perWeek + perWeek);
}
function formatChapterRange(chapters){
  if(!chapters.length) return '';
  if(chapters.length === 1) return `${chapters[0].book} ${chapters[0].chapter}`;
  const first = chapters[0], last = chapters[chapters.length-1];
  if(first.book === last.book) return `${first.book} ${first.chapter}–${last.chapter}`;
  return `${first.book} ${first.chapter} – ${last.book} ${last.chapter}`;
}
// Detects "@Name" mentions in a discussion message against the group's known members, returns
// the list of mentioned uids plus HTML with each recognized mention wrapped for a visual
// highlight (bold + accent color) — visual only for now, no push notification.
function parseMentions(text, members){
  const escaped = escapeHtml(text);
  const mentionedUids = [];
  // Sort longest-name-first so "@John Smith" matches before a shorter "@John" would steal it.
  // A match is swapped out for a placeholder token immediately (rather than the final HTML), so
  // a shorter name that happens to be a PREFIX of an already-matched longer one (like "John" inside
  // "John Smith") can't also match against text that's already been claimed — the placeholder no
  // longer contains "@John" as a substring once the longer match has consumed it.
  const sorted = (members||[]).slice().sort((a,b)=> (b.displayName||'').length - (a.displayName||'').length);
  let working = escaped;
  const placeholders = [];
  sorted.forEach(m=>{
    if(!m.displayName) return;
    const escapedName = escapeHtml(m.displayName);
    const at = '@' + escapedName;
    if(working.includes(at)){
      mentionedUids.push(m.uid);
      // A distinctive marker real message text won't plausibly contain, used only to reserve
      // this spot until every member's been checked — swapped for the real highlighted HTML after.
      const token = '@@MENTIONSLOT' + placeholders.length + '@@';
      placeholders.push(`<strong style="color:var(--accent);">${at}</strong>`);
      working = working.split(at).join(token);
    }
  });
  placeholders.forEach((frag, i)=>{ working = working.split('@@MENTIONSLOT'+i+'@@').join(frag); });
  return { html: working, mentionedUids };
}

// "My groups" is derived directly from the members subcollections via a collectionGroup query,
// rather than a separate denormalized userGroups doc. The denormalized-doc version had a real
// permission problem: approving someone else's join request would need to write into THEIR
// userGroups doc, which Firestore rules can't safely allow without a much bigger hole. Deriving
// it from `members` instead needs no extra writes or extra rules at all — every member doc
// already carries a plain `uid` field (equal to its own doc ID) specifically so this query can
// filter on it. Note: Firestore may prompt to auto-create a collection-group index the first

/* ---------------- Rendering ---------------- */
function render(){
  ensurePlanReady();
  const app = document.getElementById('app');

  // This whole app rebuilds the page's HTML from scratch on every render() call — simple, but
  // it means any input element gets destroyed and recreated each time, which normally kills focus
  // and drops whatever was mid-typed. Most fields never hit this (they're only read at submit time),
  // but live features like friend search call render() WHILE the user is typing. So: snapshot
  // whichever element is currently focused before rebuilding, then restore focus, cursor position,
  // and the literal value the user had typed right after — regardless of which branch below runs.
  const active = document.activeElement;
  let focusRestore = null;
  if(active && active.id && app.contains(active) && typeof active.value === 'string'){
    focusRestore = { id: active.id, value: active.value, start: active.selectionStart, end: active.selectionEnd };
  }
  function restoreFocus(){
    if(!focusRestore) return;
    const el = document.getElementById(focusRestore.id);
    if(!el) return;
    el.value = focusRestore.value;
    el.focus();
    if(typeof focusRestore.start === 'number' && el.setSelectionRange){
      try{ el.setSelectionRange(focusRestore.start, focusRestore.end); }catch(e){}
    }
  }

  if(shouldShowGate()){
    app.innerHTML = renderAuthGate();
    attachAuthGateEvents();
    restoreFocus();
    return;
  }
  const forced = needsPlanOnboarding();
  if(forced || planChooserOpen){
    app.innerHTML = `<div class="onboard-wrap">${onboardingStep==='custom' ? renderCustomBuilder(!forced) : renderPlanChoose(!forced)}</div>`;
    attachPlanChooserEvents();
    restoreFocus();
    return;
  }
  app.innerHTML = `
    ${renderHeader()}
    ${renderGroupInviteBanner()}
    ${renderCheckinBanner()}
    ${renderInstallBanner()}
    ${renderTabs()}
    ${activeTab==='today' ? renderToday() : ''}
    ${activeTab==='log' ? renderLog() : ''}
    ${activeTab==='journal' ? renderJournal() : ''}
    ${activeTab==='memorize' ? renderMemorize() : ''}
    ${activeTab==='dashboard' ? renderDashboard() : ''}
    ${activeTab==='friends' ? renderFriends() : ''}
    ${activeTab==='groups' ? renderGroups() : ''}
    ${activeTab==='account' ? renderAccountTab() : ''}

function attachPlanChooserEvents(){
  document.querySelectorAll('[data-preset]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const preset = PRESET_PLANS[btn.dataset.preset];
      applyPlan(preset.id, preset.categories);
      planChooserOpen = false;
    });
  });
  const openBuilder = document.getElementById('openCustomBuilder');
  if(openBuilder) openBuilder.addEventListener('click', openCustomBuilder);
  const cancel = document.getElementById('cancelPlanChooser');
  if(cancel) cancel.addEventListener('click', e=>{ e.preventDefault(); closePlanChooser(); });
  const backToPresets = document.getElementById('backToPresets');
  if(backToPresets) backToPresets.addEventListener('click', ()=>{ onboardingStep='choose'; render(); });
  const addCat = document.getElementById('addDraftCategory');
  if(addCat) addCat.addEventListener('click', addDraftCategory);
  const saveBtn = document.getElementById('saveCustomPlan');
  if(saveBtn) saveBtn.addEventListener('click', saveCustomPlan);

  document.querySelectorAll('[data-name-for]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const cat = customDraft.find(c=>c.id===inp.dataset.nameFor);
      if(cat) cat.name = inp.value;
    });
  });
  document.querySelectorAll('[data-color-for]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.colorFor);
      if(cat){ cat.color = btn.dataset.color; render(); }
    });
  });
  document.querySelectorAll('[data-remove-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=> removeDraftCategory(btn.dataset.removeCat));
  });
  document.querySelectorAll('[data-add-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.addBook);
      const select = document.querySelector(`[data-book-select-for="${btn.dataset.addBook}"]`);
      if(cat && select) cat.books.push(bookObj(select.value));
      render();
    });
  });
  document.querySelectorAll('[data-remove-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.removeBook);
      if(cat) cat.books.splice(Number(btn.dataset.idx), 1);
      render();
    });
  });
  document.querySelectorAll('[data-move]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.cat);
      if(!cat) return;
      const idx = Number(btn.dataset.idx);
      const dir = btn.dataset.move === 'up' ? -1 : 1;
      const swapIdx = idx + dir;
      if(swapIdx < 0 || swapIdx >= cat.books.length) return;
      [cat.books[idx], cat.books[swapIdx]] = [cat.books[swapIdx], cat.books[idx]];
      render();
    });
  });
}

function attachAuthGateEvents(){
  const submit = document.getElementById('authSubmit');
  if(submit){
    submit.addEventListener('click', ()=>{
      if(!fbReady){ authError = 'Sync isn\'t set up yet on this app — continue as a guest instead.'; render(); return; }
      const email = (document.getElementById('authEmail').value || '').trim();
      const pwField = document.getElementById('authPassword');
      const password = pwField ? pwField.value : '';
      if(!email){ authError = 'Enter your email address.'; render(); return; }
      if(authView === 'reset'){ doPasswordReset(email); return; }
      if(!password){ authError = 'Enter your password.'; render(); return; }
      if(authView === 'signup') doSignUp(email, password);
      else doLogIn(email, password);
    });
  }
  const toSignup = document.getElementById('toSignup');
  if(toSignup) toSignup.addEventListener('click', e=>{ e.preventDefault(); authView='signup'; authError=''; render(); });
  const toLogin = document.getElementById('toLogin');
  if(toLogin) toLogin.addEventListener('click', e=>{ e.preventDefault(); authView='login'; authError=''; render(); });
  const toReset = document.getElementById('toReset');
  if(toReset) toReset.addEventListener('click', e=>{ e.preventDefault(); authView='reset'; authError=''; render(); });
  const toGuest = document.getElementById('toGuest');
  if(toGuest) toGuest.addEventListener('click', e=>{ e.preventDefault(); continueAsGuest(); });
  const cancelGate = document.getElementById('cancelGate');
  if(cancelGate) cancelGate.addEventListener('click', e=>{ e.preventDefault(); forceShowGate=false; authView='login'; authError=''; render(); });
}

function renderLog(){
  const dates = Array.from(new Set(state.log.map(e=>e.date))).sort().reverse();
  if(!dates.length){
    return `<div class="empty-note">No readings logged yet. Head to the Today tab to get started.</div>`;
  }
  const groups = {};
  dates.forEach(d=>{
    const ym = d.slice(0,7);
    (groups[ym] = groups[ym]||[]).push(d);
  });
  const ymKeys = Object.keys(groups).sort().reverse();
  const monthName = ym => {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m-1, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
  };
  return ymKeys.map((ym, i)=>{
    const rows = groups[ym].map(date=>{
      const cells = ACTIVE_CATEGORIES.map(cat=>{
        const entries = logEntriesFor(cat.id, date);
        if(!entries.length) return `<td></td>`;
        return `<td class="${entries.some(e=>e.status==='complete')?'cell-complete':'cell-skipped'}">
          ${entries.map(e=>`${e.book} ${e.chapter}${e.status==='skipped'?' (skipped)':''}`).join(', ')}
        </td>`;
      }).join('');
      return `<tr><td>${fmtDate(date)}</td>${cells}</tr>`;
    }).join('');
    return `
      <details class="month-group" ${i===0?'open':''}>
        <summary>${monthName(ym)} <span style="color:var(--ink-soft); font-weight:500;">${groups[ym].length} day(s) logged</span></summary>
        <div class="log-scroll">
          <table class="logtable">
            <thead><tr><th>Date</th>${ACTIVE_CATEGORIES.map(c=>`<th>${c.name}</th>`).join('')}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </details>`;
  }).join('');
}

    </div>`;

  if(!entries.length){
    return formHtml + oneYearAgoHtml + filterHtml + `<div class="empty-note">${state.journal.length ? 'No entries match this filter.' : 'No journal entries yet — add your first one above.'}</div>`;
  }

  const groups = {};
  entries.forEach(e=>{
    const ym = e.date.slice(0,7);
    (groups[ym] = groups[ym]||[]).push(e);
  });
  const ymKeys = Object.keys(groups).sort().reverse();
  const monthName = ym => {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m-1, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
  };
  const timelineHtml = ymKeys.map((ym,i)=>{
    const items = groups[ym].map(e=>`
      <div class="journal-entry">
        <div class="journal-entry-head">
          <span class="journal-date">${fmtDate(e.date)}</span>
          ${journalTagPill(e.tag)}
          ${e.reference ? `<span style="font-size:0.8rem; color:var(--ink-soft);">&mdash; ${formatReference(e.reference)}</span>` : ''}
          <button class="btn small danger" data-delete-journal="${e.id}" style="margin-left:auto;">Delete</button>
        </div>
        ${e.title ? `<div class="journal-title">${e.title}</div>` : ''}
        ${e.content ? `<div class="journal-content">${e.content.replace(/\n/g,'<br>')}</div>` : ''}
      </div>`).join('');
    return `
      <details class="month-group" ${i===0?'open':''}>
        <summary>${monthName(ym)} <span style="color:var(--ink-soft); font-weight:500;">${groups[ym].length} entr${groups[ym].length===1?'y':'ies'}</span></summary>
        <div style="padding:0 16px 12px;">${items}</div>
      </details>`;
  }).join('');

  return formHtml + oneYearAgoHtml + filterHtml + `<div style="margin-top:14px;">${timelineHtml}</div>`;
}

function renderMemorize(){
  const bookOptions = BOOK_LIBRARY.map(b=>`<option value="${b.name}">${b.name}</option>`).join('');
  const formHtml = `
    <div class="settings-box">
      <h3>Add a verse to memorize</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
        <input type="text" id="memRef" placeholder="Reference (e.g. Psalm 23:1)" style="flex:1; min-width:200px; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; font-family:inherit;">
      </div>
      <textarea id="memText" placeholder="Paste the verse text here (optional, if you'd like it shown while reviewing)" rows="3" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; font-size:0.9rem; font-family:inherit; resize:vertical;"></textarea>
      <button class="btn primary" id="addMemBtn">Add</button>
    </div>`;
  const learning = state.memorization.filter(m=>m.status!=='mastered');
  const mastered = state.memorization.filter(m=>m.status==='mastered');
  const cardHtml = m => `
    <div class="card" style="--cat-color:${m.status==='mastered' ? '#3f7a4f' : '#7a4b2e'}; margin-bottom:12px;">
      <div class="cat-name">${m.reference}</div>
      ${m.text ? `<div style="font-size:0.88rem; color:var(--ink-soft); margin:6px 0;">${m.text}</div>` : ''}
      <div class="meta">${m.status==='mastered' ? 'Mastered' : `Reviewed ${m.reviewCount||0} time${m.reviewCount===1?'':'s'}${m.lastReviewed ? ' · last on ' + fmtDate(m.lastReviewed) : ''}`}</div>
      <div class="actions">
        ${m.status!=='mastered' ? `<button class="btn primary small" data-mem-review="${m.id}">Reviewed today</button>` : ''}
        <button class="btn small" data-mem-toggle="${m.id}">${m.status==='mastered' ? 'Move back to learning' : 'Mark mastered'}</button>
        <button class="btn small danger" data-mem-delete="${m.id}">Remove</button>
      </div>
    </div>`;
  if(!state.memorization.length){
    return formHtml + `<div class="empty-note">No verses yet — add one above to start memorizing.</div>`;
  }
  return formHtml + `
    <h3 style="margin-top:24px;">Learning (${learning.length})</h3>
    ${learning.length ? learning.map(cardHtml).join('') : `<div class="empty-note">Nothing in progress — add a verse above.</div>`}
    ${mastered.length ? `<h3 style="margin-top:24px;">Mastered (${mastered.length})</h3>${mastered.map(cardHtml).join('')}` : ''}
  `;
}

function renderFriends(){
  if(!currentUser){
    return `<div class="empty-note">Friends & Family requires an account, since it connects your progress with someone else's. Create an account or log in from the Account tab.</div>`;
  }
  const myUid = currentUser.uid;
  const accepted = friendLinksData.filter(l=>l.status==='accepted');
  const incoming = friendLinksData.filter(l=>l.status==='pending' && l.requestedBy!==myUid);
  const outgoing = friendLinksData.filter(l=>l.status==='pending' && l.requestedBy===myUid);

  const searchResultRow = r => {
    const st = friendStatusWith(r.uid);
    let actionHtml;
    if(st.status==='friends') actionHtml = `<span class="status-pill complete">Friends</span>`;
    else if(st.status==='outgoing') actionHtml = `<button class="btn small" data-friend-cancel="${st.linkId}">Requested — cancel</button>`;
    else if(st.status==='incoming') actionHtml = `<span style="font-size:0.8rem; color:var(--ink-soft);">Check requests below</span>`;
    else actionHtml = `<button class="btn small primary" data-friend-send-uid="${r.uid}">Send request</button>`;
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
        <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml({displayName:r.displayName}, 32)}${r.displayName}</span>
        ${actionHtml}
      </div>`;
  };

  const addFormHtml = `
    <div class="settings-box">
      <h3>Add a friend &mdash; ${accepted.length} connection${accepted.length===1?'':'s'}</h3>
      <p style="font-size:0.85rem; color:var(--ink-soft);">Search by name or their exact email. We only ever share your name, last-active date, and current plan &mdash; never your journal or reading log.</p>
      ${friendRequestError ? `<div class="auth-error">${friendRequestError}</div>` : ''}
      ${friendRequestSent ? `<p style="font-size:0.85rem; color:var(--good);">&#10003; Request sent.</p>` : ''}
      <input type="text" id="friendSearchInput" placeholder="Search by name or email…" value="${friendSearchQuery}" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; font-family:inherit;">
      <div style="margin-top:10px;">
        ${friendSearchBusy ? `<div style="font-size:0.82rem; color:var(--ink-soft);">Searching…</div>` : ''}
        ${!friendSearchBusy && friendSearchQuery.trim() && !friendSearchResults.length ? `<div style="font-size:0.82rem; color:var(--ink-soft);">No one found. If you searched their email, they need to have opened Cultivate at least once first.</div>` : ''}
        ${friendSearchResults.map(searchResultRow).join('')}
      </div>
    </div>`;

  const incomingHtml = `
    <div class="settings-box">
      <h3>Requests received (${incoming.length})</h3>
      ${incoming.length ? incoming.map(l=>{
        const reqAct = friendActivityCache[l.requestedBy];
        const name = reqAct ? reqAct.displayName : (friendNameCache[l.requestedBy] || 'Someone');
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
          <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml(reqAct||{displayName:name}, 32)}${name} wants to connect</span>
          <span style="display:flex; gap:6px;">
            <button class="btn small primary" data-friend-accept="${l.id}">Accept</button>
            <button class="btn small danger" data-friend-decline="${l.id}">Decline</button>
          </span>
        </div>`;
      }).join('') : `<div style="font-size:0.82rem; color:var(--ink-soft);">Nothing waiting on you right now.</div>`}
    </div>`;

  const outgoingHtml = `
    <div class="settings-box">
      <h3>Requests sent (${outgoing.length})</h3>
      ${outgoing.length ? outgoing.map(l=>{
        const otherUid = l.userIds.find(u=>u!==myUid);
        const act = friendActivityCache[otherUid];
        const name = act ? act.displayName : (friendNameCache[otherUid] || 'Waiting on a response');
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
          <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml(act||{displayName:name}, 32)}${name}</span>
          <button class="btn small danger" data-friend-cancel="${l.id}">Unsend</button>
        </div>`;
      }).join('') : `<div style="font-size:0.82rem; color:var(--ink-soft);">Nothing pending.</div>`}
    </div>`;

  const acceptedHtml = accepted.length ? `
    <div class="settings-box">
      <h3>Connected (${accepted.length})</h3>
      ${accepted.map(l=>{
        const otherUid = l.userIds.find(u=>u!==myUid);
        const act = friendActivityCache[otherUid];
        return `
        <div style="display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);">
          ${renderAvatarHtml(act||{}, 40)}
          <div style="flex:1;">
            <div style="font-weight:700;">${act ? act.displayName : 'Loading…'}</div>
            ${act ? `<div style="font-size:0.82rem; color:var(--ink-soft);">${act.planName ? act.planName + ' &middot; ' : ''}${act.activeDaysLast30||0} of the last 30 days active${act.lastActiveDate ? ' &middot; last read ' + fmtDate(act.lastActiveDate) : ''}</div>` : ''}
            <div style="display:flex; gap:6px; margin-top:6px;">
              <button class="btn small" data-view-profile="${otherUid}">View profile</button>
              <button class="btn small danger" data-friend-decline="${l.id}">Remove</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : `<div class="empty-note">No connections yet — search for a friend or family member above. This is meant to feel like company, not a leaderboard: no percentages, no comparisons, just knowing someone else is walking with you.</div>`;

  // A plain, on-screen troubleshooting panel — so if requests aren't showing up, what's actually
  // happening can be checked right here instead of needing to open browser dev tools. Shows exactly
  // what this account's live connection to Firestore currently sees.
  const troubleshootingHtml = `
    <details class="settings-box" style="font-size:0.82rem;">
      <summary style="cursor:pointer; font-weight:600;">Troubleshooting</summary>
      <div style="margin-top:10px; color:var(--ink-soft); line-height:1.6;">
        <div>Signed in as: <strong>${currentUser.email}</strong></div>
        <div>Your account ID: <code>${myUid}</code></div>
        <div>Friend-link documents this account can currently see: <strong>${friendLinksData.length}</strong></div>
        ${friendsListenerError ? `<div style="color:var(--bad); margin-top:6px;">Listener error: ${friendsListenerError}</div>` : `<div style="color:var(--good); margin-top:6px;">No listener errors.</div>`}
        ${friendLinksData.length ? `
          <div style="margin-top:8px; font-family:monospace; font-size:0.78rem; white-space:pre-wrap; background:var(--bg-soft, #f5f2ec); padding:8px; border-radius:6px;">${friendLinksData.map(l=>`${l.id} — status:${l.status} requestedBy:${l.requestedBy}`).join('\n')}</div>
        ` : ''}
        <div style="margin-top:8px;">If you just sent a request and its document isn't listed above at all, the write itself didn't happen — check the Send request button for an error message. If it IS listed above but isn't showing in the right section, that's a display bug, not a data problem — let me know the exact line shown here.</div>
      </div>
    </details>`;

  return addFormHtml + incomingHtml + outgoingHtml + acceptedHtml + troubleshootingHtml;
}

let requestedGroupIds = new Set(); // tracked locally so the button updates instantly after clicking
const NT_START_INDEX = BOOK_LIBRARY.findIndex(b=>b.name==='Matthew');
const OT_BOOK_NAMES = BOOK_LIBRARY.slice(0, NT_START_INDEX).map(b=>b.name);
const NT_BOOK_NAMES = BOOK_LIBRARY.slice(NT_START_INDEX).map(b=>b.name);

function renderGroups(){
  if(!currentUser){
    return `<div class="empty-note">Groups require an account, since they're shared with other people — a Bible study, table, or devotion group. Create an account or log in from the Account tab.</div>`;
  }
  return activeGroupId ? renderGroupDetail() : renderGroupsDirectory();
}

function renderGroupsDirectory(){
  if(groupCreateOpen) return renderGroupCreateForm();

  const q = groupSearchQuery.trim().toLowerCase();
  // The search box only appears on the Discover tab, so it only filters Discover — My Groups
  // always shows everything you've joined, regardless of whatever was last typed in that box.
  const mine = groupsDirectory.filter(g=> myGroupIds.includes(g.id));
  const discover = groupsDirectory.filter(g=> !myGroupIds.includes(g.id) && (!q || g.name.toLowerCase().includes(q)));

  const groupCard = g => {
    const isMember = myGroupIds.includes(g.id);
    const requested = requestedGroupIds.has(g.id);
    let actionHtml;
    if(isMember) actionHtml = `<button class="btn small primary" data-open-group="${g.id}">Open</button>`;
    else if(requested) actionHtml = `<span class="pending-note">Requested</span>`;
    else actionHtml = `<button class="btn small" data-request-join="${g.id}">Join</button>`;
    return `
      <div class="group-card">
        <div class="group-icon">${renderAvatarHtml({displayName:g.name, color:colorForName(g.name)}, 44)}</div>
        <div class="group-info">
          <div class="name">${escapeHtml(g.name)}</div>
          <div class="meta">${g.memberCount||1} member${g.memberCount===1?'':'s'} &middot; ${g.planMode==='paced' ? 'Paced' : 'Free pace'}${g.description ? ' &middot; ' + escapeHtml(g.description) : ''}</div>
        </div>
        <div class="group-action">${actionHtml}</div>
      </div>`;
  };

  let listHtml;
  if(groupDirTab === 'mine'){
    listHtml = mine.length ? `<div class="group-card-list">${mine.map(groupCard).join('')}</div>`
      : `<div class="empty-note">${q ? 'No groups match that search.' : "You haven't joined a group yet — switch to Discover to browse or search."}</div>`;
  } else {
    listHtml = groupsDirectoryLoading ? `<div style="font-size:0.82rem; color:var(--ink-soft);">Loading groups…</div>`
      : (discover.length ? `<div class="group-card-list">${discover.map(groupCard).join('')}</div>`
        : `<div class="empty-note">${q ? 'No groups match that search.' : 'No groups yet — be the first to create one.'}</div>`);
  }

  return `
    <div class="settings-box">
      <div class="group-dir-header">
        <h3>Groups</h3>
        <button class="btn primary small" id="openGroupCreateBtn">+ Create a group</button>
      </div>
      <div class="group-tabs">
        <button class="${groupDirTab==='mine'?'active':''}" data-group-dir-tab="mine">My Groups${mine.length ? ' ('+mine.length+')' : ''}</button>
        <button class="${groupDirTab==='discover'?'active':''}" data-group-dir-tab="discover">Discover</button>
      </div>
      ${groupDirTab==='discover' ? `<div class="group-search-row"><input type="text" id="groupSearchInput" placeholder="Search groups by name…" value="${escapeHtml(groupSearchQuery)}"></div>` : ''}
      ${listHtml}
    </div>`;
}

            <input type="radio" name="groupPlanMode" value="free" checked style="margin-top:3px;">

          </label>

      </div>
      <div class="auth-field" id="groupChaptersPerWeekField" style="display:none;">

        <input type="number" id="groupChaptersPerWeek" value="5" min="1" style="width:100px;">

      <div class="auth-field">

        <div class="reading-preset-row">
          <button type="button" class="btn small" id="pickWholeBible">Whole Bible</button>
          <button type="button" class="btn small" id="pickOT">Old Testament</button>
          <button type="button" class="btn small" id="pickNT">New Testament</button>
          ${groupDraftBooks.length ? `<button type="button" class="btn small" id="pickNone">Clear</button>` : ''}
        </div>
        ${summaryHtml}
        <details class="book-picker-details" ${bookPickerOpen ? 'open' : ''}>
          <summary>Choose specific books</summary>
          <div class="book-picker-body">
            <input type="text" id="bookFilterInput" placeholder="Filter books…" value="${escapeHtml(bookFilterQuery)}">

              <div class="book-picker">${OT_BOOK_NAMES.filter(matches).map(bookCheckbox).join('') || `<div class="empty-note-inline">No matches.</div>`}</div>
            </div>
            <div class="book-picker-section">
              <div class="book-picker-section-label">New Testament (${ntSelected}/${NT_BOOK_NAMES.length})</div>
              <div class="book-picker">${NT_BOOK_NAMES.filter(matches).map(bookCheckbox).join('') || `<div class="empty-note-inline">No matches.</div>`}</div>
            </div>
          </div>
        </details>
      </div>
      <div style="display:flex; gap:8px; margin-top:10px;">

        <button class="btn" id="cancelGroupCreateBtn">Cancel</button>

  const isOwnerOrAdmin = myRole === 'owner' || myRole === 'admin';

      <button class="${activeGroupTab==='members'?'active':''}" data-group-tab="members">Members (${activeGroupMembers.length})</button>

          <h3 style="margin-bottom:2px;">${escapeHtml(g.name)}</h3>

          <div style="font-size:0.8rem; color:var(--ink-soft);">${g.memberCount||1} member${g.memberCount===1?'':'s'} &middot; ${g.planMode==='paced' ? 'Paced schedule' : 'Free pace'}</div>

function renderGroupDiscussion(){
  const messages = activeGroupMessages.map(m=>{
    const { html } = parseMentions(m.text, activeGroupMembers);
    const mine = currentUser && m.authorUid === currentUser.uid;
    return `
      <div class="group-message">
        <div class="who"><strong>${escapeHtml(m.authorName||'Someone')}</strong>${mine ? ' (you)' : ''} &middot; ${m.createdAt ? new Date(m.createdAt).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : ''}</div>
        <div class="body">${html.replace(/\n/g,'<br>')}</div>
      </div>`;

function renderGroupPlan(){
  const g = activeGroupData;
  const total = outlineTotalChapters(g.outline);
  let paceHtml = '';
  if(g.planMode === 'paced'){
    const weekIndex = currentGroupWeekIndex(g.startDate);
    const thisWeek = chaptersForWeek(g.outline, g.chaptersPerWeek, weekIndex);
    paceHtml = `
      <div class="group-week-card">
        <div class="week-label">Week ${weekIndex+1}</div>
        <div style="font-size:0.9rem;">${thisWeek.length ? formatChapterRange(thisWeek) : "You've reached the end of the outline — nicely done."}</div>
        <div style="font-size:0.78rem; color:var(--ink-soft); margin-top:4px;">${g.chaptersPerWeek} chapter${g.chaptersPerWeek===1?'':'s'} per week, started ${fmtDate(g.startDate)}</div>
      </div>`;
  }
  return `
    <div class="settings-box">
      ${paceHtml}
      <h3>Outline</h3>
      <p style="font-size:0.85rem; color:var(--ink-soft);">${total} chapters across ${(g.outline||[]).length} book${(g.outline||[]).length===1?'':'s'}.</p>
      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;">
        ${(g.outline||[]).map(o=>`<span class="role-badge member">${escapeHtml(o.book)} (${o.chapters})</span>`).join('')}
      </div>
    </div>`;
}

function renderGroupMembers(){
  const myRole = myRoleInActiveGroup();
  const sorted = activeGroupMembers.slice().sort((a,b)=>{
    const rank = r => r==='owner'?0:r==='admin'?1:2;
    return rank(a.role)-rank(b.role);
  });
  const rows = sorted.map(m=>{
    const canManage = myRole === 'owner' && m.role !== 'owner' && (!currentUser || m.uid !== currentUser.uid);
    const canRemove = (myRole==='owner' || myRole==='admin') && m.role !== 'owner' && (!currentUser || m.uid !== currentUser.uid);
    return `
      <div class="group-member-row">
        ${renderAvatarHtml(m, 34)}
        <span class="name" data-view-profile="${m.uid}">${escapeHtml(m.displayName||'Member')} <span class="role-badge ${m.role}">${m.role}</span></span>
        ${canManage ? `<button class="btn small" data-set-role="${m.uid}|${m.role==='admin'?'member':'admin'}">${m.role==='admin' ? 'Remove admin' : 'Make admin'}</button>` : ''}
        ${canRemove ? `<button class="btn small danger" data-remove-member="${m.uid}">Remove</button>` : ''}
      </div>`;
  }).join('');
  return `<div class="settings-box">${rows}</div>`;
}

function renderGroupRequests(){
  if(!activeGroupJoinRequests.length) return `<div class="empty-note">No pending requests right now.</div>`;
  const rows = activeGroupJoinRequests.map(r=>`
    <div class="group-row">
      <span>${escapeHtml(r.displayName||'Someone')}</span>
      <span style="display:flex; gap:6px;">
        <button class="btn small primary" data-approve-request="${r.uid}|${escapeHtml(r.displayName||'Member').replace(/"/g,'&quot;')}">Approve</button>
        <button class="btn small danger" data-decline-request="${r.uid}">Decline</button>
      </span>
    </div>`).join('');
  return `<div class="settings-box">${rows}</div>`;

function renderYearInReview(){
  const currentYear = todayStr().slice(0,4);
  const s = yearInReviewStats(currentYear);
  if(s.chaptersRead === 0 && s.journalEntries === 0) return '';
  return `
    <div class="settings-box" style="max-width:none; background:var(--accent-soft); border-color:var(--accent);">
      <h3>${s.year} in review</h3>
      <p style="font-size:0.92rem; line-height:1.7;">
        This year you sat with <strong>${s.chaptersRead}</strong> chapter${s.chaptersRead===1?'':'s'} across <strong>${s.booksTouched}</strong> book${s.booksTouched===1?'':'s'} of the Bible.
        ${s.journalEntries ? ` You wrote <strong>${s.journalEntries}</strong> journal entr${s.journalEntries===1?'y':'ies'}` : ''}
        ${s.journalEntries ? (JOURNAL_TAGS.filter(t=>s.tagCounts[t]>0).map(t=>`${s.tagCounts[t]} ${JOURNAL_TAG_LABELS[t].toLowerCase()}`).join(', ') ? ' — ' + JOURNAL_TAGS.filter(t=>s.tagCounts[t]>0).map(t=>`${s.tagCounts[t]} ${JOURNAL_TAG_LABELS[t].toLowerCase()}`).join(', ') + '.' : '.') : ''}
        ${s.cyclesCompletedAllTime ? ` You've completed <strong>${s.cyclesCompletedAllTime}</strong> full cycle${s.cyclesCompletedAllTime===1?'':'s'} through your plan's categories so far.` : ''}
      </p>
    </div>`;
}

function renderMonthlySummaries(){
  const months = monthsWithActivity().slice(0,6);
  if(!months.length) return '';
  const monthName = ym => { const [y,m] = ym.split('-').map(Number); return new Date(y,m-1,1).toLocaleDateString(undefined,{month:'long', year:'numeric'}); };
  const cards = months.map(ym=>{
    const s = monthSummaryStats(ym);
    return `
      <div class="stat">
        <div style="font-weight:700; margin-bottom:6px;">${monthName(ym)}</div>
        <div style="font-size:0.85rem; color:var(--ink-soft); line-height:1.6;">
          ${s.chaptersRead} chapter${s.chaptersRead===1?'':'s'} across ${s.booksTouched} book${s.booksTouched===1?'':'s'}<br>
          Active ${s.daysActive} day${s.daysActive===1?'':'s'}${s.journalEntries ? ` &middot; ${s.journalEntries} journal entr${s.journalEntries===1?'y':'ies'}` : ''}
        </div>
      </div>`;
  }).join('');
  return `<h3 style="margin-top:6px;">Month by month</h3><div class="dash-summary">${cards}</div>`;
}

function renderDashboard(){
  const uniqueChapters = new Set(state.log.filter(e=>e.status==='complete').map(e=>e.book+'|'+e.chapter));
  const totalPassesAcrossAll = ACTIVE_CATEGORIES.reduce((s,c)=>s+(state.cycles[c.id]||0),0);
  const yearInReview = renderYearInReview();
  const monthlySummaries = renderMonthlySummaries();
  const summary = `
    <div class="dash-summary">
      <div class="stat"><div class="num">${uniqueChapters.size} / ${BIBLE_TOTAL_CHAPTERS}</div><div class="label">Unique chapters read at least once</div></div>
      <div class="stat"><div class="num">${Math.round(uniqueChapters.size/BIBLE_TOTAL_CHAPTERS*100)}%</div><div class="label">Whole-Bible coverage</div></div>
      <div class="stat"><div class="num">${totalPassesAcrossAll}</div><div class="label">Total category cycles completed</div></div>
      <div class="stat"><div class="num">${state.log.filter(e=>e.status==='complete').length}</div><div class="label">Chapters logged complete (all-time)</div></div>
    </div>`;

  const blocks = ACTIVE_CATEGORIES.map(cat=>{
    const stats = bookStats(cat);
    const catCycle = state.cycles[cat.id]||0;
    const catPct = Math.round((state.cursors[cat.id]||0)/cat.total*100);
    const rows = stats.map(b=>`
      <div class="book-row">
        <div>${b.name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${b.progress}%; background:${cat.color};"></div></div>
        <div class="passes-badge" title="Times fully completed this cycle count">${b.passes}&times; read</div>
        <div style="text-align:right; color:var(--ink-soft);">${b.progress}%</div>
      </div>`).join('');
    return `
      <div class="cat-block">
        <h3><span class="swatch" style="background:${cat.color}"></span>${cat.name}</h3>
        <div class="cat-sub">Cycle ${catCycle+1} in progress &middot; ${catPct}% through current pass (${cat.total} chapters/cycle)</div>
        ${rows}
      </div>`;
  }).join('');

  return yearInReview + summary + monthlySummaries + blocks;
}
