  if(cancelEditProfileBtn) cancelEditProfileBtn.addEventListener('click', ()=>{ profilePhotoError = ''; profileEditMode = false; render(); });
  const saveProfileBtn = document.getElementById('saveProfileBtn');
  if(saveProfileBtn){
    saveProfileBtn.addEventListener('click', ()=>{
      const val = id => { const el = document.getElementById(id); return el ? el.value : ''; };
      const selectedColorBtn = document.querySelector('[data-profile-color].selected');
      const visibilityRadio = document.querySelector('input[name="profileVisibility"]:checked');
      updateProfile({
        displayName: val('profileDisplayName'),
        bio: val('profileBio'),
        location: val('profileLocation'),
        lifeVerse: val('profileLifeVerse'),
        favoriteSong: val('profileFavoriteSong'),
        aboutMe: val('profileAboutMe'),
        visibility: visibilityRadio ? visibilityRadio.value : state.profile.visibility,
        color: selectedColorBtn ? selectedColorBtn.dataset.profileColor : state.profile.color
      });
      profileEditMode = false;
    });
  }
  document.querySelectorAll('[data-profile-color]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('[data-profile-color]').forEach(b=>b.classList.toggle('selected', b===btn));
    });
  });
  const profilePhotoInput = document.getElementById('profilePhotoInput');
  if(profilePhotoInput){
    profilePhotoInput.addEventListener('change', (e)=>{
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      profilePhotoError = '';
      if(!file.type.startsWith('image/')){
        profilePhotoError = 'That doesn\'t look like an image file.';
        render();
        return;
      }
      const reader = new FileReader();
      reader.onload = (evt)=>{
        const img = new Image();
        img.onload = ()=>{
          // Center-crop to a square, then downscale to a small fixed size — keeps every photo
          // roughly the same (small) footprint in Firestore regardless of what the user uploads.
          const SIZE = 200;
          const canvas = document.createElement('canvas');
          canvas.width = SIZE; canvas.height = SIZE;
          const ctx = canvas.getContext('2d');
          const side = Math.min(img.width, img.height);
          const sx = (img.width - side) / 2;
          const sy = (img.height - side) / 2;
          ctx.drawImage(img, sx, sy, side, side, 0, 0, SIZE, SIZE);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.72);
          if(dataUrl.length > PROFILE_PHOTO_MAX_LEN){
            profilePhotoError = 'That photo is too large even after compressing — try a different one.';
            render();
            return;
          }
          updateProfilePhoto(dataUrl);
        };
        img.onerror = ()=>{ profilePhotoError = 'Could not read that image — try a different file.'; render(); };
        img.src = evt.target.result;
      };
      reader.onerror = ()=>{ profilePhotoError = 'Could not read that file.'; render(); };
      reader.readAsDataURL(file);
    });
  }
  const removeProfilePhotoBtn = document.getElementById('removeProfilePhotoBtn');
  if(removeProfilePhotoBtn){
    removeProfilePhotoBtn.addEventListener('click', ()=>{ profilePhotoError = ''; removeProfilePhoto(); });
  }

  // Journal + Log export (separate from full backup)
  const exportJournalLogBtn = document.getElementById('exportJournalLogBtn');
  if(exportJournalLogBtn){
    exportJournalLogBtn.addEventListener('click', ()=>{
      const lines = [];
      lines.push('CULTIVATE — Journal & Reading Log Export');
      lines.push('Exported ' + fmtDate(todayStr()));
      lines.push('');
      lines.push('=== JOURNAL ===');
      journalSorted().slice().reverse().forEach(e=>{
        lines.push('');
        lines.push(fmtDate(e.date) + ' — ' + JOURNAL_TAG_LABELS[e.tag] + (e.reference ? ' — ' + formatReference(e.reference) : ''));
        if(e.title) lines.push(e.title);
        if(e.content) lines.push(e.content);
      });
      lines.push('');
      lines.push('=== READING LOG ===');
      state.log.slice().sort((a,b)=> a.date < b.date ? -1 : 1).forEach(e=>{
        lines.push(fmtDate(e.date) + ' — ' + e.book + ' ' + e.chapter + (e.status==='skipped' ? ' (skipped)' : ''));
      });
      const blob = new Blob([lines.join('\n')], {type:'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'cultivate-journal-and-log-'+todayStr()+'.txt';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }

  // Friends & Family
  const friendSearchInput = document.getElementById('friendSearchInput');
  if(friendSearchInput){
    friendSearchInput.addEventListener('input', ()=>{
      clearTimeout(friendSearchDebounce);
      const val = friendSearchInput.value;
      friendSearchDebounce = setTimeout(()=> searchFriends(val), 300);
    });
  }
  document.querySelectorAll('[data-friend-send-uid]').forEach(btn=> btn.addEventListener('click', ()=> sendFriendRequestToUid(btn.dataset.friendSendUid)));
  document.querySelectorAll('[data-friend-cancel]').forEach(btn=> btn.addEventListener('click', ()=> declineFriendRequest(btn.dataset.friendCancel)));
  document.querySelectorAll('[data-friend-accept]').forEach(btn=> btn.addEventListener('click', ()=> acceptFriendRequest(btn.dataset.friendAccept)));
  document.querySelectorAll('[data-friend-decline]').forEach(btn=> btn.addEventListener('click', ()=>{
    customConfirm('Remove this connection?', { confirmLabel:'Remove', danger:true }).then(ok=>{ if(ok) declineFriendRequest(btn.dataset.friendDecline); });
  }));
  document.querySelectorAll('[data-view-profile]').forEach(btn=> btn.addEventListener('click', ()=> viewProfile(btn.dataset.viewProfile)));
  const closeViewedProfileBtn = document.getElementById('closeViewedProfileBtn');
  if(closeViewedProfileBtn) closeViewedProfileBtn.addEventListener('click', closeViewedProfile);
  const installBtn = document.getElementById('installBtn');
  if(installBtn){
    installBtn.addEventListener('click', async ()=>{
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      render();
    });
  }
  const acceptGroupInviteBtn = document.getElementById('acceptGroupInviteBtn');
  if(acceptGroupInviteBtn) acceptGroupInviteBtn.addEventListener('click', ()=>{ forceShowGate = true; authView = 'signup'; authError=''; render(); });

  const shareAppBtn = document.getElementById('shareAppBtn');
  if(shareAppBtn){
    shareAppBtn.addEventListener('click', ()=>{
      const url = `${window.location.origin}${window.location.pathname}`;
      const shareData = { title:'Cultivate', text:'I\'ve been using Cultivate to read the Bible — thought you might like it too.', url };
      if(navigator.share){
        navigator.share(shareData).catch(()=>{});
      } else if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=> showToast('Link copied.', { tone:'good' }));
      }
    });
  }

  /* ---- Groups ---- */
  const groupSearchInput = document.getElementById('groupSearchInput');
  if(groupSearchInput) groupSearchInput.addEventListener('input', (e)=>{ groupSearchQuery = e.target.value; render(); });

  function openGroupCreateSheet(){ groupCreateOpen = true; groupDraftBooks = []; groupCreateError=''; bookPickerOpen = false; bookFilterQuery = ''; render(); }
  const openGroupCreateBtn = document.getElementById('openGroupCreateBtn');
  if(openGroupCreateBtn) openGroupCreateBtn.addEventListener('click', openGroupCreateSheet);
  const emptyStateCreateGroupBtn = document.getElementById('emptyStateCreateGroupBtn');
  if(emptyStateCreateGroupBtn) emptyStateCreateGroupBtn.addEventListener('click', openGroupCreateSheet);
  const cancelGroupCreateBtn = document.getElementById('cancelGroupCreateBtn');
  if(cancelGroupCreateBtn) cancelGroupCreateBtn.addEventListener('click', ()=>{ groupCreateOpen = false; render(); });
  const groupSheetBackdrop = document.getElementById('groupSheetBackdrop');
  if(groupSheetBackdrop) groupSheetBackdrop.addEventListener('click', ()=>{ groupCreateOpen = false; render(); });
  document.querySelectorAll('[data-group-dir-tab]').forEach(btn=> btn.addEventListener('click', ()=>{ groupDirTab = btn.dataset.groupDirTab; render(); }));

  document.querySelectorAll('input[name="groupPlanMode"]').forEach(radio=>{
    radio.addEventListener('change', ()=>{
      const field = document.getElementById('groupChaptersPerWeekField');
      const checked = document.querySelector('input[name="groupPlanMode"]:checked');
      if(field) field.style.display = (checked && checked.value==='paced') ? 'block' : 'none';
    });
  });
  const pickWholeBible = document.getElementById('pickWholeBible');
  if(pickWholeBible) pickWholeBible.addEventListener('click', ()=>{ setGroupDraftBooks(BOOK_LIBRARY.map(b=>b.name)); render(); });
  const pickOT = document.getElementById('pickOT');
  if(pickOT) pickOT.addEventListener('click', ()=>{ setGroupDraftBooks(OT_BOOK_NAMES); render(); });
  const pickNT = document.getElementById('pickNT');
  if(pickNT) pickNT.addEventListener('click', ()=>{ setGroupDraftBooks(NT_BOOK_NAMES); render(); });
  const pickNone = document.getElementById('pickNone');
  if(pickNone) pickNone.addEventListener('click', ()=>{ setGroupDraftBooks([]); render(); });
  document.querySelectorAll('[data-group-draft-book]').forEach(cb=>{
    cb.addEventListener('change', ()=>{ toggleGroupDraftBook(cb.dataset.groupDraftBook); render(); });
  });
  document.querySelectorAll('[data-remove-draft-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ toggleGroupDraftBook(btn.dataset.removeDraftBook); render(); });
  });
  const bookFilterInput = document.getElementById('bookFilterInput');
  if(bookFilterInput) bookFilterInput.addEventListener('input', (e)=>{ bookFilterQuery = e.target.value; render(); });
  const bookPickerDetails = document.querySelector('.book-picker-details');
  if(bookPickerDetails) bookPickerDetails.addEventListener('toggle', ()=>{ bookPickerOpen = bookPickerDetails.open; });
  const submitGroupCreateBtn = document.getElementById('submitGroupCreateBtn');
  if(submitGroupCreateBtn){
    submitGroupCreateBtn.addEventListener('click', ()=>{
      const checkedMode = document.querySelector('input[name="groupPlanMode"]:checked');
      createGroup({
        name: document.getElementById('groupName').value,
        description: document.getElementById('groupDescription').value,
        planMode: checkedMode ? checkedMode.value : 'free',
        chaptersPerWeek: document.getElementById('groupChaptersPerWeek') ? document.getElementById('groupChaptersPerWeek').value : 5
      });
    });
  }

  document.querySelectorAll('[data-open-group]').forEach(btn=> btn.addEventListener('click', ()=> openGroup(btn.dataset.openGroup)));
  document.querySelectorAll('[data-request-join]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const gid = btn.dataset.requestJoin;
      requestedGroupIds.add(gid);
      requestToJoinGroup(gid);
    });
  });
  const backToGroupsBtn = document.getElementById('backToGroupsBtn');
  if(backToGroupsBtn) backToGroupsBtn.addEventListener('click', ()=>{ closeGroup(); loadGroupsDirectory(true); render(); });
  document.querySelectorAll('[data-group-tab]').forEach(btn=> btn.addEventListener('click', ()=>{ activeGroupTab = btn.dataset.groupTab; render(); }));
  const copyGroupInviteBtn = document.getElementById('copyGroupInviteBtn');
  if(copyGroupInviteBtn){
    copyGroupInviteBtn.addEventListener('click', ()=>{
      const g = activeGroupData; if(!g) return;
      const url = `${window.location.origin}${window.location.pathname}?joinGroup=${g.id}&code=${g.inviteCode}`;
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=> showToast('Invite link copied.', { tone:'good' }));
      }
    });
  }
  const leaveGroupBtn = document.getElementById('leaveGroupBtn');
  if(leaveGroupBtn){
    leaveGroupBtn.addEventListener('click', ()=>{
      if(!activeGroupData) return;
      customConfirm('Leave this group?', { confirmLabel:'Leave', danger:true }).then(ok=>{
        if(ok){ leaveGroup(activeGroupData.id); loadGroupsDirectory(true); render(); }
      });
    });
  }
  const sendGroupMessageBtn = document.getElementById('sendGroupMessageBtn');
  const groupMessageInput = document.getElementById('groupMessageInput');
  if(groupMessageInput) groupMessageInput.addEventListener('input', (e)=>{ groupMessageText = e.target.value; });
  if(sendGroupMessageBtn && activeGroupData){
    sendGroupMessageBtn.addEventListener('click', ()=> sendGroupMessage(activeGroupData.id, groupMessageInput ? groupMessageInput.value : groupMessageText));
  }
  if(groupMessageInput && activeGroupData){
    groupMessageInput.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ e.preventDefault(); sendGroupMessage(activeGroupData.id, groupMessageInput.value); }
    });
  }
  document.querySelectorAll('[data-set-role]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [uid, role] = btn.dataset.setRole.split('|');
      if(activeGroupData) setMemberRole(activeGroupData.id, uid, role);
    });
  });
  document.querySelectorAll('[data-remove-member]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!activeGroupData) return;
      customConfirm('Remove this member from the group?', { confirmLabel:'Remove', danger:true }).then(ok=>{
        if(ok) removeGroupMember(activeGroupData.id, btn.dataset.removeMember);
      });
    });
  });
  document.querySelectorAll('[data-approve-request]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [uid, name] = btn.dataset.approveRequest.split('|');
      if(activeGroupData) approveJoinRequest(activeGroupData.id, uid, name);
    });
  });
  document.querySelectorAll('[data-decline-request]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(activeGroupData) declineJoinRequest(activeGroupData.id, btn.dataset.declineRequest);
    });
  });
}

// A group invite link looks like ?joinGroup=<groupId>&code=<inviteCode>. Captured once at load;
// consumed (and stripped from the URL) the moment we know whether someone's signed in — if not,
// a banner prompts sign-in/signup first and the join happens automatically right after.
let pendingGroupInvite = null;
(function(){
  try{
    const params = new URLSearchParams(window.location.search);
    const gid = params.get('joinGroup'), code = params.get('code');
    if(gid && code) pendingGroupInvite = { groupId: gid, code };
  }catch(e){}
})();

// ---- Global keyboard shortcuts ----
// Registered exactly once here (NOT inside attachEvents(), which reruns on every render() call —
// adding a document-level listener there would stack a fresh duplicate on every single render).
// Cmd/Ctrl+K opens the quick-jump command palette from anywhere; Escape backs out of whichever
// overlay is currently on top (palette, then dialog, then the group-create sheet, then the
// notification panel, then the mobile "More" sidebar), matching how these layers actually stack
// visually (see their z-index values).
if(typeof document !== 'undefined' && document.addEventListener){
  document.addEventListener('keydown', (e)=>{
    if((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')){
      e.preventDefault();
      openCommandPalette();
      return;
    }
    if(e.key === 'Escape'){
      if(commandPaletteOpen){ closeCommandPalette(); return; }
      if(activeDialog){ closeDialog(activeDialog.mode==='confirm' ? false : null); return; }
      if(groupCreateOpen){ groupCreateOpen = false; render(); return; }
      if(notifPanelOpen){ notifPanelOpen = false; render(); return; }
      if(sidebarOpen){ sidebarOpen = false; render(); return; }
    }
  });
}

refreshNotifStatus();
render();
initFirebase();
// The native splash screen (see capacitor.config.json: launchAutoHide is off) stays up until this
// fires, so the very first thing a person sees on iOS is a finished screen, not a half-built one —
// a no-op on GitHub Pages/any regular browser since capacitorPlugin() finds nothing there.
hideCapacitorSplash();
// Safety net for the web splash (see hideAppSplash): every real code path already clears it —
// firebase missing, a placeholder config, an init error, or a normal auth-state callback — but if
// something upstream hangs entirely, don't leave the app stuck behind the splash forever.
setTimeout(hideAppSplash, 4000);

/* ---------------- Service worker registration (installable + offline) ---------------- */
if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{ /* ignore, app still works without it */ });
  });
}
</script>
</body>
