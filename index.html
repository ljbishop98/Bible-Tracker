<body>
<!-- Static, JS-free splash: painted from the very first frame (before the app script has even
     parsed), so the first thing anyone sees is a finished, branded screen instead of a blank page
     or a half-built layout. hideAppSplash() (see bootstrap section) fades this out once the first
     real screen (auth gate / onboarding / main app) is ready to show, with a hard fallback timeout
     in case anything upstream hangs. -->
<div id="appSplash" class="app-splash" aria-hidden="true">
  <div class="app-splash-inner">
    <img src="./icon-512.png" alt="" class="app-splash-logo">
    <div class="app-splash-name">Cultivate</div>
    <div class="app-splash-dots"><span></span><span></span><span></span></div>
  </div>
</div>
<div id="app"></div>

<script>
/* ---------------- Book library (canonical 66 books) ---------------- */
const BOOK_LIBRARY = [
  {name:'Genesis',chapters:50},{name:'Exodus',chapters:40},{name:'Leviticus',chapters:27},{name:'Numbers',chapters:36},{name:'Deuteronomy',chapters:34},
  {name:'Joshua',chapters:24},{name:'Judges',chapters:21},{name:'Ruth',chapters:4},{name:'1 Samuel',chapters:31},{name:'2 Samuel',chapters:24},
  {name:'1 Kings',chapters:22},{name:'2 Kings',chapters:25},{name:'1 Chronicles',chapters:29},{name:'2 Chronicles',chapters:36},
  {name:'Ezra',chapters:10},{name:'Nehemiah',chapters:13},{name:'Esther',chapters:10},
  {name:'Job',chapters:42},{name:'Psalms',chapters:150},{name:'Proverbs',chapters:31},{name:'Ecclesiastes',chapters:12},{name:'Song of Solomon',chapters:8},
  {name:'Isaiah',chapters:66},{name:'Jeremiah',chapters:52},{name:'Lamentations',chapters:5},{name:'Ezekiel',chapters:48},{name:'Daniel',chapters:12},
  {name:'Hosea',chapters:14},{name:'Joel',chapters:3},{name:'Amos',chapters:9},{name:'Obadiah',chapters:1},{name:'Jonah',chapters:4},{name:'Micah',chapters:7},
  {name:'Nahum',chapters:3},{name:'Habakkuk',chapters:3},{name:'Zephaniah',chapters:3},{name:'Haggai',chapters:2},{name:'Zechariah',chapters:14},{name:'Malachi',chapters:4},
  {name:'Matthew',chapters:28},{name:'Mark',chapters:16},{name:'Luke',chapters:24},{name:'John',chapters:21},{name:'Acts',chapters:28},
  {name:'Romans',chapters:16},{name:'1 Corinthians',chapters:16},{name:'2 Corinthians',chapters:13},{name:'Galatians',chapters:6},{name:'Ephesians',chapters:6},
  {name:'Philippians',chapters:4},{name:'Colossians',chapters:4},{name:'1 Thessalonians',chapters:5},{name:'2 Thessalonians',chapters:3},
  {name:'1 Timothy',chapters:6},{name:'2 Timothy',chapters:4},{name:'Titus',chapters:3},{name:'Philemon',chapters:1},{name:'Hebrews',chapters:13},
  {name:'James',chapters:5},{name:'1 Peter',chapters:5},{name:'2 Peter',chapters:3},{name:'1 John',chapters:5},{name:'2 John',chapters:1},{name:'3 John',chapters:1},
  {name:'Jude',chapters:1},{name:'Revelation',chapters:22}
];
const BIBLE_TOTAL_CHAPTERS = BOOK_LIBRARY.reduce((s,b)=>s+b.chapters,0);
function chaptersFor(bookName){ const b = BOOK_LIBRARY.find(x=>x.name===bookName); return b ? b.chapters : 0; }
function bookObj(bookName){ return {name: bookName, chapters: chaptersFor(bookName)}; }

const COLOR_PALETTE = ['#7a4b2e','#8a5a2b','#2f6b4f','#3d6b8a','#4a5f8a','#8a3d5c','#a34b3e','#6b4f8a','#b8860b','#5c5248','#4b6b3a','#6b3a5c'];
// A soft/tinted counterpart for each COLOR_PALETTE entry, same index-for-index, the same way
// --accent pairs with --accent-soft elsewhere in the app — used for pill-style tags (like the
// book picker) that need a light unselected fill and a solid selected fill of the same hue.
const COLOR_PALETTE_SOFT = ['#f0e4d4','#f2e6d6','#e1efe7','#e0ecf2','#e4e8f2','#f3e2ea','#f6e5e2','#eae3f2','#faf0d8','#eae6e0','#e5eee0','#f0e2ec'];
function hashIndex(str, len){
  str = str || '';
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h % len;
}
// Deterministic color for things that don't have a saved profile color of their own (e.g. group
// icons, book tags) — same name always maps to the same palette entry, so a card's color stays stable.
function colorForName(str){ return COLOR_PALETTE[hashIndex(str, COLOR_PALETTE.length)]; }
function softColorForName(str){ return COLOR_PALETTE_SOFT[hashIndex(str, COLOR_PALETTE_SOFT.length)]; }

/* ---------------- Skeleton loading placeholders ----------------
   Shaped gray pulse blocks instead of literal "Loading…" text — a small thing, but plain text
   reads as a website waiting on a server; a shape that mimics the content that's about to arrive
   reads as an app that already knows what it's about to show you. */
function skeletonBlock(width, height, radius){
  return `<span class="skeleton" style="display:inline-block; width:${width}; height:${height}; border-radius:${radius||'6px'}; vertical-align:middle;"></span>`;
}
function skeletonLine(width){ return skeletonBlock(width||'100%','13px','7px'); }
function skeletonProfileHtml(){
  return `
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:14px;">
      ${skeletonBlock('76px','76px','50%')}
      <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
        ${skeletonLine('55%')}${skeletonLine('75%')}${skeletonLine('40%')}
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      ${skeletonLine('100%')}${skeletonLine('90%')}${skeletonLine('60%')}
    </div>`;
}
function skeletonCardListHtml(count){
  return Array.from({length: count||3}).map(()=>`
    <div class="group-card">
      ${skeletonBlock('44px','44px','50%')}
      <div class="group-info" style="display:flex; flex-direction:column; gap:6px; flex:1;">
        ${skeletonLine('50%')}${skeletonLine('70%')}
      </div>
    </div>`).join('');
}

// Now that other people's text (group discussion messages, viewed profiles) renders on YOUR
// screen — not just your own private journal — anything sourced from another user must be
// escaped before going into innerHTML, or one user could break/inject markup into another's view.
function escapeHtml(s){
  return (s==null ? '' : String(s)).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

/* ---------------- Icon set ----------------
   A small hand-rolled set of stroke-based line icons (24x24, currentColor) — used in place of
   emoji for anything that's part of the app's chrome (nav, header, dialogs). Emoji read as a very
   web/markdown-y shorthand; a consistent icon weight reads as an actual designed interface.
   Returns an inline <svg> string, sized via the `size` param, colored via CSS currentColor so it
   automatically follows text color (including active-state and dark-mode color changes). */
function icon(name, size){
  size = size || 20;
  const paths = {
    home: '<path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9"/>',
    calendar: '<rect x="4" y="5.5" width="16" height="15" rx="2"/><path d="M4 10h16"/><path d="M8 3.5v3M16 3.5v3"/>',

    users: '<circle cx="9" cy="8" r="3"/><path d="M2.5 20c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6"/><circle cx="17" cy="9" r="2.4"/><path d="M15.7 14.2c2.6.4 4.8 2.5 4.8 5.8"/>',
    userPlus: '<circle cx="9.5" cy="8" r="3.5"/><path d="M2.5 20.5c0-3.9 3.1-6.5 7-6.5s7 2.6 7 6.5"/><path d="M19 8v5M16.5 10.5h5"/>',
    person: '<circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c0-4.1 3.4-6.8 7.5-6.8s7.5 2.7 7.5 6.8"/>',
    notebook: '<rect x="5" y="3.5" width="14" height="17" rx="1.6"/><path d="M9 3.5v17"/><path d="M12.5 8h4M12.5 11.5h4M12.5 15h2.5"/>',
    bookmark: '<path d="M6 3.5h12v17l-6-4-6 4z"/>',
    more: '<circle cx="12" cy="5.2" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="18.8" r="1.4"/>',
    back: '<path d="M15 5 8 12l7 7"/>',
    close: '<path d="M6 6l12 12M18 6 6 18"/>',
    sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2.5v2.5M12 19v2.5M4.5 12H2M22 12h-2.5M5.6 5.6l1.8 1.8M16.6 16.6l1.8 1.8M18.4 5.6l-1.8 1.8M7.4 16.6l-1.8 1.8"/>',
    moon: '<path d="M20 14.3A8.3 8.3 0 1 1 9.7 4 6.7 6.7 0 0 0 20 14.3z"/>',
    sunrise: '<path d="M4.5 16.2h15"/><path d="M6 16.2a6 6 0 0 1 12 0"/><path d="M12 5.5v3.2M6.9 9l1.7 1.7M17.1 9l-1.7 1.7"/>',
    gear: '<path d="M3.5 7h6.3M13.4 7h7.1M3.5 12h11.3M18.4 12h2.1M3.5 17h3.3M10.4 17h10.1"/><circle cx="11.6" cy="7" r="1.8"/><circle cx="16.6" cy="12" r="1.8"/><circle cx="8.6" cy="17" r="1.8"/>',
    auto: '<circle cx="12" cy="12" r="8.5"/><path d="M12 3.5v17" stroke-dasharray="0"/><path d="M12 3.5A8.5 8.5 0 0 1 12 20.5z" fill="currentColor" stroke="none"/>',
    check: '<path d="M5 12.5l4.5 4.5L19 7"/>',
    plus: '<path d="M12 5v14M5 12h14"/>',
    bell: '<path d="M12 3.5c-3 0-5 2.3-5 5.4v2.6c0 1-.4 2-1.1 2.7L5 15h14l-.9-.8a3.7 3.7 0 0 1-1.1-2.7V8.9c0-3.1-2-5.4-5-5.4z"/><path d="M9.8 18.5a2.3 2.3 0 0 0 4.4 0"/>',
    trash: '<path d="M5 7h14"/><path d="M9 7V4.8a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1V7"/><path d="M7 7l1 12.2a1.8 1.8 0 0 0 1.8 1.8h4.4A1.8 1.8 0 0 0 16 19.2L17 7"/><path d="M10.3 11v6M13.7 11v6"/>',
    pencil: '<path d="M4 20l1-4L16.5 4.5a1.8 1.8 0 0 1 2.5 0l.5.5a1.8 1.8 0 0 1 0 2.5L8 19l-4 1z"/><path d="M14.5 6.5l3 3"/>',
    // Spiritual check-in mood gradient (Distant -> Dry -> Steady -> Warm -> Close), same hand-rolled
    // stroke style as the rest of the icon set, chosen so the five read as a visible progression
    // rather than five arbitrary pictures: a cloud drifting off, a cracked/thirsty drop, a steady
    // anchor, a sunrise warming up, and finally a close-held heart.
    checkinDistant: '<path d="M7 17.2h10a3.4 3.4 0 0 0 .4-6.8 5 5 0 0 0-9.6-1.6A4 4 0 0 0 7 17.2z"/>',
    checkinDry: '<path d="M12 3.8s5.3 6.2 5.3 9.9a5.3 5.3 0 1 1-10.6 0c0-3.7 5.3-9.9 5.3-9.9z"/><path d="M10.4 10.3l1.4 2-1.6 1.8 1.7 2"/>',
    checkinSteady: '<circle cx="12" cy="5.3" r="1.5"/><path d="M12 6.8v10.7"/><path d="M6.8 11.5H5a7 7 0 0 0 14 0h-1.8"/><path d="M8.2 9.2h7.6"/>',
    checkinWarm: '<path d="M4.5 16.2h15"/><path d="M6 16.2a6 6 0 0 1 12 0"/><path d="M12 5.5v3.2M6.9 9l1.7 1.7M17.1 9l-1.7 1.7"/>',
    checkinClose: '<path d="M12 20s-7-4.4-9.3-8.9A4.9 4.9 0 0 1 12 6a4.9 4.9 0 0 1 9.3 5.1C19 15.6 12 20 12 20z"/>',
  };
  const d = paths[name] || '';
  return `<svg class="icon-svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${d}</svg>`;
}

// A bare sentence sitting alone in a card reads as an unfinished screen — pairing it with a small
// icon and, where there's an obvious single next step, an actual button gives an empty list
// something to look at and something to do, instead of just a gap where content usually goes.
// `message` is inserted as-is (callers pass their own literal copy, nothing user-supplied).
function emptyState(iconName, message, opts){
  opts = opts || {};
  return `<div class="empty-state">
    <div class="empty-state-icon">${icon(iconName, 30)}</div>
    <p class="empty-state-message">${message}</p>
    ${opts.actionLabel && opts.actionId ? `<button type="button" class="btn primary small" id="${opts.actionId}">${opts.actionLabel}</button>` : ''}
  </div>`;
}

/* ---------------- Deep links to Bible apps/sites (verified URL formats) ---------------- */
const READING_APPS = {
  biblegateway: { id:'biblegateway', label:'Bible Gateway', note:'Opens in your browser — works everywhere.' },
  youversion:   { id:'youversion',   label:'YouVersion',     note:'Opens in your browser, auto-switches to the YouVersion app if installed.' },
  blb:          { id:'blb',          label:'Blue Letter Bible', note:'Opens in your browser (King James Version).' },
  olivetree:    { id:'olivetree',    label:'Olive Tree',     note:'Requires the Olive Tree app installed — no web fallback if it isn\'t.' }
};
// Uppercase 3-letter USFM codes YouVersion (bible.com) uses in its passage URLs.
const YOUVERSION_BOOK_CODES = {
  'Genesis':'GEN','Exodus':'EXO','Leviticus':'LEV','Numbers':'NUM','Deuteronomy':'DEU','Joshua':'JOS','Judges':'JDG','Ruth':'RUT',
  '1 Samuel':'1SA','2 Samuel':'2SA','1 Kings':'1KI','2 Kings':'2KI','1 Chronicles':'1CH','2 Chronicles':'2CH','Ezra':'EZR','Nehemiah':'NEH','Esther':'EST',
  'Job':'JOB','Psalms':'PSA','Proverbs':'PRO','Ecclesiastes':'ECC','Song of Solomon':'SNG',
  'Isaiah':'ISA','Jeremiah':'JER','Lamentations':'LAM','Ezekiel':'EZK','Daniel':'DAN',
  'Hosea':'HOS','Joel':'JOL','Amos':'AMO','Obadiah':'OBA','Jonah':'JON','Micah':'MIC','Nahum':'NAM','Habakkuk':'HAB','Zephaniah':'ZEP','Haggai':'HAG','Zechariah':'ZEC','Malachi':'MAL',

function cloneCategories(categories){
  return categories.map(c => ({ id:c.id, name:c.name, color:c.color, books: c.books.map(b=>({name:b.name, chapters:b.chapters})) }));
}
function deriveCategory(cat){
  let flat=[], ranges=[];
  cat.books.forEach(b=>{
    const start=flat.length;
    for(let ch=1; ch<=b.chapters; ch++) flat.push({book:b.name, chapter:ch});
    ranges.push({name:b.name, chapters:b.chapters, start, end:flat.length});
  });
  return { ...cat, flat, bookRanges:ranges, total:flat.length };
}

/* ---------------- Native-style dialogs (replaces window.confirm/alert) ----------------
   The browser's built-in confirm()/alert() are a blocking OS-chrome popup — about as "web" as it
   gets. This renders a centered card in the app's own visual language instead, and — since a real
   dialog can't block synchronously — customConfirm() returns a Promise<boolean> so call sites just
   add a .then() instead of wrapping an if() around a return value. */
let activeDialog = null; // { message, mode:'confirm'|'alert', confirmLabel, cancelLabel, danger, resolve }
function customConfirm(message, opts){
  opts = opts || {};
  return new Promise(resolve=>{
    activeDialog = {
      message, mode:'confirm', resolve,
      confirmLabel: opts.confirmLabel || 'Confirm',
      cancelLabel: opts.cancelLabel || 'Cancel',
      danger: !!opts.danger,
    };
    render();
  });
}
function customAlert(message, opts){
  opts = opts || {};
  activeDialog = { message, mode:'alert', resolve:null, confirmLabel: opts.confirmLabel || 'OK', danger:false };
  render();
}
function closeDialog(result){
  if(!activeDialog) return;
  const resolve = activeDialog.resolve;
  activeDialog = null;
  render();
  if(resolve) resolve(result);
}
let lastRenderedDialogRef = null;
function renderDialogOverlay(){
  if(!activeDialog){ lastRenderedDialogRef = null; return ''; }
  const d = activeDialog;
  // Animate the pop-in only the first time THIS dialog renders — background re-renders while
  // it's open rebuild it without replaying (systemic replay-bug fix).
  const dialogIsNew = d !== lastRenderedDialogRef;
  lastRenderedDialogRef = d;
  return `
  <div id="dialogBackdrop" class="dialog-backdrop ${dialogIsNew?'overlay-animate':''}"></div>
  <div class="dialog-card ${dialogIsNew?'overlay-animate':''}" role="alertdialog" aria-modal="true">
    <p class="dialog-message">${escapeHtml(d.message).replace(/\n/g,'<br>')}</p>
    <div class="dialog-actions">
      ${d.mode==='confirm' ? `<button class="btn" id="dialogCancelBtn">${escapeHtml(d.cancelLabel)}</button>` : ''}
      <button class="btn primary ${d.danger?'danger':''}" id="dialogConfirmBtn">${escapeHtml(d.confirmLabel)}</button>
    </div>
  </div>`;
}

/* ---------------- Toasts (transient feedback) ----------------
   Replaces the old scattered feedback pattern — a little "✓ Copied" line tucked under one
   particular button, a button's own label swapping to "Copied!" for a second, each button call
   site inventing its own version of the same idea — with one consistent transient notification:
   auto-dismissing, stacked bottom-center on phone / top-right on desktop (see CSS), used for things
   like "Friend request sent," "Entry saved," "Invite link copied." */
let toasts = []; // { id, message, tone: 'default'|'good'|'bad' }
let toastCounter = 0;
function showToast(message, opts){
  opts = opts || {};
  const id = ++toastCounter;
  toasts.push({ id, message, tone: opts.tone || 'default', createdAt: Date.now() });
  render();
  setTimeout(()=> dismissToast(id), opts.duration || 2800);
}
function dismissToast(id){
  const before = toasts.length;
  toasts = toasts.filter(t=>t.id!==id);
  if(toasts.length !== before) render();
}
function renderToastStack(){
  if(!toasts.length) return '';
  // Each toast's entrance/exit animations are pinned to its own creation time via NEGATIVE
  // animation-delays, so when a background render rebuilds the stack mid-life, the rebuilt toast
  // resumes exactly where it was on its timeline instead of replaying its pop-in from zero (the
  // systemic "everything replays on re-render" bug, toast edition).
  return `<div class="toast-stack">${toasts.map(t=>{
    const elapsed = Math.min((Date.now() - (t.createdAt||Date.now())) / 1000, 2.79);
    return `
    <div class="toast toast-${t.tone}" data-toast-id="${t.id}" style="animation-delay:${(-elapsed).toFixed(3)}s, ${(2.5 - elapsed).toFixed(3)}s">${escapeHtml(t.message)}</div>`;
  }).join('')}</div>`;
}

/* ---------------- Micro-interaction: animated row removal ----------------
   render() rebuilds the whole tab's markup from scratch, so a deleted journal entry or extra
   reading would normally just vanish the instant the underlying array shrinks — there's no DOM
   diffing to animate against. This plays a quick slide-and-fade on the ACTUAL row still in the
   live DOM first, then runs the real deletion (+ render()) once that's finished, so removing
   something reads as a piece of UI leaving the screen rather than a page abruptly re-rendering. */
function animateRemoval(el, onDone){
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!el || reduceMotion){ onDone(); return; }
  el.classList.add('row-leaving');
  setTimeout(onDone, 200);
}

/* ---------------- Micro-interaction: animated dashboard numbers + progress bars ----------------
   Every render() rebuilds the dashboard's markup from scratch, so a stat that goes from 46 to 47
   would normally just silently BE 47 on the next paint — there's no previous DOM value to animate
   away from. This keeps its own separate memory of the last value seen per stat/bar (independent
   of render()'s own state), so it can tell a genuine change from a re-render that didn't actually
   move the number, and only plays the count-up/fill-in animation for real changes. Runs as a
   small post-render enhancement step (called from render(), see below) rather than being part of
   the render() output itself, since it needs to read/write actual DOM node properties over time. */
let lastDashMetrics = {};
function animateDashboardMetrics(){
  if(activeTab !== 'dashboard') return;
  const app = document.getElementById('app');
  if(!app || !app.querySelectorAll) return;
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const raf = (typeof requestAnimationFrame === 'function') ? requestAnimationFrame : (fn)=> setTimeout(fn, 16);
  const now = ()=> (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();

  app.querySelectorAll('[data-count-to]').forEach(el=>{
    const key = el.dataset.countKey;
    const target = Number(el.dataset.countTo);
    if(!key || isNaN(target)) return;
    const prev = lastDashMetrics[key];
    lastDashMetrics[key] = target;
    if(reduceMotion || prev === undefined || prev === target){ el.textContent = target.toLocaleString(); return; }
    const start = prev, delta = target - start, duration = 500, startTime = now();
    (function tick(){
      const p = Math.min(1, (now() - startTime) / duration);
      const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic — quick start, gentle settle
      el.textContent = Math.round(start + delta * eased).toLocaleString();
      if(p < 1) raf(tick);
    })();
  });

  app.querySelectorAll('[data-bar-key]').forEach(el=>{
    const key = el.dataset.barKey;
    const target = el.style.width; // render() already set the true final width, e.g. "42%"
    const prev = lastDashMetrics['bar:'+key];
    lastDashMetrics['bar:'+key] = target;
    if(reduceMotion || prev === target) return; // no real change (or motion is off) — leave it as rendered
    el.style.width = '0%';
    void el.offsetWidth; // force a reflow so the browser registers 0% before the next line, otherwise both writes collapse into one and there's nothing to transition from
    el.style.width = target;
  });
}

/* ---------------- Time-adaptive theme (Morning / Noon / Night) ----------------
   Replaces the old flat light/dark/auto toggle: 'auto' (the default) now means "follow the actual
   time of day" rather than "follow the OS preference" — the app itself moves through the same
   morning/noon/night rhythm the check-in language and Consider Him section already lean on
   (Psalm 55:17). 'morning'/'noon'/'night' are explicit overrides for pinning one mood regardless
   of the clock. A tiny inline script in <head> already applied both attributes synchronously
   before this script even loaded (to avoid a flash of the wrong theme) — this keeps it in sync
   with that same logic afterward, and keeps re-deriving it as time actually passes while the app
   stays open (see the setInterval below), not just once at load. */
let themeMode = (function(){ try{ return localStorage.getItem('cultivateThemeMode') || 'auto'; }catch(e){ return 'auto'; } })();
// One-time migration: anyone who had the old 'light'/'dark' modes saved gets mapped onto the
// closest new equivalent (dark -> night, light -> auto) rather than landing on an invalid mode.
if(themeMode === 'dark') themeMode = 'night';
else if(themeMode === 'light') themeMode = 'auto';
function computePeriod(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return 'morning';
  if(h >= 12 && h < 18) return 'noon';
  return 'night';
}
function effectivePeriod(){
  return (themeMode === 'morning' || themeMode === 'noon' || themeMode === 'night') ? themeMode : computePeriod();
}
// Night is the only period that's actually dark — kept as its own data-theme:dark/light attribute
// too (alongside data-period) purely so the couple of existing dark-mode-specific CSS selectors and
// the Capacitor status bar icon color still behave correctly without needing their own period-aware
// rewrite.
function effectiveTheme(){ return effectivePeriod() === 'night' ? 'dark' : 'light'; }
function applyTheme(){
  if(document.documentElement){
    document.documentElement.setAttribute('data-theme', effectiveTheme());
    document.documentElement.setAttribute('data-period', effectivePeriod());
  }
  syncCapacitorStatusBar();
}
function cycleThemeMode(){
  const order = ['auto','morning','noon','night'];
  themeMode = order[(order.indexOf(themeMode)+1) % order.length];
  try{ localStorage.setItem('cultivateThemeMode', themeMode); }catch(e){}
  applyTheme();
  render();
}
applyTheme();
// Re-derive the active period every few minutes so an app left open across a boundary (say, noon
// ticking over to night) actually shifts instead of freezing at whatever period it launched in.
// Guarded the same way the existing date-rollover poller is, since the Node vm sandboxes the test
// harnesses run in don't provide setInterval.
if(themeMode === 'auto' && typeof setInterval !== 'undefined'){
  setInterval(()=>{ if(themeMode === 'auto') applyTheme(); }, 5 * 60000);
}
if(typeof document !== 'undefined' && document.addEventListener){
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible' && themeMode === 'auto') applyTheme();
  });
}
function themeToggleHtml(){
  const iconNames = { auto:'auto', morning:'sunrise', noon:'sun', night:'moon' };
  const labels = { auto:'Auto', morning:'Morning', noon:'Noon', night:'Night' };
  return `<button type="button" class="theme-toggle" data-set-theme title="Theme: ${labels[themeMode]} (tap to change)">${icon(iconNames[themeMode],16)} ${labels[themeMode]}</button>`;
}

/* ---------------- Capacitor (native iOS shell) integration ----------------
   This same index.html is deployed two ways: as a plain website on GitHub Pages, and copied
   into ios-app/www and wrapped by Capacitor for the App Store build. `window.Capacitor` and its
   `Plugins` registry only exist inside the native wrapper — on GitHub Pages/any regular browser
   they're simply undefined, so every call here is feature-detected and wrapped in try/catch and
   is a complete no-op on the web. Nothing about the GitHub Pages deployment depends on this. */
function capacitorPlugin(name){
  return (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins[name]) || null;
}
// A light tap of physical feedback on the actions that matter most — marking a reading complete,
// answering the spiritual check-in, confirming a dialog. Native apps do this constantly and it's
// one of the most "physical"-feeling things separating an app from a web page; on the web build
// this whole function is just a no-op.
function hapticTap(style){
  const haptics = capacitorPlugin('Haptics');
  if(!haptics) return;
  try{ haptics.impact({ style: style || 'Light' }); }catch(e){}
}
// Keeps the native status bar's text/icon color in sync with light/dark mode, and its background
// behind the notch matching the app's own --bg, instead of the OS default (a mismatched status
// bar is one of the more obvious "this is just a wrapped website" tells).
function syncCapacitorStatusBar(){
  const statusBar = capacitorPlugin('StatusBar');
  if(!statusBar) return;
  try{
    const dark = effectiveTheme() === 'dark';
    // Capacitor's StatusBarStyle: 'Dark' = dark text/icons (for a light bar), 'Light' = light
    // text/icons (for a dark bar) — so a dark app theme needs the "Light" icon style, and vice versa.
    statusBar.setStyle({ style: dark ? 'Light' : 'Dark' });
    // Reads the ACTUAL --bg custom property rather than a hardcoded hex pair, since there are now
    // three period backgrounds (morning/noon/night) instead of just light/dark — this way the
    // status bar always matches whichever one is actually active without needing its own
    // period-aware branch here.
    if(statusBar.setBackgroundColor && typeof getComputedStyle !== 'undefined' && document.documentElement){
      const bg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
      if(bg) statusBar.setBackgroundColor({ color: bg });
    }
  }catch(e){}
}
// The native splash screen is configured (see capacitor.config.json) to stay up until we
// explicitly hide it, rather than auto-hiding the instant the WebView loads — that avoids a flash
// of an unstyled/half-loaded page between the splash disappearing and the app actually being
// ready, which is exactly the kind of seam that makes a wrapped web app feel like one.
function hideCapacitorSplash(){
  const splash = capacitorPlugin('SplashScreen');
  if(!splash) return;
  try{ splash.hide(); }catch(e){}
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function daysBetween(isoA, isoB){
  const [ay,am,ad] = isoA.split('-').map(Number);
  const [by,bm,bd] = isoB.split('-').map(Number);
  const a = Date.UTC(ay,am-1,ad), b = Date.UTC(by,bm-1,bd);
  return Math.round((b-a)/86400000);
}
function fmtDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}
// A short relative-time label ("3h ago", "just now") for the community feed — falls back to a
// plain date once something's more than a week old, since "23 days ago" reads worse than a date.
function timeAgo(ms){
  if(!ms) return '';
  const diff = Date.now() - ms;
  if(diff < 60000) return 'just now';
  const mins = Math.floor(diff/60000);
  if(mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins/60);
  if(hours < 24) return hours + 'h ago';
  const days = Math.floor(hours/24);
  if(days < 7) return days + 'd ago';
  return new Date(ms).toLocaleDateString(undefined, {month:'short', day:'numeric'});
}

/* ---------------- Core actions ---------------- */
function getDue(catId){
  const cat = catById(catId);
  const idx = state.cursors[catId]||0;
  return cat.flat[idx % cat.total];
}
function logEntriesFor(catId, date){
  return state.log.filter(e=>e.categoryId===catId && e.date===date);
}
function lastActivityDate(){
  if(!state.log.length) return null;
  return state.log.reduce((max,e)=> e.date > max ? e.date : max, state.log[0].date);
}
function lastLogEntry(catId){
  for(let i=state.log.length-1;i>=0;i--){
    if(state.log[i].categoryId===catId) return {entry:state.log[i], index:i};
  }
  return null;
}
function completeReading(catId, date){
  const cat = catById(catId);
  const idx = state.cursors[catId]||0;
  const due = cat.flat[idx];
  state.log.push({date, categoryId:catId, book:due.book, chapter:due.chapter, status:'complete', ts:Date.now()});
  let next = idx+1;
  if(next >= cat.total){ next = 0; state.cycles[catId] = (state.cycles[catId]||0)+1; }
  state.cursors[catId] = next;
  saveState(); render();
}
function skipReading(catId, date){
  const cat = catById(catId);
  const idx = state.cursors[catId]||0;
  const due = cat.flat[idx];
  state.log.push({date, categoryId:catId, book:due.book, chapter:due.chapter, status:'skipped', ts:Date.now()});
  saveState(); render();
}
function undoLast(catId){
  const found = lastLogEntry(catId);
  if(!found) return;
  const { entry, index } = found;
  state.log.splice(index,1);
  if(entry.status==='complete'){
    const cat = catById(catId);
    let idx = state.cursors[catId]-1;
    if(idx < 0){
      idx = cat.total-1;
      state.cycles[catId] = Math.max(0, (state.cycles[catId]||0)-1);
    }
    state.cursors[catId] = idx;
  }
  saveState(); render();
}

/* ---------------- Journal ---------------- */
function addJournalEntry(date, tag, content, title, reference){
  if(!JOURNAL_TAGS.includes(tag)) tag = 'prayer';
  const entry = {
    id: 'j' + Math.random().toString(36).slice(2,9) + Date.now().toString(36),
    date, tag,
    title: (title||'').trim(),
    content: (content||'').trim(),
    reference: (reference && reference.book) ? { book: reference.book, chapter: reference.chapter || null, verse: reference.verse || null } : null,
    ts: Date.now()
  };
  state.journal.push(entry);
  saveState(); render();
}
function formatReference(ref){
  if(!ref || !ref.book) return '';
  let out = ref.book;
  if(ref.chapter) out += ' ' + ref.chapter;
  if(ref.verse) out += ':' + ref.verse;
  return out;
}
function deleteJournalEntry(id){
  state.journal = state.journal.filter(e=>e.id!==id);
  saveState(); render();
}
function journalSorted(){
  return state.journal.slice().sort((a,b)=> a.date===b.date ? b.ts-a.ts : (a.date < b.date ? 1 : -1));
}

function addMemoryVerse(reference, text){
  if(!reference || !reference.trim()) return;
  state.memorization.push({
    id: 'm' + Math.random().toString(36).slice(2,9) + Date.now().toString(36),
    reference: reference.trim(), text: (text||'').trim(),

  });

function reviewMemoryVerse(id){
  const v = state.memorization.find(m=>m.id===id);

  saveState(); render();
}
function toggleMemoryMastered(id){
  const v = state.memorization.find(m=>m.id===id);
  if(!v) return;
  v.status = v.status === 'mastered' ? 'learning' : 'mastered';

function deleteMemoryVerse(id){

  const d = new Date(currentUser.metadata.creationTime);

  return d.toLocaleDateString(undefined, { month:'long', year:'numeric' });

}

/* ---------------- One year ago resurfacing ---------------- */
function oneYearAgoStr(){
  const d = new Date();
  d.setFullYear(d.getFullYear()-1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function oneYearAgoEntries(){
  const target = oneYearAgoStr();
  return {
    journal: state.journal.filter(e=>e.date===target),
    log: state.log.filter(e=>e.date===target && e.status==='complete'),
    date: target
  };
}

/* ---------------- Year in review & monthly summary (reflection framing, not scorecards) ---------------- */
function yearInReviewStats(year){
  const yr = String(year);
  const yearLog = state.log.filter(e=>e.date.slice(0,4)===yr && e.status==='complete');
  const booksTouched = new Set(yearLog.map(e=>e.book));
  const yearJournal = state.journal.filter(e=>e.date.slice(0,4)===yr);
  const tagCounts = {};
  JOURNAL_TAGS.forEach(t=>tagCounts[t]=0);
  yearJournal.forEach(e=>{ tagCounts[e.tag] = (tagCounts[e.tag]||0)+1; });
  const cyclesThisYear = ACTIVE_CATEGORIES.reduce((s,c)=>s+(state.cycles[c.id]||0),0);
  return {
    year: yr,
    chaptersRead: yearLog.length,
    booksTouched: booksTouched.size,
    journalEntries: yearJournal.length,
    tagCounts,
    cyclesCompletedAllTime: cyclesThisYear
  };
}
function monthSummaryStats(ym){
  const monthLog = state.log.filter(e=>e.date.slice(0,7)===ym && e.status==='complete');
  const booksTouched = new Set(monthLog.map(e=>e.book));
  const monthJournal = state.journal.filter(e=>e.date.slice(0,7)===ym);
  const daysActive = new Set(monthLog.map(e=>e.date)).size;
  return { ym, chaptersRead: monthLog.length, booksTouched: booksTouched.size, journalEntries: monthJournal.length, daysActive };
}
function monthsWithActivity(){
  const set = new Set();
  state.log.forEach(e=>{ if(e.status==='complete') set.add(e.date.slice(0,7)); });
  state.journal.forEach(e=>set.add(e.date.slice(0,7)));
  return Array.from(set).sort().reverse();
}

/* ---------------- Feedback (bug reports / suggestions) ---------------- */
let feedbackStatus = 'idle'; // idle | sending | sent | error
function submitFeedback(type, message, email){
  if(!message || !message.trim()){ return; }
  if(!fbDb){ feedbackStatus = 'error'; render(); return; }
  feedbackStatus = 'sending'; render();
  fbDb.collection('feedback').add({
    type: (type === 'bug' ? 'bug' : 'suggestion'),
    message: message.trim(),
    email: (email||'').trim() || (currentUser ? currentUser.email : ''),
    userId: currentUser ? currentUser.uid : null,
    createdAt: Date.now()
  }).then(()=>{ feedbackStatus = 'sent'; render(); })
    .catch(()=>{ feedbackStatus = 'error'; render(); });
}

/* ---------------- Book stats for dashboard ---------------- */
function bookStats(cat){
  const idx = state.cursors[cat.id]||0;
  const cycles = state.cycles[cat.id]||0;
  return cat.bookRanges.map(b=>{
    let passes, progress;
    if(idx >= b.end){ passes = cycles+1; progress = 100; }
    else if(idx >= b.start && idx < b.end){ passes = cycles; progress = Math.round((idx-b.start)/b.chapters*100); }
    else { passes = cycles; progress = 0; }
    let lastDate = null;
    for(let i=state.log.length-1;i>=0;i--){
      const e = state.log[i];
      if(e.book===b.name && e.status==='complete'){ lastDate = e.date; break; }
    }
    return { ...b, passes, progress, lastDate };
  });
}

function subscribeToUserDoc(){
  if(!currentUser) return;
  if(fbUnsub) fbUnsub();
  const docRef = fbDb.collection('userProgress').doc(currentUser.uid);
  fbUnsub = docRef.onSnapshot(snap=>{
    if(!snap.exists){
      pushStateNow(docRef);
      syncStatus='synced'; lastSyncedAt=Date.now(); fbFirstSnapshotHandled=true; render();
      syncPublicActivity(); ensureUserDirectory();
      return;
    }
    const data = snap.data();
    const isFirstSnapshot = !fbFirstSnapshotHandled;
    // Only treat "this looks like our own write" as a no-op AFTER the first snapshot of this
    // subscription. On the very first snapshot (right after signup/login), CLIENT_ID can coincidentally
    // match a write from earlier in the same page session (e.g. logging out and back in without a
    // reload) — that first snapshot must always be processed so the account's real cloud data loads.
    if(!isFirstSnapshot && data._writerId === CLIENT_ID){
      syncStatus='synced'; lastSyncedAt=Date.now(); render();
      return;
    }
    if(isFirstSnapshot){
      fbFirstSnapshotHandled = true;
      const localHasData = state.log.length > 0;
      const remoteHasData = (data.log||[]).length > 0;
      // Used to ask "use this device or the account?" via a confirm dialog whenever both had data —
      // now that syncing itself has been stable for a while, that popup just adds friction for no
      // real benefit: the account/cloud copy is always treated as the source of truth once you're
      // signed in (the one case that still pushes local data up is a genuinely empty account, e.g.
      // first sign-in ever, where there's nothing on the cloud side to prefer over).
      if(localHasData && !remoteHasData){
        pushStateNow(docRef); syncStatus='synced'; lastSyncedAt=Date.now(); render();
        syncPublicActivity(); ensureUserDirectory();
        return;
      }
    }
    applyRemoteState(data);
  }, err=>{
    syncStatus='error'; syncMessage=err.message; render();
  });
}
function applyRemoteState(data){
  state = {
    cursors: data.cursors || {},
    cycles: data.cycles || {},
    log: data.log || [],
    plan: data.plan || null,
    journal: Array.isArray(data.journal) ? data.journal : [],
    readingApp: READING_APPS[data.readingApp] ? data.readingApp : 'biblegateway',
    memorization: Array.isArray(data.memorization) ? data.memorization : [],
    extraLog: Array.isArray(data.extraLog) ? data.extraLog : [],
    checkins: Array.isArray(data.checkins) ? data.checkins : [],
    profile: sanitizeProfile(data.profile)
  };
  saveState({skipSync:true});
  syncStatus='synced'; lastSyncedAt=Date.now();
  render();
  // Keeps the friend-visible activity summary and searchable directory entry fresh on every
  // real sync — not just when someone happens to open their Profile and hit Save. Without this,
  // anyone who never touched their profile settings would have no publicActivity document at
  // all, and friends would see "Unknown" for them forever.
  syncPublicActivity(); ensureUserDirectory();
}

function pushStateNow(docRefOverride){
  if(!fbDb || !currentUser) return;
  const docRef = docRefOverride || fbDb.collection('userProgress').doc(currentUser.uid);
  docRef.set({
    cursors: state.cursors, cycles: state.cycles, log: state.log, plan: state.plan, journal: state.journal, readingApp: state.readingApp,
    memorization: state.memorization, extraLog: state.extraLog, checkins: state.checkins, profile: state.profile,
    _writerId: CLIENT_ID, _updatedAt: Date.now()
  }).catch(err=>{ syncStatus='error'; syncMessage=err.message; render(); });
  syncPublicActivity();
}
function scheduleRemoteSync(){
  if(!currentUser) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(()=>{
    if(!fbDb){ return; }
    if(!navigator.onLine){ syncStatus='offline'; syncMessage='No connection — will sync when back online.'; render(); return; }
    pushStateNow();
  }, 500);
}
window.addEventListener('online', ()=>{ if(currentUser && fbDb) pushStateNow(); });
window.addEventListener('offline', ()=>{ if(currentUser){ syncStatus='offline'; syncMessage='No connection — working locally.'; render(); } });

function sanitizeEmailKey(email){
  return (email||'').trim().toLowerCase().replace(/[^a-z0-9@._-]/g,'_');
}
function friendLinkId(uidA, uidB){
  return uidA < uidB ? uidA + '_' + uidB : uidB + '_' + uidA;
}
let friendLinksData = []; // raw docs {id, ...}
let friendActivityCache = {}; // uid -> publicActivity data
let friendsUnsub = null;
let friendRequestEmail = '';
let friendRequestError = '';

// doc stays friend-gated as before.

function syncPublicActivity(){

  const last30Str = last30.toISOString().slice(0,10);
  const activeDays = new Set(state.log.filter(e=>e.status==='complete' && e.date >= last30Str).map(e=>e.date)).size;
  const planName = currentPlanName();
  // Carries the full profile (not just the activity summary) so that a "public" profile can be
  // read by any signed-in user, not only accepted friends — the read rule checks `visibility`
  // right on this same document. Friends always see all of it regardless of visibility, same as
  // before; the only thing `visibility` changes is whether NON-friends can read it too.
  fbDb.collection('publicActivity').doc(currentUser.uid).set({

// Names for a PENDING request's other party can't come from publicActivity — that collection
// is friend-gated (accepted friends only), so reading it for someone you're not yet connected to
// would just fail. userDirectory is the broadly-readable, name-only collection built for exactly
// this kind of lookup, so pending incoming/outgoing rows use it instead (no photo there by design —
// falls back to a colored initial until/unless the request is accepted).
let friendNameCache = {}; // uid -> displayName, for pending links
let friendsSubRetryCount = 0;
let friendsListenerError = ''; // surfaced in the Friends tab's troubleshooting panel, not just the console
function subscribeFriends(){
  if(!fbDb || !currentUser) return;
  if(friendsUnsub) friendsUnsub();
  friendsUnsub = fbDb.collection('friendLinks').where('userIds','array-contains',currentUser.uid)
    .onSnapshot(snap=>{
      friendsSubRetryCount = 0; // a good snapshot means the connection is healthy again
      friendsListenerError = '';
      friendLinksData = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      const acceptedUids = friendLinksData.filter(l=>l.status==='accepted').map(l=> l.userIds.find(u=>u!==currentUser.uid));
      const pendingUids = friendLinksData.filter(l=>l.status==='pending').map(l=> l.userIds.find(u=>u!==currentUser.uid));
      acceptedUids.forEach(uid=>{
        if(!friendActivityCache[uid]){
          fbDb.collection('publicActivity').doc(uid).get().then(doc=>{
            if(doc.exists){ friendActivityCache[uid] = doc.data(); render(); return; }
            // Deliberately NOT cached as a permanent "unknown" placeholder — that document tends
            // to simply not exist yet for someone who hasn't synced since this feature shipped.
            // Leaving the cache empty means this retries the next time the friends list refreshes
            // (reconnect, a new/removed connection, etc.) instead of showing "Unknown" forever
            // for the rest of the session.
          }).catch(()=>{});
        }
      });
      pendingUids.forEach(uid=>{
        if(!friendNameCache[uid]){
          fbDb.collection('userDirectory').doc(uid).get().then(doc=>{
            friendNameCache[uid] = doc.exists ? doc.data().displayName : '(unknown)';
            render();
          }).catch(()=>{});
        }
      });
      render();
    }, err=>{
      console.warn('friends listener error', err);
      friendsListenerError = (err && err.code) ? `${err.code}: ${err.message||''}` : String(err);
      render();
      // Without this, a single transient error (a permission hiccup, a brief network drop, the
      // kind of thing that can happen mid-way through changing Firestore data) kills this listener
      // PERMANENTLY for the rest of the session — Firestore does not auto-retry a failed onSnapshot,
      // and nothing was re-subscribing, so requests/friends would silently stop updating until the
      // user manually reloaded the page. Retry with backoff instead, capped so a persistent problem
      // (e.g. a genuine rules issue) doesn't retry forever.
      if(friendsSubRetryCount < 5 && currentUser){
        friendsSubRetryCount++;
        setTimeout(()=>{ if(currentUser) subscribeFriends(); }, 2000 * friendsSubRetryCount);
      }
    });
}
// Shared core: create the pending link doc once we already know the target uid.
function createFriendLink(targetUid){
  if(targetUid === currentUser.uid) return Promise.reject({ message: "That's your own account." });
  const linkId = friendLinkId(currentUser.uid, targetUid);
  const ref = fbDb.collection('friendLinks').doc(linkId);
  return ref.get().then(existing=>{
    if(existing.exists) throw { message: 'You already have a connection (or pending request) with this person.' };
    return ref.set({
      userIds: [currentUser.uid, targetUid].sort(),
      status:'pending', requestedBy: currentUser.uid, createdAt: Date.now()
    });
  });
}
function sendFriendRequest(email){
  friendRequestError = ''; friendRequestSent = false; friendRequestBusy = true; render();
  const key = sanitizeEmailKey(email);
  // Single chained promise all the way through, so ANY failure at ANY step — including ones
  // that used to be an orphaned inner .then() with no .catch() — reliably lands in the one
  // .catch() at the bottom instead of leaving the button stuck on "Sending…" forever.
  fbDb.collection('emailIndex').doc(key).get().then(doc=>{
    if(!doc.exists) throw { message: 'No Cultivate account found with that email. Have they opened Cultivate and signed in at least once?' };
    return createFriendLink(doc.data().uid);
  }).then(()=>{
    friendRequestBusy = false; friendRequestEmail = ''; friendRequestSent = true; render();
    showToast('Friend request sent.', { tone:'good' });
  }).catch(err=>{
    friendRequestError = (err && err.message) || 'Something went wrong sending that request — check your connection and try again.';
    friendRequestBusy = false; render();
  });
}
function sendFriendRequestToUid(targetUid){
  friendRequestError = ''; friendRequestSent = false; render();
  createFriendLink(targetUid).then(()=>{
    friendRequestSent = true; render();
    showToast('Friend request sent.', { tone:'good' });
  }).catch(err=>{

    render();

}
function acceptFriendRequest(linkId){
  // acceptedAt (new in v31) is what lets the REQUESTER's bell show "accepted your request" —
  // and only for recently-accepted links, not every old friendship forever.
  fbDb.collection('friendLinks').doc(linkId).set({ status:'accepted', acceptedAt: Date.now() }, { merge:true }).catch(()=>{});

function declineFriendRequest(linkId){
  fbDb.collection('friendLinks').doc(linkId).delete().catch(()=>{});

function friendStatusWith(uid){
  const linkId = friendLinkId(currentUser.uid, uid);
  const link = friendLinksData.find(l=>l.id===linkId);

/* ---------------- Friend search (search-as-you-type, by name or exact email) ---------------- */
let friendSearchQuery = '';
let friendSearchResults = [];
let friendSearchBusy = false;
let friendSearchToken = 0;
let friendSearchDebounce = null;
const FRIEND_SEARCH_LIMIT = 10;

// Firestore can only do prefix-range queries efficiently (">= q" / "<= q+"), which means
// typing "jo" would find "John" but never "Marjorie" — real substring/"contains" search has to
// happen client-side. The user base is still small, so the simplest reliable approach is to cache
// the whole (name-only, non-sensitive) userDirectory in memory and filter it in JS on every
// keystroke — instant results, true partial matching, and zero extra Firestore reads per character
// typed. Re-fetched at most once a minute, or whenever it's actually needed again after that.
let friendDirectoryCache = [];
let friendDirectoryCacheAt = 0;
let friendDirectoryLoading = null; // in-flight promise, so parallel callers share one fetch
function loadFriendDirectory(force){
  if(!fbDb || !currentUser) return Promise.resolve();
  const FRESH_MS = 60000;
  if(!force && friendDirectoryCache.length && (Date.now() - friendDirectoryCacheAt) < FRESH_MS){
    return Promise.resolve();
  }
  if(friendDirectoryLoading) return friendDirectoryLoading;
  friendDirectoryLoading = fbDb.collection('userDirectory').limit(500).get().then(snap=>{
    friendDirectoryCache = snap.docs.map(d=>{
      const data = d.data();
      const displayName = data.displayName || '';
      return { uid: d.id, displayName, displayNameLower: data.displayNameLower || displayName.toLowerCase() };
    });
    friendDirectoryCacheAt = Date.now();
    friendDirectoryLoading = null;
  }).catch(()=>{ friendDirectoryLoading = null; });
  return friendDirectoryLoading;
}
function searchFriends(queryText){
  friendSearchQuery = queryText;
  const q = queryText.trim();
  if(!q){ friendSearchResults = []; friendSearchBusy = false; render(); return; }
  const myToken = ++friendSearchToken;
  friendSearchBusy = true; render();
  const tasks = [];
  if(q.includes('@')){
    const key = sanitizeEmailKey(q);
    tasks.push(
      fbDb.collection('emailIndex').doc(key).get().then(doc=>{
        if(!doc.exists) return null;
        const uid = doc.data().uid;
        return fbDb.collection('userDirectory').doc(uid).get().then(dirDoc=>({
          uid, displayName: dirDoc.exists ? dirDoc.data().displayName : q
        }));
      }).catch(()=>null)
    );
  }
  const qLower = q.toLowerCase();
  tasks.push(
    loadFriendDirectory().then(()=>{
      const scored = [];
      friendDirectoryCache.forEach(entry=>{
        if(entry.uid === currentUser.uid) return;
        const idx = entry.displayNameLower.indexOf(qLower);
        if(idx === -1) return;
        // Names starting with what was typed rank above names that merely contain it somewhere
        // in the middle; shorter names break ties (they're closer to an exact match).
        const score = (idx === 0 ? 0 : 1000) + entry.displayName.length;
        scored.push({ uid: entry.uid, displayName: entry.displayName, score });
      });
      scored.sort((a,b)=> a.score - b.score);
      return scored.slice(0, FRIEND_SEARCH_LIMIT).map(r=>({ uid:r.uid, displayName:r.displayName }));
    })
  );
  Promise.all(tasks).then(resultsArrays=>{
    if(myToken !== friendSearchToken) return; // a newer keystroke already superseded this search
    const seen = new Set(); const merged = [];
    resultsArrays.flat().filter(Boolean).forEach(r=>{
      if(r.uid !== currentUser.uid && !seen.has(r.uid)){ seen.add(r.uid); merged.push(r); }
    });
    friendSearchResults = merged.slice(0, FRIEND_SEARCH_LIMIT);
    friendSearchBusy = false;
    render();
  });
}

/* ---------------- Groups (Bible studies, tables, devotion groups) ----------------
   Design notes, since this touches Firestore rules in a way that bit us once already this
   project (the friendLinks list-query bug): every LIST rule below is either (a) a blanket
   auth-only condition with zero dependency on the matched documents' data, or (b) a condition
   based only on a get() of a path derived from request.auth.uid (the CALLER's own membership
   doc) — never a condition that depends on each individual matched document's own fields. Both
   of those are things Firestore can prove hold for an entire query's potential result set, which
   is what made the friendLinks bug happen the first time (an ID-split rule couldn't be correlated
   with a query filtered on a different field). Single-document get/create/update/delete rules
   don't have this restriction at all — they can reference resource.data freely.

   Progress within a group (paced or free) is tracked as a single "cursor": how many chapters
   into the group's flattened reading outline this member has personally read. For a free-pace
   group that's the whole story. For a paced group, the SAME cursor is kept, but the group also
   has a chaptersPerWeek + startDate, so "this week's assigned reading" can be computed on the fly
   without needing a separately-stored week-by-week schedule.
------------------------------------------------------------------------------- */
function generateInviteCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous 0/O/1/I
  let out = '';
  for(let i=0;i<8;i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}
// Turns an ordered list of {book, chapters} into a flat ordered list of {book, chapter} —
// the group's actual reading sequence, used identically whether the group is paced or free.
function flattenOutline(outline){
  const out = [];
  (outline||[]).forEach(entry=>{
    const total = entry.chapters || chaptersFor(entry.book);
    for(let c=1;c<=total;c++) out.push({ book: entry.book, chapter: c });
  });
  return out;
}
function outlineTotalChapters(outline){
  return (outline||[]).reduce((s,e)=> s + (e.chapters || chaptersFor(e.book)), 0);
}
// Which week (0-indexed) a paced group is currently on, based on its start date.
function currentGroupWeekIndex(startDate){
  if(!startDate) return 0;
  const start = new Date(startDate + 'T00:00:00');
  const now = new Date();
  const days = Math.floor((now - start) / 86400000);
  return Math.max(0, Math.floor(days / 7));
}
// The slice of the flattened outline assigned to a given week of a paced group.
function chaptersForWeek(outline, chaptersPerWeek, weekIndex){
  const flat = flattenOutline(outline);
  const perWeek = Math.max(1, chaptersPerWeek||1);
  return flat.slice(weekIndex*perWeek, weekIndex*perWeek + perWeek);
}
function formatChapterRange(chapters){
  if(!chapters.length) return '';
  if(chapters.length === 1) return `${chapters[0].book} ${chapters[0].chapter}`;
  const first = chapters[0], last = chapters[chapters.length-1];
  if(first.book === last.book) return `${first.book} ${first.chapter}–${last.chapter}`;
  return `${first.book} ${first.chapter} – ${last.book} ${last.chapter}`;
}
// Detects "@Name" mentions in a discussion message against the group's known members, returns
// the list of mentioned uids plus HTML with each recognized mention wrapped for a visual
// highlight (bold + accent color) — visual only for now, no push notification.
function parseMentions(text, members){
  const escaped = escapeHtml(text);
  const mentionedUids = [];
  // Sort longest-name-first so "@John Smith" matches before a shorter "@John" would steal it.
  // A match is swapped out for a placeholder token immediately (rather than the final HTML), so
  // a shorter name that happens to be a PREFIX of an already-matched longer one (like "John" inside
  // "John Smith") can't also match against text that's already been claimed — the placeholder no
  // longer contains "@John" as a substring once the longer match has consumed it.
  const sorted = (members||[]).slice().sort((a,b)=> (b.displayName||'').length - (a.displayName||'').length);
  let working = escaped;
  const placeholders = [];
  sorted.forEach(m=>{
    if(!m.displayName) return;
    const escapedName = escapeHtml(m.displayName);
    const at = '@' + escapedName;
    if(working.includes(at)){
      mentionedUids.push(m.uid);
      // A distinctive marker real message text won't plausibly contain, used only to reserve
      // this spot until every member's been checked — swapped for the real highlighted HTML after.
      const token = '@@MENTIONSLOT' + placeholders.length + '@@';
      placeholders.push(`<strong style="color:var(--accent);">${at}</strong>`);
      working = working.split(at).join(token);
    }
  });
  placeholders.forEach((frag, i)=>{ working = working.split('@@MENTIONSLOT'+i+'@@').join(frag); });
  return { html: working, mentionedUids };
}

let myGroupIds = [];
let myGroupRoles = {}; // groupId -> my role in that group ('owner'|'admin'|'member'), from the same query below — lets the notification bell know which groups' join requests are actually mine to review.
let myGroupsUnsub = null;
let myGroupsSubRetryCount = 0;
let myGroupsListenerError = ''; // surfaced in the group directory's empty/troubleshooting state, not just the console
// "My groups" is derived directly from the members subcollections via a collectionGroup query,
// rather than a separate denormalized userGroups doc. The denormalized-doc version had a real
// permission problem: approving someone else's join request would need to write into THEIR
// userGroups doc, which Firestore rules can't safely allow without a much bigger hole. Deriving
// it from `members` instead — every member doc carries a plain `uid` field (equal to its own
// doc ID) specifically so this query can filter on it. Note: Firestore may prompt to auto-create
// a collection-group index the first time this runs in a real project — that's expected, just
// follow the link it gives you once.
// ROOT CAUSE of the "my groups never populate — I have to press Join every time" bug: a
// collectionGroup('members') query does NOT match the path-specific rule
// `match /groups/{groupId}/members/{uid}` — Firestore requires an explicit recursive-wildcard rule
// (`match /{path=**}/members/{uid}`) for collection-group queries, which the rules never had. So
// this listener was permission-denied on every attempt, gave up after 5 retries, and myGroupIds
// stayed empty — while pressing Join "worked" because attemptJoinOrOpen() does a direct doc get()
// (which the path-based rule DOES allow) and patched the list locally for that one session.
// Fixed three ways at once:
//   1. firestore_rules_v18 adds the collection-group rule, making this query actually legal.
//   2. Known memberships are cached in localStorage (per uid) and rehydrated at subscribe time by
//      direct per-doc gets — the one read shape that always worked — so My Groups populates
//      instantly and correctly even if the collection-group query is ever degraded again
//      (rules not yet deployed, missing index, transient outage).
//   3. Retries no longer give up after 5 attempts — they back off up to 60s and keep trying.
const MY_GROUPS_CACHE_KEY = 'cultivateMyGroupsCache';
function persistMyGroupsCache(){
  if(!currentUser) return;
  try{
    const all = JSON.parse(localStorage.getItem(MY_GROUPS_CACHE_KEY)||'{}');
    all[currentUser.uid] = { ids: myGroupIds, roles: myGroupRoles };
    localStorage.setItem(MY_GROUPS_CACHE_KEY, JSON.stringify(all));
  }catch(e){}
}
function applyMyGroups(ids, roles){
  myGroupIds = ids;
  myGroupRoles = roles;
  persistMyGroupsCache();
  if(!groupDirTabAutoSet && myGroupIds.length){ groupDirTab = 'mine'; groupDirTabAutoSet = true; }
  ensureMyGroupsInDirectory();
  syncAdminJoinRequestSubs();
  render();
}
// Rehydrate + verify cached memberships via direct doc gets. Verification matters both ways:
// it drops groups you've since left (or that were deleted), and it re-confirms the ones you're
// still in, so a stale cache can neither hide a group nor resurrect a dead one.
function verifyCachedMyGroups(){
  if(!fbDb || !currentUser) return;
  let cached = null;
  try{ cached = (JSON.parse(localStorage.getItem(MY_GROUPS_CACHE_KEY)||'{}'))[currentUser.uid] || null; }catch(e){}
  if(!cached || !Array.isArray(cached.ids) || !cached.ids.length) return;
  const uid = currentUser.uid;
  Promise.all(cached.ids.map(gid =>
    fbDb.collection('groups').doc(gid).collection('members').doc(uid).get()
      .then(doc => doc.exists ? { gid, role: doc.data().role } : null)
      .catch(()=> null)
  )).then(results=>{
    if(!currentUser || currentUser.uid !== uid) return;
    const confirmed = results.filter(Boolean);
    if(!confirmed.length) return;
    // Merge (don't overwrite) — if the live listener already delivered a fuller answer, keep it.
    const ids = Array.from(new Set(myGroupIds.concat(confirmed.map(r=>r.gid))));
    const roles = Object.assign({}, myGroupRoles);
    confirmed.forEach(r=>{ if(!(r.gid in roles)) roles[r.gid] = r.role; });
    applyMyGroups(ids, roles);
  });
}
function subscribeMyGroups(){
  if(!fbDb || !currentUser) return;
  if(myGroupsUnsub) myGroupsUnsub();
  verifyCachedMyGroups();
  myGroupsUnsub = fbDb.collectionGroup('members').where('uid','==',currentUser.uid).onSnapshot(snap=>{
    myGroupsSubRetryCount = 0;
    myGroupsListenerError = '';
    const ids = snap.docs.map(d=> d.ref.parent.parent.id);
    const roles = {};
    snap.docs.forEach(d=>{ roles[d.ref.parent.parent.id] = d.data().role; });
    applyMyGroups(ids, roles);
  }, err=>{
    console.warn('my-groups listener error', err);
    myGroupsListenerError = (err && err.code) ? `${err.code}: ${err.message||''}` : String(err);
    render();
    if(currentUser){
      myGroupsSubRetryCount++;
      const delay = Math.min(2000 * myGroupsSubRetryCount, 60000);
      setTimeout(()=>{ if(currentUser) subscribeMyGroups(); }, delay);
    }
  });
}
// ---- Notification bell: @mentions across all your groups ----
// One collection-group listener over every messages subcollection, filtered to messages whose
// mentionedUids contains me — this is what makes "@you" reach the bell even when that group
// isn't open. Requires the v20 recursive-wildcard rule on /{path=**}/messages (same class of
// rule the My Groups fix needed) and possibly a one-click collection-group index the first time
// it runs. No orderBy on purpose: keeps the index requirement minimal; sorted client-side.
let myMentions = [];

let adminJoinRequestSubs = {}; // groupId -> unsubscribe function
let adminJoinRequests = {}; // groupId -> array of {id, groupId, ...doc data}
function syncAdminJoinRequestSubs(){
  if(!fbDb) return;

  const adminSet = new Set(adminIds);

// ---- Dismissal ----
// Actionable items (a friend request, a group join request) never need explicit dismiss-tracking —
// they're pulled live from real data, so accepting/declining/approving simply removes the
// underlying doc and they fall out of notifItems() on their own. Informational nudges (the check-in
// reminder, "on this day") have no such resolution, so THEY get an explicit, persisted dismissal —
// scoped into the id itself (today's date, or the specific "one year ago" date) so dismissing today's
// nudge doesn't suppress a future one once the underlying condition recurs.
let dismissedNotifIds = new Set();
try{ dismissedNotifIds = new Set(JSON.parse(localStorage.getItem('cultivateDismissedNotifIds')||'[]')); }catch(e){}
function persistDismissedNotifIds(){
  try{ localStorage.setItem('cultivateDismissedNotifIds', JSON.stringify(Array.from(dismissedNotifIds))); }catch(e){}
}
function isInformationalNotifId(id){
  return id.indexOf('checkin:')===0 || id.indexOf('onthisday:')===0 ||
         id.indexOf('mention:')===0 || id.indexOf('friendAccepted:')===0 || id.indexOf('memorize:')===0;
}
function dismissInformationalNotifs(items){
  let changed = false;
  items.forEach(i=>{ if(isInformationalNotifId(i.id) && !dismissedNotifIds.has(i.id)){ dismissedNotifIds.add(i.id); changed = true; } });
  if(changed) persistDismissedNotifIds();
  return changed;
}
// Aggregates everything the bell/inbox surfaces, newest-first: incoming friend requests, group
// join requests waiting on my approval, the check-in nudge, and today's "one year ago" memory.
// Each item carries its own `action()` so renderNotifPanel/attachEvents stay dumb dispatchers.
function notifItems(){
  if(!currentUser) return [];
  const myUid = currentUser.uid;
  const items = [];
  friendLinksData.filter(l=>l.status==='pending' && l.requestedBy!==myUid).forEach(l=>{
    items.push({
      id:'friend:'+l.id, iconName:'userPlus', text:'New friend request', sub:'Tap to view in Friends',

      // sub-tab instead of a tab id that no longer exists.
      action:()=>{ notifPanelOpen=false; communitySubTab='friends'; switchToTab('community'); }
    });
  });
  // Requests YOU sent that got accepted recently (acceptedAt stamped since v31) — informational,
  // dismissible, quietly ages out after a week.
  friendLinksData.filter(l=> l.status==='accepted' && l.requestedBy===myUid && l.acceptedAt && (Date.now()-l.acceptedAt) < MENTION_WINDOW_MS).forEach(l=>{
    items.push({
      id:'friendAccepted:'+l.id, iconName:'users', text:'Friend request accepted',
      sub:'You’re now connected — tap to see your friends', time:l.acceptedAt,
      action:()=>{ notifPanelOpen=false; communitySubTab='friends'; switchToTab('community'); }
    });
  });
  // @mentions in group discussions (from the collection-group listener above).
  myMentions.forEach(m=>{
    const g = groupsDirectory.find(x=>x.id===m.groupId);
    items.push({
      id:'mention:'+m.id, iconName:'users', text:(m.authorName||'Someone')+' mentioned you',
      sub:(g ? g.name : 'A group discussion') + ' — tap to open', time:m.createdAt||0,
      action:()=>{ notifPanelOpen=false; communitySubTab='groups'; switchToTab('community'); openGroup(m.groupId); }
    });
  });
  // Memorization: verses still being learned, none reviewed yet today — one quiet nudge per day.
  const learningVerses = (state.memorization||[]).filter(v=>v.status!=='mastered');
  if(learningVerses.length && !learningVerses.some(v=>v.lastReviewed === todayStr())){
    items.push({
      id:'memorize:'+todayStr(), iconName:'bookmark',
      text: learningVerses.length===1 ? 'A verse is waiting for review' : learningVerses.length+' verses are waiting for review',
      sub:'Tap to review in Memorize', time: Date.now(),
      action:()=>{ notifPanelOpen=false; switchToTab('memorize'); }
    });
  }
  Object.keys(adminJoinRequests).forEach(gid=>{
    (adminJoinRequests[gid]||[]).forEach(r=>{
      const g = groupsDirectory.find(x=>x.id===gid);
      items.push({
        id:'joinreq:'+gid+':'+r.id, iconName:'users', text:'Group join request',
        sub:(g ? g.name : 'A group you manage') + ' — tap to review', time:r.createdAt||0,
        action:()=>{ notifPanelOpen=false; activeTab='community'; communitySubTab='groups'; openGroup(gid); activeGroupTab='requests'; render(); }
      });
    });
  });
  const last = lastActivityDate();
  if(last){
    const gap = daysBetween(last, todayStr());
    if(gap >= 3){
      items.push({
        id:'checkin:'+todayStr(), iconName:'calendar', text:"Haven't logged a reading in "+gap+' days',
        sub:'No pressure — tap to open Today', time:0,
        action:()=>{ notifPanelOpen=false; switchToTab('today'); }

  const oya = oneYearAgoEntries();
  if((oya.journal && oya.journal.length) || (oya.log && oya.log.length)){
    items.push({
      id:'onthisday:'+oya.date, iconName:'bookmark', text:'On this day, one year ago', sub:'A memory resurfaced in your Journal',
      time:0,
      action:()=>{ notifPanelOpen=false; switchToTab('journal'); }
    });
  }
  const visible = items.filter(i=> !dismissedNotifIds.has(i.id));
  visible.sort((a,b)=> (b.time||0)-(a.time||0));
  return visible;
}

function runNotifItem(id){

// "My Groups" is rendered by filtering `groupsDirectory` down to ids in `myGroupIds` (see
// renderGroupsDirectory) — but groupsDirectory itself comes from ONE broad collection-wide list()
// query, capped at 200 docs and cached after the first load. That query can miss a group you
// genuinely belong to: Firestore rules commonly allow reading a single group doc by ID more
// readily than an unrestricted list() across the whole collection, and even when both are allowed
// identically, a group you were just added to may simply postdate the last list() snapshot this
// session took. Either way, the result was the exact bug reported: a brand-new group is visible
// right after creation (openGroup() reads it directly, doc-by-doc, nothing to do with this list),
// but "disappears" the moment you navigate back to the plain directory view. Fix: whenever
// myGroupIds changes, fetch any group it names that isn't already in groupsDirectory, directly by
// ID — a plain get(), the least restrictive read there is — and merge it in.
function ensureMyGroupsInDirectory(){
  if(!fbDb) return;
  const known = new Set(groupsDirectory.map(g=>g.id));
  const missing = myGroupIds.filter(id=> !known.has(id));
  if(!missing.length) return;
  Promise.all(missing.map(id=>
    fbDb.collection('groups').doc(id).get().then(doc=> doc.exists ? { id:doc.id, ...doc.data() } : null).catch(()=>null)
  )).then(results=>{
    const found = results.filter(Boolean);
    if(!found.length) return;
    const known2 = new Set(groupsDirectory.map(g=>g.id));
    found.forEach(g=>{ if(!known2.has(g.id)){ groupsDirectory.push(g); known2.add(g.id); } });
    render();
  });
}

// ---- Guided sessions: completion + passage detection ----
// Marking a session done writes ONLY into your own progress doc ({ uid, completed: {sid: ts} }),
// and mirrors your personal completed-count into state.groupSessionsDone[groupId] so the
// dashboard can count group study work without needing any extra listeners (state already
// persists locally and syncs through the normal userProgress channel).
function toggleSessionDone(groupId, sessionId){
  if(!fbDb || !currentUser) return;
  const mine = Object.assign({}, activeGroupProgress[currentUser.uid] || {});
  const wasDone = !!mine[sessionId];
  if(wasDone) delete mine[sessionId]; else mine[sessionId] = Date.now();
  // Optimistic local update so the checkbox responds instantly; snapshot confirms right after.
  activeGroupProgress = Object.assign({}, activeGroupProgress, { [currentUser.uid]: mine });
  if(!state.groupSessionsDone) state.groupSessionsDone = {};
  state.groupSessionsDone[groupId] = Object.keys(mine).length;
  saveState();
  if(!wasDone) hapticTap('Light');
  render();
  fbDb.collection('groups').doc(groupId).collection('progress').doc(currentUser.uid).set({
    uid: currentUser.uid, completed: mine
  }).catch(()=>{ showToast("Couldn't sync that — it'll retry next time."); });
}
// If a session's reading starts with a recognizable Bible book ("Philippians 1–2",
// "1 John 3", …), surface a one-tap "Read →" deep link into the person's chosen Bible app —
// same mechanism as Today's cards. Non-Bible readings ("Chapter 3 of Sit, Walk, Stand") simply
// don't get a link, no configuration needed either way.
function detectBiblePassage(reading){
  const text = (reading||'').trim();
  if(!text) return null;
  const lower = text.toLowerCase();
  let best = null;
  BOOK_LIBRARY.forEach(b=>{
    const n = b.name.toLowerCase();
    if(lower.startsWith(n) && (!best || n.length > best.name.length)) best = { name:b.name, len:n.length };
  });
  if(!best) return null;
  const rest = text.slice(best.len);
  const m = rest.match(/\d+/);
  return { book: best.name, chapter: m ? Number(m[0]) : 1 };
}

// The step order is dynamic: "paceDetail" (chapters/week) only exists when Paced is chosen, and

// Restores a draft left over from a previous visit (closed the wizard partway through, or the app

function restoreGroupWizardDraft(){

    .filter(s=>(s.reading||'').trim())

    startDate: fields.planMode === 'paced' ? todayStr() : null,

  return groupRef.set(groupDoc).then(()=>
    groupRef.collection('members').doc(currentUser.uid).set({

    // it means "My Groups" is correct even in the window before that request resolves.
    if(!groupsDirectory.some(g=>g.id===groupRef.id)) groupsDirectory.push({ id: groupRef.id, ...groupDoc });
    loadGroupsDirectory(true);
    openGroup(groupRef.id);
  }).catch(err=>{
    groupCreateBusy = false; groupCreateError = (err&&err.message) || 'Something went wrong creating that group.';
    render();
  });
}

// ---- Join flow ----
let groupJoinBusy = false;
let groupJoinError = '';
// Wraps requestToJoinGroup with a direct, guaranteed-cheap membership check first — fixes the
// reported bug where a group's own owner (created moments ago, or affected by a slow/broken
// myGroupIds listener — see subscribeMyGroups above) still saw a "Join" button, and clicking it
// appeared to do nothing (it was quietly filing a join request for a group they already belonged
// to, which never resolves into anything since there's no membership left to grant). A plain
// get() on your own membership doc is the least-restrictive read Firestore rules allow here, so
// it works even if the broader collectionGroup query is degraded for any reason.
function attemptJoinOrOpen(groupId){
  if(!fbDb || !currentUser) return;
  fbDb.collection('groups').doc(groupId).collection('members').doc(currentUser.uid).get().then(doc=>{
    if(doc.exists){
      if(!myGroupIds.includes(groupId)){
        // Persist through applyMyGroups (localStorage cache + directory patch + admin subs),
        // not a bare local concat — so this survives the next refresh instead of lasting one session.
        applyMyGroups(myGroupIds.concat([groupId]), Object.assign({}, myGroupRoles, { [groupId]: doc.data().role }));
      }
      requestedGroupIds.delete(groupId);
      showToast("You're already in this group — opening it.");
      openGroup(groupId);
    } else {
      requestedGroupIds.add(groupId);
      requestToJoinGroup(groupId);
    }
  }).catch(()=>{
    // Couldn't even check (offline, etc.) — fall back to the normal request flow rather than
    // doing nothing at all.
    requestedGroupIds.add(groupId);
    requestToJoinGroup(groupId);
  });
}
function requestToJoinGroup(groupId){
  if(!fbDb || !currentUser) return;
  groupJoinBusy = true; groupJoinError = ''; render();
  fbDb.collection('groups').doc(groupId).collection('joinRequests').doc(currentUser.uid).set({
    displayName: displayNameOr(currentUser.email.split('@')[0]), requestedAt: Date.now()
  }).then(()=>{ groupJoinBusy = false; render(); }).catch(err=>{
    groupJoinBusy = false; groupJoinError = (err&&err.message) || 'Could not send that request.'; render();
  });
}
function cancelJoinRequest(groupId){
  if(!fbDb || !currentUser) return;
  fbDb.collection('groups').doc(groupId).collection('joinRequests').doc(currentUser.uid).delete().catch(()=>{});
}
function joinGroupViaInviteCode(groupId, code){
  if(!fbDb || !currentUser) return Promise.reject({message:'Sign in first.'});
  groupJoinBusy = true; groupJoinError = ''; render();
  return fbDb.collection('groups').doc(groupId).get().then(doc=>{
    if(!doc.exists) throw { message: "That invite link doesn't match a group anymore." };
    if(doc.data().inviteCode !== code) throw { message: 'That invite link looks incorrect.' };
    return fbDb.collection('groups').doc(groupId).collection('members').doc(currentUser.uid).set({
      uid: currentUser.uid, role:'member', displayName: displayNameOr(currentUser.email.split('@')[0]), photo: state.profile.photo||null,
      joinedAt: Date.now(), joinedViaCode: code
    });
  }).then(()=> fbDb.collection('groups').doc(groupId).update({ memberCount: firebase.firestore.FieldValue.increment(1) }))
    .then(()=>{ groupJoinBusy = false; openGroup(groupId); })
    .catch(err=>{ groupJoinBusy = false; groupJoinError = (err&&err.message) || 'Could not join that group.'; render(); });
}
function approveJoinRequest(groupId, uid, displayName){
  if(!fbDb) return;
  fbDb.collection('groups').doc(groupId).collection('members').doc(uid).set({
    uid, role:'member', displayName: displayName||'Member', photo: null, joinedAt: Date.now()
  }).then(()=> Promise.all([
    fbDb.collection('groups').doc(groupId).collection('joinRequests').doc(uid).delete(),
    fbDb.collection('groups').doc(groupId).update({ memberCount: firebase.firestore.FieldValue.increment(1) })
  ])).catch(()=>{});
}
function declineJoinRequest(groupId, uid){

// ---- Roles / membership management ----
function setMemberRole(groupId, uid, role){
  if(!fbDb) return;

}
function removeGroupMember(groupId, uid){

  fbDb.collection('groups').doc(groupId).collection('members').doc(uid).delete()
    .then(()=> fbDb.collection('groups').doc(groupId).update({ memberCount: firebase.firestore.FieldValue.increment(-1) }))

function leaveGroup(groupId){
