// "My Groups" is rendered by filtering `groupsDirectory` down to ids in `myGroupIds` (see
// renderGroupsDirectory) — but groupsDirectory itself comes from ONE broad collection-wide list()
// query, capped at 200 docs and cached after the first load. That query can miss a group you
// genuinely belong to: Firestore rules commonly allow reading a single group doc by ID more
// readily than an unrestricted list() across the whole collection, and even when both are allowed
// identically, a group you were just added to may simply postdate the last list() snapshot this
// session took. Either way, the result was the exact bug reported: a brand-new group is visible
// right after creation (openGroup() reads it directly, doc-by-doc, nothing to do with this list),
// but "disappears" the moment you navigate back to the plain directory view. Fix: whenever
// myGroupIds changes, fetch any group it names that isn't already in groupsDirectory, directly by
// ID — a plain get(), the least restrictive read there is — and merge it in.
function ensureMyGroupsInDirectory(){
  if(!fbDb) return;
  const known = new Set(groupsDirectory.map(g=>g.id));
  const missing = myGroupIds.filter(id=> !known.has(id));
  if(!missing.length) return;
  Promise.all(missing.map(id=>
    fbDb.collection('groups').doc(id).get().then(doc=> doc.exists ? { id:doc.id, ...doc.data() } : null).catch(()=>null)
  )).then(results=>{
    const found = results.filter(Boolean);
    if(!found.length) return;
    const known2 = new Set(groupsDirectory.map(g=>g.id));
    found.forEach(g=>{ if(!known2.has(g.id)){ groupsDirectory.push(g); known2.add(g.id); } });
    render();
  });
}

function setMemberRole(groupId, uid, role){
  if(!fbDb) return;
  fbDb.collection('groups').doc(groupId).collection('members').doc(uid).update({ role }).catch(()=>{});
}
function removeGroupMember(groupId, uid){
  if(!fbDb) return;
  fbDb.collection('groups').doc(groupId).collection('members').doc(uid).delete()
    .then(()=> fbDb.collection('groups').doc(groupId).update({ memberCount: firebase.firestore.FieldValue.increment(-1) }))
    .catch(()=>{});
}
function leaveGroup(groupId){
  if(!fbDb || !currentUser) return;
  removeGroupMember(groupId, currentUser.uid);
  closeGroup();
}

// ---- Discussion ----
let groupMessageText = '';
function sendGroupMessage(groupId, text){
  const trimmed = (text||'').trim();
  if(!trimmed || !fbDb || !currentUser) return;
  const { mentionedUids } = parseMentions(trimmed, activeGroupMembers);
  fbDb.collection('groups').doc(groupId).collection('messages').add({
    authorUid: currentUser.uid,
    authorName: displayNameOr(currentUser.email.split('@')[0]),
    text: trimmed.slice(0,2000),
    mentionedUids,
    createdAt: Date.now()
  }).then(()=>{ groupMessageText = ''; render(); }).catch(()=>{});
}

/* ---------------- Check-in reminders (push notifications) ---------------- */
let notifStatus = 'unknown'; // unknown | unsupported | default | denied | granted
function refreshNotifStatus(){
  notifStatus = (typeof Notification === 'undefined') ? 'unsupported' : Notification.permission;
}
function enableCheckinReminders(){
  if(typeof Notification === 'undefined'){ customAlert('Notifications are not supported in this browser.'); return; }
  Notification.requestPermission().then(perm=>{
    notifStatus = perm;
    if(perm === 'granted' && fbApp && currentUser) registerFcmToken();
    render();

}
function registerFcmToken(){
  try{
    fbMessaging = fbMessaging || firebase.messaging();
    fbMessaging.getToken({ vapidKey: FCM_VAPID_KEY }).then(token=>{
      if(!token || !currentUser || !fbDb) return;
      fbDb.collection('userProgress').doc(currentUser.uid).set({ fcmToken: token }, { merge:true });
    }).catch(err=>{ console.warn('FCM token error', err); });
  }catch(err){ console.warn('FCM unavailable', err); }
}

/* ---------------- Rendering ---------------- */
function render(){
  ensurePlanReady();
  const app = document.getElementById('app');

  // This whole app rebuilds the page's HTML from scratch on every render() call — simple, but
  // it means any input element gets destroyed and recreated each time, which normally kills focus
  // and drops whatever was mid-typed. Most fields never hit this (they're only read at submit time),
  // but live features like friend search call render() WHILE the user is typing. So: snapshot
  // whichever element is currently focused before rebuilding, then restore focus, cursor position,
  // and the literal value the user had typed right after — regardless of which branch below runs.
  const active = document.activeElement;
  let focusRestore = null;
  if(active && active.id && app.contains(active) && typeof active.value === 'string'){
    focusRestore = { id: active.id, value: active.value, start: active.selectionStart, end: active.selectionEnd };
  }
  function restoreFocus(){
    if(!focusRestore) return;
    const el = document.getElementById(focusRestore.id);
    if(!el) return;
    el.value = focusRestore.value;
    el.focus();
    if(typeof focusRestore.start === 'number' && el.setSelectionRange){
      try{ el.setSelectionRange(focusRestore.start, focusRestore.end); }catch(e){}
    }
  }

  // These two early-exit screens render before the main app shell (desktop nav / bottom nav) ever
  // appears, so they're wrapped in .app-main directly rather than the full render() layout below —
  // that's the same box that used to be #app itself, so they keep the identical centered/padded look.
  if(shouldShowGate()){
    app.innerHTML = `<div class="app-main">${renderAuthGate()}</div>`;
    attachAuthGateEvents();
    restoreFocus();
    return;
  }
  const forced = needsPlanOnboarding();
  if(forced || planChooserOpen){
    app.innerHTML = `<div class="app-main"><div class="onboard-wrap">${onboardingStep==='custom' ? renderCustomBuilder(!forced) : renderPlanChoose(!forced)}</div></div>`;
    attachPlanChooserEvents();
    restoreFocus();
    return;
  }
  const tabContent = viewedProfileUid ? renderProfilePage() : (
    activeTab==='today' ? renderToday() :
    activeTab==='log' ? renderLog() :
    activeTab==='journal' ? renderJournal() :
    activeTab==='memorize' ? renderMemorize() :
    activeTab==='dashboard' ? renderDashboard() :
    activeTab==='friends' ? renderFriends() :
    activeTab==='groups' ? renderGroups() :
    activeTab==='account' ? renderAccountTab() : ''
  );
  // A full innerHTML rebuild on every render() call is what makes every navigation feel like an
  // instant page-reload rather than moving between screens. render() runs constantly though (every
  // keystroke in a search box, every tick of a timer), so the entrance animation below only plays
  // when the actual VIEW has changed since the last render — a "drill-in" (opening a profile or a
  // group) slides in from the right like a native navigation push; switching between top-level
  // tabs just cross-fades. Anything that re-renders the same view (typing, a background sync
  // completing) gets no animation class at all, so it stays instant as before.
  const isDrillIn = !!viewedProfileUid || (activeTab==='groups' && !!activeGroupId);
  const viewKey = activeTab + (viewedProfileUid ? ':profile:'+viewedProfileUid : '') + (activeTab==='groups' && activeGroupId ? ':group:'+activeGroupId : '');
  const viewChanged = viewKey !== lastRenderedViewKey;
  lastRenderedViewKey = viewKey;
  const viewAnimClass = viewChanged ? (isDrillIn ? 'view-enter-slide' : 'view-enter-fade') : '';
  app.innerHTML = `
    ${renderDesktopNav()}
    <div class="app-main">
      ${renderTopStrip()}
      ${renderGroupInviteBanner()}
      ${renderCheckinBanner()}
      ${renderInstallBanner()}
      <div class="view-root ${viewAnimClass}">${tabContent}</div>
      ${renderFooter()}
    </div>
    ${renderBottomNav()}
    ${renderSidebar()}
    ${renderNotifPanel()}
    ${renderDialogOverlay()}
    ${renderCommandPalette()}
    ${renderToastStack()}
  `;
  attachEvents();
  restoreFocus();
  animateDashboardMetrics();
}

function renderGroupInviteBanner(){
  // Only reachable in guest mode (an already-signed-in user's invite gets handled automatically
  // right after auth resolves; someone brand new lands on the sign-up gate first, which handles

  if(!pendingGroupInvite || currentUser) return '';
  return `<div class="checkin-banner">

    <button class="btn primary small" id="acceptGroupInviteBtn">Create account</button>

function renderCustomBuilder(allowCancel){
  const usedElsewhereCount = {};

  const catsHtml = customDraft.map((cat, ci) => {

      <div class="builder-book-row">

          <button class="btn small" data-move="up" data-cat="${cat.id}" data-idx="${bi}" ${bi===0?'disabled':''}>&uarr;</button>
          <button class="btn small" data-move="down" data-cat="${cat.id}" data-idx="${bi}" ${bi===cat.books.length-1?'disabled':''}>&darr;</button>
          <button class="btn small danger" data-remove-book="${cat.id}" data-idx="${bi}">Remove</button>
        </span>
      </div>`).join('') || `<div style="color:var(--ink-soft); font-size:0.82rem; padding:6px 0;">No books yet — add some below.</div>`;

    return `
      <div class="builder-cat">
        <div class="builder-cat-head">
          <input type="text" data-name-for="${cat.id}" value="${cat.name.replace(/"/g,'&quot;')}">
          <div class="color-swatch-row">
            ${COLOR_PALETTE.map(c=>`<button type="button" data-color-for="${cat.id}" data-color="${c}" style="background:${c}" class="${cat.color===c?'selected':''}"></button>`).join('')}
          </div>

        </div>
        ${bookRows}
        <div class="builder-add-row">
          <select data-book-select-for="${cat.id}">

  }).join('');

  return `
    <div class="auth-brand">
      <div class="name">Build your own plan</div>
      <div class="tag">Create as many categories as you like, and choose which books belong to each. Order within a category matters — that's the reading sequence.</div>
    </div>
    ${catsHtml}
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin:16px 0;">
      <button class="btn" id="addDraftCategory">+ Add another category</button>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn primary" id="saveCustomPlan">Save & start reading</button>
      <button class="btn" id="backToPresets">&larr; Back to presets</button>

}

function attachPlanChooserEvents(){
  document.querySelectorAll('[data-preset]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const preset = PRESET_PLANS[btn.dataset.preset];
      applyPlan(preset.id, preset.categories);
      planChooserOpen = false;
    });
  });
  const openBuilder = document.getElementById('openCustomBuilder');
  if(openBuilder) openBuilder.addEventListener('click', openCustomBuilder);
  const cancel = document.getElementById('cancelPlanChooser');
  if(cancel) cancel.addEventListener('click', e=>{ e.preventDefault(); closePlanChooser(); });
  const backToPresets = document.getElementById('backToPresets');
  if(backToPresets) backToPresets.addEventListener('click', ()=>{ onboardingStep='choose'; render(); });
  const addCat = document.getElementById('addDraftCategory');
  if(addCat) addCat.addEventListener('click', addDraftCategory);
  const saveBtn = document.getElementById('saveCustomPlan');
  if(saveBtn) saveBtn.addEventListener('click', saveCustomPlan);

  document.querySelectorAll('[data-name-for]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const cat = customDraft.find(c=>c.id===inp.dataset.nameFor);
      if(cat) cat.name = inp.value;
    });
  });
  document.querySelectorAll('[data-color-for]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.colorFor);
      if(cat){ cat.color = btn.dataset.color; render(); }
    });
  });
  document.querySelectorAll('[data-remove-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=> removeDraftCategory(btn.dataset.removeCat));
  });
  document.querySelectorAll('[data-add-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.addBook);
      const select = document.querySelector(`[data-book-select-for="${btn.dataset.addBook}"]`);
      if(cat && select) cat.books.push(bookObj(select.value));
      render();
    });
  });
  document.querySelectorAll('[data-remove-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.removeBook);
      if(cat) cat.books.splice(Number(btn.dataset.idx), 1);
      render();
    });
  });
  document.querySelectorAll('[data-move]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.cat);
      if(!cat) return;
      const idx = Number(btn.dataset.idx);
      const dir = btn.dataset.move === 'up' ? -1 : 1;
      const swapIdx = idx + dir;
      if(swapIdx < 0 || swapIdx >= cat.books.length) return;
      [cat.books[idx], cat.books[swapIdx]] = [cat.books[swapIdx], cat.books[idx]];
      render();
    });
  });
}

function renderAuthGate(){
  const title = authView === 'signup' ? 'Create your account' : authView === 'reset' ? 'Reset your password' : 'Log in';
  const showGuestLink = !forceShowGate;
  return `

    <div class="auth-brand">
      <div class="name">Cultivate</div>
      <div class="tag">Design a reading plan that fits you — one chapter at a time.</div>
    </div>
    <div class="settings-box" style="max-width:none;">
      <h3>${title}</h3>
      ${authError ? `<div class="auth-error">${authError}</div>` : ''}
      <div class="auth-field">
        <label for="authEmail">Email</label>
        <input type="email" id="authEmail" autocomplete="email">
      </div>
      ${authView !== 'reset' ? `
        <div class="auth-field">
          <label for="authPassword">Password</label>
          <input type="password" id="authPassword" autocomplete="${authView==='signup'?'new-password':'current-password'}">
        </div>` : ''}
      <button class="btn primary" id="authSubmit" style="width:100%; padding:10px;" ${authBusy?'disabled':''}>
        ${authBusy ? 'Please wait…' : (authView === 'signup' ? 'Create account' : authView === 'reset' ? 'Send reset email' : 'Log in')}
      </button>
      <div class="auth-links">
        ${authView === 'login' ? `<a href="#" id="toSignup">Need an account? Sign up</a><a href="#" id="toReset" class="muted">Forgot password?</a>` : ''}
        ${authView === 'signup' ? `<a href="#" id="toLogin">Already have an account? Log in</a>` : ''}
        ${authView === 'reset' ? `<a href="#" id="toLogin">Back to log in</a>` : ''}
        ${showGuestLink
          ? `<a href="#" id="toGuest" class="muted" style="margin-top:6px;">Continue without an account &rarr;</a>`
          : `<a href="#" id="cancelGate" class="muted" style="margin-top:6px;">Cancel</a>`}
      </div>
    </div>
  </div>`;
}

function attachAuthGateEvents(){
  const submit = document.getElementById('authSubmit');
  if(submit){
    submit.addEventListener('click', ()=>{
      if(!fbReady){ authError = 'Sync isn\'t set up yet on this app — continue as a guest instead.'; render(); return; }
      const email = (document.getElementById('authEmail').value || '').trim();
      const pwField = document.getElementById('authPassword');
      const password = pwField ? pwField.value : '';
      if(!email){ authError = 'Enter your email address.'; render(); return; }
      if(authView === 'reset'){ doPasswordReset(email); return; }
      if(!password){ authError = 'Enter your password.'; render(); return; }
      if(authView === 'signup') doSignUp(email, password);
      else doLogIn(email, password);
    });
  }
  const toSignup = document.getElementById('toSignup');
  if(toSignup) toSignup.addEventListener('click', e=>{ e.preventDefault(); authView='signup'; authError=''; render(); });
  const toLogin = document.getElementById('toLogin');
  if(toLogin) toLogin.addEventListener('click', e=>{ e.preventDefault(); authView='login'; authError=''; render(); });
  const toReset = document.getElementById('toReset');
  if(toReset) toReset.addEventListener('click', e=>{ e.preventDefault(); authView='reset'; authError=''; render(); });
  const toGuest = document.getElementById('toGuest');
  if(toGuest) toGuest.addEventListener('click', e=>{ e.preventDefault(); continueAsGuest(); });
  const cancelGate = document.getElementById('cancelGate');
  if(cancelGate) cancelGate.addEventListener('click', e=>{ e.preventDefault(); forceShowGate=false; authView='login'; authError=''; render(); });
}

}

function renderToday(){
  const isToday = selectedDate===todayStr();
  const cards = ACTIVE_CATEGORIES.map(cat=>{
    const due = getDue(cat.id);
    const entriesToday = logEntriesFor(cat.id, selectedDate);
    const lastEntry = entriesToday[entriesToday.length-1];
    let statusHtml = '';
    if(lastEntry){
      if(lastEntry.status==='complete'){
        statusHtml = `<span class="status-pill complete ${cat.id===justCompletedCat?'pill-pop':''}">&#10003; Completed today</span>`;
      } else {
        statusHtml = `<span class="status-pill skipped">&#8631; Skipped &mdash; pushed to next time</span>`;
      }
    }
    const priorLogsHtml = entriesToday.length ? `
      <div class="today-log-list">
        ${entriesToday.map(e=>`<div>${e.status==='complete'?'&#10003;':'&#8631;'} ${e.book} ${e.chapter} &mdash; ${e.status}</div>`).join('')}
      </div>` : '';
    return `
      <div class="card" style="--cat-color:${cat.color}">
        <div class="cat-name">${cat.name}</div>
        ${statusHtml}
        <div class="due">${due.book} ${due.chapter}</div>
        <div class="meta">Next up &middot; cycle ${(state.cycles[cat.id]||0)+1} &middot; ${state.cursors[cat.id]||0}/${cat.total} chapters into this pass</div>
        <div class="actions">
          <button class="btn" data-read-book="${due.book}" data-read-chapter="${due.chapter}">Read in ${READING_APPS[state.readingApp].label} &rarr;</button>
          <button class="btn primary" data-action="complete" data-cat="${cat.id}">Mark complete</button>
          <button class="btn" data-action="skip" data-cat="${cat.id}">Skip &rarr; next time</button>
          ${lastLogEntry(cat.id) ? `<button class="btn small" data-action="undo" data-cat="${cat.id}">Undo last</button>` : ''}
        </div>
        ${priorLogsHtml}
      </div>`;
  }).join('');

  // Shows the full picker until you've answered for this date, then collapses to a single
  // acknowledgement line instead of continuing to take up space at the top of the page — "Change"
  // reopens the picker if you want to revise today's answer.
  const existingCheckin = checkinFor(selectedDate);
  const checkinHtml = (existingCheckin && !checkinEditing) ? `
    <div class="checkin-done-line">
      <span>${isToday ? "You logged today's walk as" : "You logged that day's walk as"} <strong>${CHECKIN_LABELS[existingCheckin.value]}</strong>.</span>
      <button type="button" data-action="edit-checkin">Change</button>
    </div>` : `
    <div class="settings-box" style="max-width:none;">
      <h3>How's your walk today?</h3>
      <p style="font-size:0.82rem; color:var(--ink-soft); margin-top:-6px;">Purely optional, just for you — no reminders, no tracking pressure.</p>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        ${[1,2,3,4,5].map(v=>`<button class="btn small ${existingCheckin && existingCheckin.value===v ? 'primary' : ''}" data-checkin-value="${v}">${CHECKIN_LABELS[v]}</button>`).join('')}
      </div>
    </div>`;

  const bookOptions = BOOK_LIBRARY.map(b=>`<option value="${b.name}">${b.name}</option>`).join('');
  const extraTodayEntries = state.extraLog.filter(e=>e.date===selectedDate);
  const extraReadingHtml = `
    <div class="settings-box" style="max-width:none;">
      <h3>Reading outside your plan</h3>
      <p style="font-size:0.82rem; color:var(--ink-soft); margin-top:-6px;">Read something today that wasn't on today's cards? Log it here.</p>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
        <select id="extraBook" style="padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.85rem; font-family:inherit;">${bookOptions}</select>
        <input type="number" id="extraChapter" placeholder="Chapter" min="1" style="width:90px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.85rem; font-family:inherit;">
        <button class="btn" id="addExtraBtn">Log it</button>
      </div>
      ${extraTodayEntries.length ? `<div class="today-log-list">${extraTodayEntries.map(e=>`<div class="extra-log-row">${e.book} ${e.chapter||''} <button class="btn small danger" data-delete-extra="${e.id}" style="margin-left:6px;">Remove</button></div>`).join('')}</div>` : ''}
    </div>`;

  return `
    ${checkinHtml}
    <div class="toolbar">
      <label for="dateSel" style="font-size:0.85rem; color:var(--ink-soft);">Logging for:</label>
      <input type="date" id="dateSel" value="${selectedDate}" max="${todayStr()}">
      ${!isToday ? `<button class="btn small" id="backToToday">Back to today</button>` : ''}
      <span style="font-size:0.8rem; color:var(--ink-soft);">${fmtDate(selectedDate)}</span>
    </div>
    <div class="grid">${cards}</div>
    ${extraReadingHtml}
    ${renderTodayNotifStrip()}
  `;
}

// A compact preview of the same inbox the top-strip bell opens (see notifItems()/renderNotifPanel)
// — keeps "notifications" one of the plain few things the home screen is actually about, per the
// minimalist Today-tab brief, without duplicating the full panel's markup or its click wiring
// (both reuse the same [data-notif-id] buttons attachEvents() already listens for).
function renderTodayNotifStrip(){
  const items = notifItems();
  if(!items.length) return '';
  const shown = items.slice(0, 3);
  return `
    <div class="settings-box" style="max-width:none;">
      <h3>Notifications</h3>
      <div class="notif-panel-list">
        ${shown.map(i=>`
          <button type="button" class="notif-item" data-notif-id="${i.id}">
            <span class="notif-item-icon">${icon(i.iconName, 18)}</span>
            <span class="notif-item-text">
              <span class="notif-item-title">${i.text}</span>
              <span class="notif-item-sub">${i.sub}</span>
            </span>
          </button>`).join('')}
      </div>
      ${items.length > shown.length ? `<button type="button" class="btn small" id="seeAllNotifsBtn" style="margin-top:10px;">See all (${items.length})</button>` : ''}
    </div>`;
}

function renderLog(){
  const dates = Array.from(new Set(state.log.map(e=>e.date))).sort().reverse();
  if(!dates.length){
    return emptyState('calendar', "No readings logged yet — once you mark a chapter complete on the Today tab, it'll show up here.");
  }
  const groups = {};
  dates.forEach(d=>{
    const ym = d.slice(0,7);
    (groups[ym] = groups[ym]||[]).push(d);
  });
  const ymKeys = Object.keys(groups).sort().reverse();
  const monthName = ym => {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m-1, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
  };
  return ymKeys.map((ym, i)=>{
    const rows = groups[ym].map(date=>{
      const cells = ACTIVE_CATEGORIES.map(cat=>{
        const entries = logEntriesFor(cat.id, date);
        if(!entries.length) return `<td></td>`;
        return `<td class="${entries.some(e=>e.status==='complete')?'cell-complete':'cell-skipped'}">
          ${entries.map(e=>`${e.book} ${e.chapter}${e.status==='skipped'?' (skipped)':''}`).join(', ')}
        </td>`;
      }).join('');
      return `<tr><td>${fmtDate(date)}</td>${cells}</tr>`;
    }).join('');
    return `
      <details class="month-group" ${i===0?'open':''}>
        <summary>${monthName(ym)} <span style="color:var(--ink-soft); font-weight:500;">${groups[ym].length} day(s) logged</span></summary>
        <div class="log-scroll">
          <table class="logtable">
            <thead><tr><th>Date</th>${ACTIVE_CATEGORIES.map(c=>`<th>${c.name}</th>`).join('')}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </details>`;
  }).join('');
}

function journalTagPill(tag){
  return `<span class="journal-tag" style="background:${JOURNAL_TAG_COLORS[tag]}1a; color:${JOURNAL_TAG_COLORS[tag]};">${JOURNAL_TAG_LABELS[tag]}</span>`;
}

function renderOneYearAgo(){
  const { journal, log, date } = oneYearAgoEntries();
  if(!journal.length && !log.length) return '';
  return `
    <div class="settings-box" style="max-width:none; background:var(--accent-soft); border-color:var(--accent);">
      <h3>One year ago today</h3>
      <p style="font-size:0.85rem; color:var(--ink-soft); margin-top:-6px;">${fmtDate(date)}</p>
      ${log.length ? `<p style="font-size:0.85rem;">You read: ${log.map(e=>`${e.book} ${e.chapter}`).join(', ')}</p>` : ''}
      ${journal.map(e=>`
        <div class="journal-entry">
          <div class="journal-entry-head">${journalTagPill(e.tag)}${e.reference ? `<span style="font-size:0.8rem; color:var(--ink-soft);">${formatReference(e.reference)}</span>` : ''}</div>
          ${e.title ? `<div class="journal-title">${e.title}</div>` : ''}
          ${e.content ? `<div class="journal-content">${e.content.replace(/\n/g,'<br>')}</div>` : ''}

}

  const formHtml = `

      <textarea id="journalContent" placeholder="What happened? What did you sense, pray, or receive?" rows="4" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; font-size:0.9rem; font-family:inherit; resize:vertical;"></textarea>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
        <select id="journalRefBook" style="padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.85rem; font-family:inherit;">${bookOptions}</select>
        <input type="number" id="journalRefChapter" placeholder="Chapter" min="1" style="width:90px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.85rem; font-family:inherit;">
        <input type="number" id="journalRefVerse" placeholder="Verse (optional)" min="1" style="width:110px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.85rem; font-family:inherit;">
      </div>
      <button class="btn primary" id="saveJournalBtn">Save entry</button>

  const filterHtml = `
    <div class="toolbar" style="margin-top:24px;">
      <span style="font-size:0.85rem; color:var(--ink-soft);">Timeline:</span>
      ${['all',...JOURNAL_TAGS].map(t=>`<button class="btn small ${journalFilter===t?'primary':''}" data-journal-filter="${t}">${t==='all'?'All':JOURNAL_TAG_LABELS[t]}</button>`).join('')}
    </div>`;

  if(!entries.length){
    return formHtml + oneYearAgoHtml + filterHtml + (
      state.journal.length
        ? `<div class="empty-note">No entries match this filter.</div>`
        : emptyState('notebook', 'No journal entries yet — write down what you sense, pray, or receive as you read, and it\'ll show up here.')
    );
  }

  const groups = {};
  entries.forEach(e=>{
    const ym = e.date.slice(0,7);
    (groups[ym] = groups[ym]||[]).push(e);
  });
  const ymKeys = Object.keys(groups).sort().reverse();
  const monthName = ym => {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m-1, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
  };
  const timelineHtml = ymKeys.map((ym,i)=>{
    const items = groups[ym].map(e=>`
      <div class="journal-entry">
        <div class="journal-entry-head">
          <span class="journal-date">${fmtDate(e.date)}</span>
          ${journalTagPill(e.tag)}
          ${e.reference ? `<span style="font-size:0.8rem; color:var(--ink-soft);">&mdash; ${formatReference(e.reference)}</span>` : ''}

function renderMemorize(){
  const bookOptions = BOOK_LIBRARY.map(b=>`<option value="${b.name}">${b.name}</option>`).join('');
  const formHtml = `
    <div class="settings-box">
      <h3>Add a verse to memorize</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">

      <textarea id="memText" placeholder="Paste the verse text here (optional, if you'd like it shown while reviewing)" rows="3" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:10px; font-size:0.9rem; font-family:inherit; resize:vertical;"></textarea>
      <button class="btn primary" id="addMemBtn">Add</button>
    </div>`;
  const learning = state.memorization.filter(m=>m.status!=='mastered');
  const mastered = state.memorization.filter(m=>m.status==='mastered');
  const cardHtml = m => `
    <div class="card" style="--cat-color:${m.status==='mastered' ? '#3f7a4f' : '#7a4b2e'}; margin-bottom:12px;">
      <div class="cat-name">${m.reference}</div>
      ${m.text ? `<div style="font-size:0.88rem; color:var(--ink-soft); margin:6px 0;">${m.text}</div>` : ''}

      <div class="actions">
        ${m.status!=='mastered' ? `<button class="btn primary small" data-mem-review="${m.id}">Reviewed today</button>` : ''}

function renderFriends(){
  if(!currentUser){
    return `<div class="empty-note">Friends & Family requires an account, since it connects your progress with someone else's. Create an account or log in from the Account tab.</div>`;
  }
  const myUid = currentUser.uid;
  const accepted = friendLinksData.filter(l=>l.status==='accepted');
  const incoming = friendLinksData.filter(l=>l.status==='pending' && l.requestedBy!==myUid);
  const outgoing = friendLinksData.filter(l=>l.status==='pending' && l.requestedBy===myUid);

  const searchResultRow = r => {
    const st = friendStatusWith(r.uid);
    let actionHtml;
    if(st.status==='friends') actionHtml = `<span class="status-pill complete">Friends</span>`;
    else if(st.status==='outgoing') actionHtml = `<button class="btn small" data-friend-cancel="${st.linkId}">Requested — cancel</button>`;
    else if(st.status==='incoming') actionHtml = `<span style="font-size:0.8rem; color:var(--ink-soft);">Check requests below</span>`;
    else actionHtml = `<button class="btn small primary" data-friend-send-uid="${r.uid}">Send request</button>`;
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
        <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml({displayName:r.displayName}, 32)}${r.displayName}</span>
        ${actionHtml}
      </div>`;
  };

  const addFormHtml = `
    <div class="settings-box">
      <h3>Add a friend &mdash; ${accepted.length} connection${accepted.length===1?'':'s'}</h3>
      <p style="font-size:0.85rem; color:var(--ink-soft);">Search by name or their exact email. We only ever share your name, last-active date, and current plan &mdash; never your journal or reading log.</p>
      ${friendRequestError ? `<div class="auth-error">${friendRequestError}</div>` : ''}
      <input type="text" id="friendSearchInput" placeholder="Search by name or email…" value="${friendSearchQuery}" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; font-family:inherit;">
      <div style="margin-top:10px;">
        ${friendSearchBusy ? `<div style="font-size:0.82rem; color:var(--ink-soft);">Searching…</div>` : ''}
        ${!friendSearchBusy && friendSearchQuery.trim() && !friendSearchResults.length ? `<div style="font-size:0.82rem; color:var(--ink-soft);">No one found. If you searched their email, they need to have opened Cultivate at least once first.</div>` : ''}
        ${friendSearchResults.map(searchResultRow).join('')}
      </div>
    </div>`;

  const incomingHtml = `
    <div class="settings-box">
      <h3>Requests received (${incoming.length})</h3>
      ${incoming.length ? incoming.map(l=>{
        const reqAct = friendActivityCache[l.requestedBy];
        const name = reqAct ? reqAct.displayName : (friendNameCache[l.requestedBy] || 'Someone');
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
          <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml(reqAct||{displayName:name}, 32)}${name} wants to connect</span>
          <span style="display:flex; gap:6px;">
            <button class="btn small primary" data-friend-accept="${l.id}">Accept</button>
            <button class="btn small danger" data-friend-decline="${l.id}">Decline</button>
          </span>
        </div>`;
      }).join('') : `<div style="font-size:0.82rem; color:var(--ink-soft);">Nothing waiting on you right now.</div>`}
    </div>`;

  const outgoingHtml = `
    <div class="settings-box">
      <h3>Requests sent (${outgoing.length})</h3>
      ${outgoing.length ? outgoing.map(l=>{
        const otherUid = l.userIds.find(u=>u!==myUid);
        const act = friendActivityCache[otherUid];
        const name = act ? act.displayName : (friendNameCache[otherUid] || 'Waiting on a response');
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
          <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml(act||{displayName:name}, 32)}${name}</span>
          <button class="btn small danger" data-friend-cancel="${l.id}">Unsend</button>
        </div>`;
      }).join('') : `<div style="font-size:0.82rem; color:var(--ink-soft);">Nothing pending.</div>`}
    </div>`;

  const acceptedHtml = accepted.length ? `
    <div class="settings-box">
      <h3>Connected (${accepted.length})</h3>
      ${accepted.map(l=>{
        const otherUid = l.userIds.find(u=>u!==myUid);
        const act = friendActivityCache[otherUid];
        return `
        <div style="display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);">
          ${renderAvatarHtml(act||{}, 40)}
          <div style="flex:1;">
            <div style="font-weight:700;">${act ? act.displayName : skeletonLine('120px')}</div>
            ${act ? `<div style="font-size:0.82rem; color:var(--ink-soft);">${act.planName ? act.planName + ' &middot; ' : ''}${act.activeDaysLast30||0} of the last 30 days active${act.lastActiveDate ? ' &middot; last read ' + fmtDate(act.lastActiveDate) : ''}</div>` : `<div style="margin-top:6px;">${skeletonLine('180px')}</div>`}

            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : emptyState('userPlus', 'No connections yet — search for a friend or family member above. This is meant to feel like company, not a leaderboard: no percentages, no comparisons, just knowing someone else is walking with you.');

  // A plain, on-screen troubleshooting panel — so if requests aren't showing up, what's actually
  // happening can be checked right here instead of needing to open browser dev tools. Shows exactly
  // what this account's live connection to Firestore currently sees.
  const troubleshootingHtml = `
    <details class="settings-box" style="font-size:0.82rem;">
      <summary style="cursor:pointer; font-weight:600;">Troubleshooting</summary>
      <div style="margin-top:10px; color:var(--ink-soft); line-height:1.6;">
        <div>Signed in as: <strong>${currentUser.email}</strong></div>
        <div>Your account ID: <code>${myUid}</code></div>
        <div>Friend-link documents this account can currently see: <strong>${friendLinksData.length}</strong></div>
        ${friendsListenerError ? `<div style="color:var(--bad); margin-top:6px;">Listener error: ${friendsListenerError}</div>` : `<div style="color:var(--good); margin-top:6px;">No listener errors.</div>`}
        ${friendLinksData.length ? `
          <div style="margin-top:8px; font-family:monospace; font-size:0.78rem; white-space:pre-wrap; background:var(--bg-soft, #f5f2ec); padding:8px; border-radius:6px;">${friendLinksData.map(l=>`${l.id} — status:${l.status} requestedBy:${l.requestedBy}`).join('\n')}</div>
        ` : ''}
        <div style="margin-top:8px;">If you just sent a request and its document isn't listed above at all, the write itself didn't happen — check the Send request button for an error message. If it IS listed above but isn't showing in the right section, that's a display bug, not a data problem — let me know the exact line shown here.</div>
      </div>
    </details>`;

  return addFormHtml + incomingHtml + outgoingHtml + acceptedHtml + troubleshootingHtml;
}

/* ---------------- Groups UI ---------------- */
let requestedGroupIds = new Set(); // tracked locally so the button updates instantly after clicking
const NT_START_INDEX = BOOK_LIBRARY.findIndex(b=>b.name==='Matthew');
const OT_BOOK_NAMES = BOOK_LIBRARY.slice(0, NT_START_INDEX).map(b=>b.name);
const NT_BOOK_NAMES = BOOK_LIBRARY.slice(NT_START_INDEX).map(b=>b.name);

function renderGroups(){
  if(!currentUser){
    return `<div class="empty-note">Groups require an account, since they're shared with other people — a Bible study, table, or devotion group. Create an account or log in from the Account tab.</div>`;
  }
  const page = activeGroupId ? renderGroupDetail() : renderGroupsDirectory();
  // "Create a group" is a bottom sheet now — it slides up over whatever's already on screen
  // instead of replacing it, so you never lose your place in the directory behind it.
  return page + renderGroupCreateSheet();
}

function renderGroupCreateSheet(){
  return `
    <div id="groupSheetBackdrop" class="sheet-backdrop ${groupCreateOpen?'open':''}"></div>
    <div class="sheet-panel ${groupCreateOpen?'open':''}">
      <div class="sheet-handle"></div>
      ${groupCreateOpen ? renderGroupCreateForm() : ''}
    </div>`;
}

function renderGroupsDirectory(){
  const q = groupSearchQuery.trim().toLowerCase();
  // The search box only appears on the Discover tab, so it only filters Discover — My Groups
  // always shows everything you've joined, regardless of whatever was last typed in that box.
  const mine = groupsDirectory.filter(g=> myGroupIds.includes(g.id));
  const discover = groupsDirectory.filter(g=> !myGroupIds.includes(g.id) && (!q || g.name.toLowerCase().includes(q)));

  const groupCard = g => {
    const isMember = myGroupIds.includes(g.id);
    const requested = requestedGroupIds.has(g.id);
    let actionHtml;
    if(isMember) actionHtml = `<button class="btn small primary" data-open-group="${g.id}">Open</button>`;
    else if(requested) actionHtml = `<span class="pending-note">Requested</span>`;
    else actionHtml = `<button class="btn small" data-request-join="${g.id}">Join</button>`;
    return `
      <div class="group-card">
        <div class="group-icon">${renderAvatarHtml({displayName:g.name, color:colorForName(g.name)}, 44)}</div>
        <div class="group-info">
          <div class="name">${escapeHtml(g.name)}</div>
          <div class="meta">${g.memberCount||1} member${g.memberCount===1?'':'s'} &middot; ${g.planMode==='paced' ? 'Paced' : 'Free pace'}${g.description ? ' &middot; ' + escapeHtml(g.description) : ''}</div>
        </div>
        <div class="group-action">${actionHtml}</div>
      </div>`;
  };

  let listHtml;
  if(groupDirTab === 'mine'){
    listHtml = mine.length ? `<div class="group-card-list">${mine.map(groupCard).join('')}</div>`
      : (q ? `<div class="empty-note">No groups match that search.</div>`
        : emptyState('users', "You haven't joined a group yet — switch to Discover to browse or search, or create your own."));
  } else {
    listHtml = groupsDirectoryLoading ? `<div class="group-card-list">${skeletonCardListHtml(3)}</div>`
      : (discover.length ? `<div class="group-card-list">${discover.map(groupCard).join('')}</div>`
        : (q ? `<div class="empty-note">No groups match that search.</div>`
          : emptyState('users', 'No groups yet — be the first to create one.', { actionLabel:'+ Create a group', actionId:'emptyStateCreateGroupBtn' })));
  }

  return `
    <div class="settings-box">
      <div class="group-dir-header">
        <h3>Groups</h3>
        <button class="btn primary small" id="openGroupCreateBtn">+ Create a group</button>
      </div>
      <div class="group-tabs">
        <button class="${groupDirTab==='mine'?'active':''}" data-group-dir-tab="mine">My Groups${mine.length ? ' ('+mine.length+')' : ''}</button>
        <button class="${groupDirTab==='discover'?'active':''}" data-group-dir-tab="discover">Discover</button>
      </div>
      ${groupDirTab==='discover' ? `<div class="group-search-row"><input type="text" id="groupSearchInput" placeholder="Search groups by name…" value="${escapeHtml(groupSearchQuery)}"></div>` : ''}
      ${listHtml}
    </div>`;
}

function renderGroupCreateForm(){
  const bookCheckbox = name => `
    <label class="book-tile" style="--tile-color:${colorForName(name)}; --tile-soft:${softColorForName(name)};">
      <input type="checkbox" data-group-draft-book="${escapeHtml(name)}" ${groupDraftBooks.includes(name)?'checked':''}>
      <span class="book-tile-name">${escapeHtml(name)}</span>
    </label>`;

  const fq = bookFilterQuery.trim().toLowerCase();
  const matches = name => !fq || name.toLowerCase().includes(fq);
  const otSelected = OT_BOOK_NAMES.filter(n=>groupDraftBooks.includes(n)).length;
  const ntSelected = NT_BOOK_NAMES.filter(n=>groupDraftBooks.includes(n)).length;

  // A clean, human summary instead of a raw checkbox wall — recognizes the common presets by
  // name, and only falls back to a chip list (or a plain count, once it'd be too many chips to
  // stay tidy) for a genuinely custom selection.
  const total = outlineTotalChapters(groupDraftBooks.map(b=>({book:b,chapters:chaptersFor(b)})));
  let summaryHtml;
  if(!groupDraftBooks.length){
    summaryHtml = `<div class="empty-note">No books chosen yet — pick a preset above, or open the list below to choose specific books.</div>`;
  } else if(sameBookSet(groupDraftBooks, BOOK_LIBRARY.map(b=>b.name))){
    summaryHtml = `<div class="reading-summary-line"><strong>Whole Bible</strong> &middot; ${total} chapters total</div>`;
  } else if(sameBookSet(groupDraftBooks, OT_BOOK_NAMES)){
    summaryHtml = `<div class="reading-summary-line"><strong>Old Testament</strong> &middot; ${total} chapters total</div>`;
  } else if(sameBookSet(groupDraftBooks, NT_BOOK_NAMES)){
    summaryHtml = `<div class="reading-summary-line"><strong>New Testament</strong> &middot; ${total} chapters total</div>`;
  } else if(groupDraftBooks.length <= 14){
    summaryHtml = `
      <div class="book-chip-list">
        ${groupDraftBooks.map(name=>`<span class="book-chip">${escapeHtml(name)}<button type="button" class="chip-remove" data-remove-draft-book="${escapeHtml(name)}" aria-label="Remove ${escapeHtml(name)}">${icon('close',12)}</button></span>`).join('')}
      </div>
      <div class="reading-summary-line">${total} chapters total</div>`;
  } else {
    summaryHtml = `<div class="reading-summary-line"><strong>${groupDraftBooks.length} books selected</strong> &middot; ${total} chapters total</div>`;
  }

  return `
    <div class="sheet-body">
      <div class="sheet-header">
        <h3>Create a group</h3>
        <button type="button" class="sheet-close-btn" id="cancelGroupCreateBtn" aria-label="Close">${icon('close',18)}</button>
      </div>
      ${groupCreateError ? `<div class="auth-error">${escapeHtml(groupCreateError)}</div>` : ''}
      <div class="auth-field">
        <label for="groupName">Group name</label>
        <input type="text" id="groupName" placeholder="e.g. Tuesday Night Bible Study">
      </div>
      <div class="auth-field">
        <label for="groupDescription">Description (optional)</label>
        <input type="text" id="groupDescription" placeholder="What's this group about?">
      </div>
      <div class="auth-field">
        <label>Pace</label>
        <div style="display:flex; flex-direction:column; gap:6px; margin-top:4px;">
          <label style="display:flex; align-items:flex-start; gap:8px; font-size:0.88rem; cursor:pointer;">
            <input type="radio" name="groupPlanMode" value="free" checked style="margin-top:3px;">
            <span><strong>Free pace</strong><br><span style="color:var(--ink-soft); font-size:0.8rem;">Everyone reads the same outline, at their own pace. No calendar, no pressure.</span></span>
          </label>
          <label style="display:flex; align-items:flex-start; gap:8px; font-size:0.88rem; cursor:pointer;">
            <input type="radio" name="groupPlanMode" value="paced" style="margin-top:3px;">
            <span><strong>Paced schedule</strong><br><span style="color:var(--ink-soft); font-size:0.8rem;">The group moves through the outline together, week by week — good for discussing the same passage on the same week.</span></span>
          </label>
        </div>
      </div>
      <div class="auth-field" id="groupChaptersPerWeekField" style="display:none;">
        <label for="groupChaptersPerWeek">Chapters per week</label>
        <input type="number" id="groupChaptersPerWeek" value="5" min="1" style="width:100px;">
      </div>
      <div class="auth-field">
        <label>What will the group read?</label>
        <div class="reading-preset-row">
          <button type="button" class="btn small" id="pickWholeBible">Whole Bible</button>
          <button type="button" class="btn small" id="pickOT">Old Testament</button>
          <button type="button" class="btn small" id="pickNT">New Testament</button>
          ${groupDraftBooks.length ? `<button type="button" class="btn small" id="pickNone">Clear</button>` : ''}
        </div>
        ${summaryHtml}
        <details class="book-picker-details" ${bookPickerOpen ? 'open' : ''}>
          <summary>Choose specific books</summary>
          <div class="book-picker-body">
            <input type="text" id="bookFilterInput" placeholder="Filter books…" value="${escapeHtml(bookFilterQuery)}">
            <div class="book-picker-section">
              <div class="book-picker-section-label">Old Testament (${otSelected}/${OT_BOOK_NAMES.length})</div>
              <div class="book-picker">${OT_BOOK_NAMES.filter(matches).map(bookCheckbox).join('') || `<div class="empty-note-inline">No matches.</div>`}</div>
            </div>
            <div class="book-picker-section">
              <div class="book-picker-section-label">New Testament (${ntSelected}/${NT_BOOK_NAMES.length})</div>
              <div class="book-picker">${NT_BOOK_NAMES.filter(matches).map(bookCheckbox).join('') || `<div class="empty-note-inline">No matches.</div>`}</div>
            </div>
          </div>
        </details>
      </div>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <button class="btn primary" id="submitGroupCreateBtn" ${groupCreateBusy?'disabled':''} style="flex:1;">${groupCreateBusy?'Creating…':'Create group'}</button>
      </div>
    </div>`;
}

function renderGroupDetail(){
  if(!activeGroupData) return `<div class="settings-box">${skeletonProfileHtml()}</div>`;
  const g = activeGroupData;
  const myRole = myRoleInActiveGroup();
  const isOwnerOrAdmin = myRole === 'owner' || myRole === 'admin';
  const inviteUrl = `${window.location.origin}${window.location.pathname}?joinGroup=${g.id}&code=${g.inviteCode}`;

  const tabsHtml = `
    <div class="group-tabs">
      <button class="${activeGroupTab==='discussion'?'active':''}" data-group-tab="discussion">Discussion</button>
      <button class="${activeGroupTab==='plan'?'active':''}" data-group-tab="plan">Plan</button>
      <button class="${activeGroupTab==='members'?'active':''}" data-group-tab="members">Members (${activeGroupMembers.length})</button>
      ${isOwnerOrAdmin ? `<button class="${activeGroupTab==='requests'?'active':''}" data-group-tab="requests">Requests${activeGroupJoinRequests.length ? ' ('+activeGroupJoinRequests.length+')' : ''}</button>` : ''}
    </div>`;

  if(activeGroupTab === 'discussion') body = renderGroupDiscussion();
  else if(activeGroupTab === 'plan') body = renderGroupPlan();
  else if(activeGroupTab === 'members') body = renderGroupMembers();
  else if(activeGroupTab === 'requests') body = renderGroupRequests();

  return `
    <div class="settings-box">

        <div>
          <h3 style="margin-bottom:2px;">${escapeHtml(g.name)}</h3>
          ${g.description ? `<p style="font-size:0.85rem; color:var(--ink-soft); margin:0 0 4px;">${escapeHtml(g.description)}</p>` : ''}
          <div style="font-size:0.8rem; color:var(--ink-soft);">${g.memberCount||1} member${g.memberCount===1?'':'s'} &middot; ${g.planMode==='paced' ? 'Paced schedule' : 'Free pace'}</div>
        </div>
      </div>
      <details>
        <summary style="cursor:pointer; font-size:0.85rem; font-weight:600;">Invite link</summary>

          <button class="btn small" id="copyGroupInviteBtn">Copy link</button>
        </div>
      </details>
      <div class="group-detail-actions">
        ${myRole ? `<button class="btn small danger" id="leaveGroupBtn">Leave group</button>` : ''}
      </div>

    ${tabsHtml}
    ${body}`;
}

function renderGroupDiscussion(){
  const messages = activeGroupMessages.map(m=>{
    const { html } = parseMentions(m.text, activeGroupMembers);
    const mine = currentUser && m.authorUid === currentUser.uid;
    return `
      <div class="group-message">
        <div class="who"><strong>${escapeHtml(m.authorName||'Someone')}</strong>${mine ? ' (you)' : ''} &middot; ${m.createdAt ? new Date(m.createdAt).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : ''}</div>
        <div class="body">${html.replace(/\n/g,'<br>')}</div>
      </div>`;
  }).join('');
  return `
    <div class="settings-box">
      <div style="max-height:420px; overflow-y:auto; margin-bottom:12px;">
        ${messages || emptyState('notebook', "No messages yet — say hello, or share what stood out from this week's reading.")}
      </div>
      <div style="display:flex; gap:8px;">
        <input type="text" id="groupMessageInput" placeholder="Message the group… use @name to mention someone" value="${escapeHtml(groupMessageText)}" style="flex:1; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; font-family:inherit;">
        <button class="btn primary" id="sendGroupMessageBtn">Send</button>
      </div>
    </div>`;
}

function renderGroupPlan(){
  const g = activeGroupData;
  const total = outlineTotalChapters(g.outline);
  let paceHtml = '';
  if(g.planMode === 'paced'){
    const weekIndex = currentGroupWeekIndex(g.startDate);
    const thisWeek = chaptersForWeek(g.outline, g.chaptersPerWeek, weekIndex);
    paceHtml = `
      <div class="group-week-card">
        <div class="week-label">Week ${weekIndex+1}</div>
        <div style="font-size:0.9rem;">${thisWeek.length ? formatChapterRange(thisWeek) : "You've reached the end of the outline — nicely done."}</div>
        <div style="font-size:0.78rem; color:var(--ink-soft); margin-top:4px;">${g.chaptersPerWeek} chapter${g.chaptersPerWeek===1?'':'s'} per week, started ${fmtDate(g.startDate)}</div>
      </div>`;
  }
  return `
    <div class="settings-box">
      ${paceHtml}
      <h3>Outline</h3>
      <p style="font-size:0.85rem; color:var(--ink-soft);">${total} chapters across ${(g.outline||[]).length} book${(g.outline||[]).length===1?'':'s'}.</p>
      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;">
        ${(g.outline||[]).map(o=>`<span class="role-badge member">${escapeHtml(o.book)} (${o.chapters})</span>`).join('')}
      </div>
    </div>`;
}

function renderGroupMembers(){
  const myRole = myRoleInActiveGroup();
  const sorted = activeGroupMembers.slice().sort((a,b)=>{
    const rank = r => r==='owner'?0:r==='admin'?1:2;
    return rank(a.role)-rank(b.role);
  });
  const rows = sorted.map(m=>{
    const canManage = myRole === 'owner' && m.role !== 'owner' && (!currentUser || m.uid !== currentUser.uid);
    const canRemove = (myRole==='owner' || myRole==='admin') && m.role !== 'owner' && (!currentUser || m.uid !== currentUser.uid);
    return `
      <div class="group-member-row">
        ${renderAvatarHtml(m, 34)}
        <span class="name" data-view-profile="${m.uid}">${escapeHtml(m.displayName||'Member')} <span class="role-badge ${m.role}">${m.role}</span></span>
        ${canManage ? `<button class="btn small" data-set-role="${m.uid}|${m.role==='admin'?'member':'admin'}">${m.role==='admin' ? 'Remove admin' : 'Make admin'}</button>` : ''}
        ${canRemove ? `<button class="btn small danger" data-remove-member="${m.uid}">Remove</button>` : ''}
      </div>`;
  }).join('');
  return `<div class="settings-box">${rows}</div>`;
}

function renderGroupRequests(){
  if(!activeGroupJoinRequests.length) return `<div class="empty-note">No pending requests right now.</div>`;
  const rows = activeGroupJoinRequests.map(r=>`
    <div class="group-row">
      <span>${escapeHtml(r.displayName||'Someone')}</span>
      <span style="display:flex; gap:6px;">
        <button class="btn small primary" data-approve-request="${r.uid}|${escapeHtml(r.displayName||'Member').replace(/"/g,'&quot;')}">Approve</button>
        <button class="btn small danger" data-decline-request="${r.uid}">Decline</button>
      </span>
    </div>`).join('');
  return `<div class="settings-box">${rows}</div>`;
}

function renderYearInReview(){
  const currentYear = todayStr().slice(0,4);
  const s = yearInReviewStats(currentYear);
  if(s.chaptersRead === 0 && s.journalEntries === 0) return '';
  return `
    <div class="settings-box" style="max-width:none; background:var(--accent-soft); border-color:var(--accent);">
      <h3>${s.year} in review</h3>
      <p style="font-size:0.92rem; line-height:1.7;">
        This year you sat with <strong>${s.chaptersRead}</strong> chapter${s.chaptersRead===1?'':'s'} across <strong>${s.booksTouched}</strong> book${s.booksTouched===1?'':'s'} of the Bible.
        ${s.journalEntries ? ` You wrote <strong>${s.journalEntries}</strong> journal entr${s.journalEntries===1?'y':'ies'}` : ''}
        ${s.journalEntries ? (JOURNAL_TAGS.filter(t=>s.tagCounts[t]>0).map(t=>`${s.tagCounts[t]} ${JOURNAL_TAG_LABELS[t].toLowerCase()}`).join(', ') ? ' — ' + JOURNAL_TAGS.filter(t=>s.tagCounts[t]>0).map(t=>`${s.tagCounts[t]} ${JOURNAL_TAG_LABELS[t].toLowerCase()}`).join(', ') + '.' : '.') : ''}
        ${s.cyclesCompletedAllTime ? ` You've completed <strong>${s.cyclesCompletedAllTime}</strong> full cycle${s.cyclesCompletedAllTime===1?'':'s'} through your plan's categories so far.` : ''}
      </p>
    </div>`;
}

function renderMonthlySummaries(){
  const months = monthsWithActivity().slice(0,6);
  if(!months.length) return '';
  const monthName = ym => { const [y,m] = ym.split('-').map(Number); return new Date(y,m-1,1).toLocaleDateString(undefined,{month:'long', year:'numeric'}); };
  const cards = months.map(ym=>{
    const s = monthSummaryStats(ym);
    return `
      <div class="stat">
        <div style="font-weight:700; margin-bottom:6px;">${monthName(ym)}</div>
        <div style="font-size:0.85rem; color:var(--ink-soft); line-height:1.6;">
          ${s.chaptersRead} chapter${s.chaptersRead===1?'':'s'} across ${s.booksTouched} book${s.booksTouched===1?'':'s'}<br>
          Active ${s.daysActive} day${s.daysActive===1?'':'s'}${s.journalEntries ? ` &middot; ${s.journalEntries} journal entr${s.journalEntries===1?'y':'ies'}` : ''}
        </div>
      </div>`;
  }).join('');
  return `<h3 style="margin-top:6px;">Month by month</h3><div class="dash-summary">${cards}</div>`;
}

function renderDashboard(){
  const uniqueChapters = new Set(state.log.filter(e=>e.status==='complete').map(e=>e.book+'|'+e.chapter));
  const totalPassesAcrossAll = ACTIVE_CATEGORIES.reduce((s,c)=>s+(state.cycles[c.id]||0),0);
  const yearInReview = renderYearInReview();
  const monthlySummaries = renderMonthlySummaries();
  const totalCompleteCount = state.log.filter(e=>e.status==='complete').length;
  const coveragePct = Math.round(uniqueChapters.size/BIBLE_TOTAL_CHAPTERS*100);
  // data-count-key/data-count-to feed animateDashboardMetrics() (see JS above) — it compares the
  // target against whatever value it last saw for that key and, if it actually changed, plays a
  // quick count-up instead of the number just silently being different on the next render.
  const summary = `
    <div class="dash-summary">
      <div class="stat"><div class="num"><span data-count-key="uniqueChapters" data-count-to="${uniqueChapters.size}">${uniqueChapters.size}</span> / ${BIBLE_TOTAL_CHAPTERS}</div><div class="label">Unique chapters read at least once</div></div>
      <div class="stat"><div class="num"><span data-count-key="coveragePct" data-count-to="${coveragePct}">${coveragePct}</span>%</div><div class="label">Whole-Bible coverage</div></div>
      <div class="stat"><div class="num" data-count-key="totalCycles" data-count-to="${totalPassesAcrossAll}">${totalPassesAcrossAll}</div><div class="label">Total category cycles completed</div></div>
      <div class="stat"><div class="num" data-count-key="totalComplete" data-count-to="${totalCompleteCount}">${totalCompleteCount}</div><div class="label">Chapters logged complete (all-time)</div></div>
    </div>`;

  const blocks = ACTIVE_CATEGORIES.map(cat=>{
    const stats = bookStats(cat);
    const catCycle = state.cycles[cat.id]||0;
    const catPct = Math.round((state.cursors[cat.id]||0)/cat.total*100);
    const rows = stats.map(b=>`
      <div class="book-row">
        <div>${b.name}</div>
        <div class="bar-track"><div class="bar-fill" data-bar-key="${cat.id}:${b.name}" style="width:${b.progress}%; background:${cat.color};"></div></div>
        <div class="passes-badge" title="Times fully completed this cycle count">${b.passes}&times; read</div>
        <div style="text-align:right; color:var(--ink-soft);">${b.progress}%</div>
      </div>`).join('');
    return `
      <div class="cat-block">
        <h3><span class="swatch" style="background:${cat.color}"></span>${cat.name}</h3>
        <div class="cat-sub">Cycle ${catCycle+1} in progress &middot; ${catPct}% through current pass (${cat.total} chapters/cycle)</div>
        ${rows}
      </div>`;
  }).join('');

  return yearInReview + summary + monthlySummaries + blocks;
}

/* ---------------- Events ---------------- */
// Shared by the desktop top-tab nav, the mobile bottom nav, and the mobile "More" sidebar — all
// three ultimately just switch activeTab, so they share one handler instead of three copies.
function switchToTab(tabId){
  activeTab = tabId;
  sidebarOpen = false;
  if(viewedProfileUid) closeViewedProfile();
  // Warm the search cache the moment the tab opens, so results feel instant once typing starts.
  if(activeTab === 'friends') loadFriendDirectory();
  if(activeTab === 'groups' && !activeGroupId) loadGroupsDirectory();
  render();
}
function attachEvents(){
  document.querySelectorAll('.desktop-nav-item[data-tab], .bottom-nav-item[data-tab], .sidebar-nav-item[data-tab]').forEach(btn=>{
    btn.addEventListener('click', ()=> switchToTab(btn.dataset.tab));
  });
  const hamburgerBtn = document.getElementById('openSidebarBtn');
  if(hamburgerBtn) hamburgerBtn.addEventListener('click', ()=>{ sidebarOpen = true; render(); });
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  if(sidebarBackdrop) sidebarBackdrop.addEventListener('click', ()=>{ sidebarOpen = false; render(); });
  const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
  if(sidebarCloseBtn) sidebarCloseBtn.addEventListener('click', ()=>{ sidebarOpen = false; render(); });
  const notifBellBtn = document.getElementById('notifBellBtn');
  if(notifBellBtn) notifBellBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleNotifPanel(); });
  const notifBackdrop = document.getElementById('notifBackdrop');
  if(notifBackdrop) notifBackdrop.addEventListener('click', ()=>{ notifPanelOpen = false; render(); });
  const notifCloseBtn = document.getElementById('notifCloseBtn');
  if(notifCloseBtn) notifCloseBtn.addEventListener('click', ()=>{ notifPanelOpen = false; render(); });
  document.querySelectorAll('[data-notif-id]').forEach(btn=>{
    btn.addEventListener('click', ()=> runNotifItem(btn.dataset.notifId));
  });
  const seeAllNotifsBtn = document.getElementById('seeAllNotifsBtn');
  if(seeAllNotifsBtn) seeAllNotifsBtn.addEventListener('click', ()=> toggleNotifPanel());
  document.querySelectorAll('[data-set-theme]').forEach(btn=>{
    btn.addEventListener('click', ()=> cycleThemeMode());
  });
  const dialogConfirmBtn = document.getElementById('dialogConfirmBtn');
  if(dialogConfirmBtn) dialogConfirmBtn.addEventListener('click', ()=>{ hapticTap('Medium'); closeDialog(true); });
  const dialogCancelBtn = document.getElementById('dialogCancelBtn');
  if(dialogCancelBtn) dialogCancelBtn.addEventListener('click', ()=> closeDialog(false));
  const dialogBackdrop = document.getElementById('dialogBackdrop');
  if(dialogBackdrop) dialogBackdrop.addEventListener('click', ()=> closeDialog(false));
  document.querySelectorAll('[data-toast-id]').forEach(el=>{
    el.addEventListener('click', ()=> dismissToast(Number(el.dataset.toastId)));
  });
  const commandPaletteBackdrop = document.getElementById('commandPaletteBackdrop');
  if(commandPaletteBackdrop) commandPaletteBackdrop.addEventListener('click', closeCommandPalette);
  const commandPaletteInput = document.getElementById('commandPaletteInput');
  if(commandPaletteInput){
    commandPaletteInput.addEventListener('input', ()=>{ commandPaletteQuery = commandPaletteInput.value; render(); });
    commandPaletteInput.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        const first = filteredCommands()[0];
        if(first) runCommand(first.id);
      }
    });
  }
  document.querySelectorAll('[data-command-id]').forEach(btn=>{
    btn.addEventListener('click', ()=> runCommand(btn.dataset.commandId));
  });
  const openCommandPaletteBtn = document.getElementById('openCommandPaletteBtn');
  if(openCommandPaletteBtn) openCommandPaletteBtn.addEventListener('click', openCommandPalette);
  document.querySelectorAll('[data-read-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const url = buildReadingLink(state.readingApp, btn.dataset.readBook, Number(btn.dataset.readChapter));
      if(url) window.open(url, '_blank');
    });
  });
  document.querySelectorAll('[data-action="complete"],[data-action="skip"],[data-action="undo"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const catId = btn.dataset.cat;
      const action = btn.dataset.action;
      if(action==='complete'){
        hapticTap('Medium');
        // Flag this category as "just completed" BEFORE calling completeReading() — it calls
        // render() itself, so the very next render needs to already see the flag to play the
        // checkmark pop on the status pill. Cleared shortly after so the animation doesn't
        // needlessly replay on some unrelated later render while this stays set.
        justCompletedCat = catId;
        completeReading(catId, selectedDate);
        setTimeout(()=>{ justCompletedCat = null; render(); }, 700);
      }
      else if(action==='skip') skipReading(catId, selectedDate);
      else if(action==='undo') undoLast(catId);
    });
  });
  const dismissCheckin = document.querySelector('[data-action="dismiss-checkin"]');
  if(dismissCheckin) dismissCheckin.addEventListener('click', ()=>{
    const el = dismissCheckin.closest('.checkin-banner');
    if(el) el.style.display = 'none';
  });
  const dateSel = document.getElementById('dateSel');
  if(dateSel){
    dateSel.addEventListener('change', ()=>{ selectedDate = dateSel.value || todayStr(); checkinEditing = false; render(); });
  }
  const backBtn = document.getElementById('backToToday');
  if(backBtn){ backBtn.addEventListener('click', ()=>{ selectedDate = todayStr(); checkinEditing = false; render(); }); }

  document.querySelectorAll('.journal-tag-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      journalDraftTag = btn.dataset.tag;
      document.querySelectorAll('.journal-tag-btn').forEach(b=>b.classList.toggle('selected', b===btn));
    });
  });
  const saveJournalBtn = document.getElementById('saveJournalBtn');
  if(saveJournalBtn){
    saveJournalBtn.addEventListener('click', ()=>{
      const dateEl = document.getElementById('journalDate');
      const titleEl = document.getElementById('journalTitle');
      const contentEl = document.getElementById('journalContent');
      const refBookEl = document.getElementById('journalRefBook');
      const refChapterEl = document.getElementById('journalRefChapter');
      const refVerseEl = document.getElementById('journalRefVerse');
      const date = (dateEl && dateEl.value) || todayStr();
      const content = contentEl ? contentEl.value : '';
      const title = titleEl ? titleEl.value : '';
      if(!content.trim() && !title.trim()){ customAlert('Add a title or some content before saving.'); return; }
      const reference = (refBookEl && refBookEl.value) ? { book: refBookEl.value, chapter: refChapterEl.value ? Number(refChapterEl.value) : null, verse: refVerseEl.value ? Number(refVerseEl.value) : null } : null;
      addJournalEntry(date, journalDraftTag, content, title, reference);
      showToast('Entry saved.', { tone:'good' });
    });
  }
  document.querySelectorAll('[data-journal-filter]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ journalFilter = btn.dataset.journalFilter; render(); });
  });
  document.querySelectorAll('[data-delete-journal]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      customConfirm('Delete this journal entry?', { confirmLabel:'Delete', danger:true }).then(ok=>{
        if(!ok) return;
        const row = btn.closest('.journal-entry');
        animateRemoval(row, ()=> deleteJournalEntry(btn.dataset.deleteJournal));
      });
    });
  });

  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn){
    logoutBtn.addEventListener('click', ()=>{
      customConfirm('Log out? Your data stays safely in your account.', { confirmLabel:'Log out' }).then(ok=>{
        if(ok) doLogOut();
      });

  }
  const upgradeBtn = document.getElementById('upgradeAccountBtn');
  if(upgradeBtn){
    upgradeBtn.addEventListener('click', ()=>{ forceShowGate = true; authView = 'signup'; authError=''; render(); });
  }
  const changePlanBtn = document.getElementById('changePlanBtn');
  if(changePlanBtn) changePlanBtn.addEventListener('click', openPlanChooser);

  });
  document.querySelectorAll('input[name="feedbackType"]').forEach(radio=>{
    radio.addEventListener('change', ()=>{ if(radio.checked){ feedbackType = radio.value; render(); } });
  });
  const submitFeedbackBtn = document.getElementById('submitFeedbackBtn');
  if(submitFeedbackBtn){
    submitFeedbackBtn.addEventListener('click', ()=>{
      const msgEl = document.getElementById('feedbackMessage');

  }
  const feedbackAnotherBtn = document.getElementById('feedbackAnotherBtn');
  if(feedbackAnotherBtn) feedbackAnotherBtn.addEventListener('click', ()=>{ feedbackStatus = 'idle'; render(); });

  // Memorization
  const addMemBtn = document.getElementById('addMemBtn');
  if(addMemBtn){
    addMemBtn.addEventListener('click', ()=>{
      const refEl = document.getElementById('memRef');
      const textEl = document.getElementById('memText');

    });
  }
  document.querySelectorAll('[data-mem-review]').forEach(btn=> btn.addEventListener('click', ()=> reviewMemoryVerse(btn.dataset.memReview)));
  document.querySelectorAll('[data-mem-toggle]').forEach(btn=> btn.addEventListener('click', ()=> toggleMemoryMastered(btn.dataset.memToggle)));
  document.querySelectorAll('[data-mem-delete]').forEach(btn=> btn.addEventListener('click', ()=>{
    customConfirm('Remove this verse?', { confirmLabel:'Remove', danger:true }).then(ok=>{ if(ok) deleteMemoryVerse(btn.dataset.memDelete); });
  }));

  // Extra / outside-plan reading
  const addExtraBtn = document.getElementById('addExtraBtn');
  if(addExtraBtn){
    addExtraBtn.addEventListener('click', ()=>{
      const bookEl = document.getElementById('extraBook');
      const chapterEl = document.getElementById('extraChapter');
      addExtraReading(selectedDate, bookEl.value, chapterEl.value ? Number(chapterEl.value) : null, '');

  document.querySelectorAll('[data-delete-extra]').forEach(btn=> btn.addEventListener('click', ()=>{

  // Spiritual temperature check-in
  document.querySelectorAll('[data-checkin-value]').forEach(btn=>{
    btn.addEventListener('click', ()=>{

  // Profile
