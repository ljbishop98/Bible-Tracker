// ---- Delete group (owner only) ----
// Firestore has no built-in "delete this doc and everything under it" for client SDKs — each
// subcollection has to be cleared out by hand. Order matters: the group doc itself is deleted
// LAST, since the security rules for deleting a message (and for an owner removing another
// member) both need to look the group doc up to confirm who its owner is — delete it first and
// those checks would fail. Deleting non-owner members before the owner's own membership doc
// matters for the same reason on the members side.
let groupDeleteError = '';
function deleteAllInSubcollection(groupRef, name){
  return groupRef.collection(name).get().then(snap=> Promise.all(snap.docs.map(d=> d.ref.delete())));
}
function deleteGroup(groupId){
  if(!fbDb || !currentUser) return Promise.reject(new Error('Not signed in.'));
  const groupRef = fbDb.collection('groups').doc(groupId);
  return groupRef.collection('members').get().then(memberSnap=>{
    const others = memberSnap.docs.filter(d=> d.id !== currentUser.uid);
    const mine = memberSnap.docs.find(d=> d.id === currentUser.uid);
    return Promise.all(others.map(d=> d.ref.delete())).then(()=> mine ? mine.ref.delete() : null);
  }).then(()=> Promise.all([
    deleteAllInSubcollection(groupRef, 'messages'),
    deleteAllInSubcollection(groupRef, 'joinRequests'),
    deleteAllInSubcollection(groupRef, 'progress')
  ])).then(()=> groupRef.delete());
}

// ---- Discussion ----
let groupMessageText = '';
// ---- @mention autocomplete ----
// Typing "@" followed by non-space characters (and nothing sent/selected yet) opens a dropdown of
// this group's members whose name contains what's been typed so far; picking one splices the full
// "@Display Name " in at the right spot. mentionQuery holds just the in-progress fragment after the
// last unterminated "@" — a plain space (or sending/switching away) clears it.
let mentionDropdownOpen = false;
let mentionQuery = '';
function detectMentionQuery(value, cursorPos){
  const before = value.slice(0, cursorPos);
  const atIndex = before.lastIndexOf('@');
  if(atIndex === -1) return null;
  const between = before.slice(atIndex+1);
  if(/\s/.test(between)) return null; // the @ belongs to an already-finished word, not one being typed now
  return between;
}
function updateMentionDropdown(el){
  const q = detectMentionQuery(el.value, el.selectionStart);
  if(q === null){ mentionDropdownOpen = false; mentionQuery = ''; return; }
  mentionQuery = q;
  mentionDropdownOpen = true;
}
function mentionMatches(){
  if(!mentionDropdownOpen) return [];
  const q = mentionQuery.toLowerCase();
  return activeGroupMembers.filter(m=> m.displayName && m.displayName.toLowerCase().includes(q)).slice(0,6);
}
function closeMentionDropdown(){ mentionDropdownOpen = false; mentionQuery = ''; }
function selectMention(uid){
  const el = document.getElementById('groupMessageInput');
  const member = activeGroupMembers.find(m=>m.uid===uid);
  if(!el || !member || !member.displayName) return;
  const cursor = el.selectionStart;
  const value = el.value;
  const before = value.slice(0, cursor);
  const atIndex = before.lastIndexOf('@');
  if(atIndex === -1) return;
  const after = value.slice(cursor);
  const inserted = '@' + member.displayName + ' ';
  groupMessageText = value.slice(0, atIndex) + inserted + after;
  closeMentionDropdown();
  render();
  const newEl = document.getElementById('groupMessageInput');
  if(newEl){
    newEl.focus();
    const pos = atIndex + inserted.length;
    if(newEl.setSelectionRange) newEl.setSelectionRange(pos, pos);
  }
}
// ---- Editing/deleting your own messages ----
// Author-only, enforced both in UI (buttons only on your own messages) and in Firestore rules
// (v19: update/delete allowed where resource.data.authorUid == request.auth.uid). Edits re-parse
// @mentions and stamp editedAt, which the message row surfaces as a small "(edited)" tag.
let editingMessageId = null;
let editingMessageText = '';
function startEditGroupMessage(messageId){
  const m = activeGroupMessages.find(x=>x.id===messageId);
  if(!m) return;
  editingMessageId = messageId;
  editingMessageText = m.text || '';
  render();
  const el = document.getElementById('msgEditInput');
  if(el){ el.focus(); if(el.setSelectionRange) el.setSelectionRange(el.value.length, el.value.length); }
}
function cancelEditGroupMessage(){
  editingMessageId = null; editingMessageText = '';
  const el = document.getElementById('msgEditInput');
  if(el) el.blur();
  render();
}
function saveEditedGroupMessage(groupId){
  const el = document.getElementById('msgEditInput');
  const trimmed = ((el && el.value) || '').trim();
  if(!trimmed || !fbDb || !currentUser || !editingMessageId) return;
  const { mentionedUids } = parseMentions(trimmed, activeGroupMembers);
  const msgId = editingMessageId;
  if(el) el.blur();
  fbDb.collection('groups').doc(groupId).collection('messages').doc(msgId).update({
    text: trimmed.slice(0,2000), mentionedUids, editedAt: Date.now()
  }).then(()=>{
    editingMessageId = null; editingMessageText = '';
    render();
  }).catch(()=>{ showToast("Couldn't save that edit — try again."); });
}
function deleteGroupMessage(groupId, messageId){
  if(!fbDb || !currentUser) return;
  customConfirm('Delete this message? This can’t be undone.', { confirmLabel:'Delete', danger:true }).then(ok=>{
    if(!ok) return;
    fbDb.collection('groups').doc(groupId).collection('messages').doc(messageId).delete()
      .catch(()=>{ showToast("Couldn't delete that message — try again."); });
  });
}
function sendGroupMessage(groupId, text){
  const trimmed = (text||'').trim();
  if(!trimmed || !fbDb || !currentUser) return;
  const { mentionedUids } = parseMentions(trimmed, activeGroupMembers);
  fbDb.collection('groups').doc(groupId).collection('messages').add({
    authorUid: currentUser.uid,
    authorName: displayNameOr(currentUser.email.split('@')[0]),
    text: trimmed.slice(0,2000),
    mentionedUids,
    createdAt: Date.now()
  }).then(()=>{
    groupMessageText = '';
    mentionDropdownOpen = false;
    // render() snapshots whichever element currently has focus and force-restores its PRE-render
    // value afterward (see restoreFocus() near the top of render()) — that's what makes typing
    // survive an unrelated re-render elsewhere in the app. But it also means that if the message
    // box itself still has focus right after sending (the normal case — nobody clicks away first),
    // it would snapshot the just-sent text and paste it right back in, undoing the clear above.
    // Blurring first means this render() has nothing focused to snapshot, so the fresh empty value
    // from the template actually sticks.
    const inputEl = document.getElementById('groupMessageInput');
    if(inputEl) inputEl.blur();
    render();
  }).catch(()=>{});
}

/* ---------------- Check-in reminders (push notifications) ---------------- */
let notifStatus = 'unknown'; // unknown | unsupported | default | denied | granted
function refreshNotifStatus(){

/* ---------------- Rendering ---------------- */
function render(){
  ensurePlanReady();
  const app = document.getElementById('app');

  // This whole app rebuilds the page's HTML from scratch on every render() call — simple, but
  // it means any input element gets destroyed and recreated each time, which normally kills focus
  // and drops whatever was mid-typed. Most fields never hit this (they're only read at submit time),
  // but live features like friend search call render() WHILE the user is typing. So: snapshot
  // whichever element is currently focused before rebuilding, then restore focus, cursor position,
  // and the literal value the user had typed right after — regardless of which branch below runs.
  const active = document.activeElement;
  let focusRestore = null;
  if(active && active.id && app.contains(active) && typeof active.value === 'string'){
    focusRestore = { id: active.id, value: active.value, start: active.selectionStart, end: active.selectionEnd };
  }
  function restoreFocus(){
    if(!focusRestore) return;
    const el = document.getElementById(focusRestore.id);
    if(!el) return;
    el.value = focusRestore.value;
    el.focus();
    if(typeof focusRestore.start === 'number' && el.setSelectionRange){
      try{ el.setSelectionRange(focusRestore.start, focusRestore.end); }catch(e){}
    }
  }

  // These two early-exit screens render before the main app shell (desktop nav / bottom nav) ever
  // appears, so they're wrapped in .app-main directly rather than the full render() layout below —
  // that's the same box that used to be #app itself, so they keep the identical centered/padded look.
  if(shouldShowGate()){
    // Signup gets the full-screen, one-question-per-step wizard (credentials -> plan -> bio ->
    // review -> account creation); log in and password reset stay the plain single-screen form —
    // there's nothing to break into steps for either of those.
    if(authView === 'signup'){
      app.innerHTML = `<div class="app-main">${renderSignupWizard()}</div>` + renderIntroOverlay();
      attachSignupWizardEvents();
    } else {
      app.innerHTML = `<div class="app-main">${renderAuthGate()}</div>` + renderIntroOverlay();
      attachAuthGateEvents();
    }
    wireIntroEvents();
    restoreFocus();
    return;
  }
  const forced = needsPlanOnboarding();
  if(forced || planChooserOpen){
    app.innerHTML = `<div class="app-main"><div class="onboard-wrap">${onboardingStep==='custom' ? renderCustomBuilder(!forced) : renderPlanChoose(!forced)}</div></div>`;
    attachPlanChooserEvents();
    restoreFocus();
    return;
  }
  const tabContent = ownProfileOpen ? renderOwnProfilePage() : viewedProfileUid ? renderProfilePage() : (
    activeTab==='today' ? renderToday() :
    activeTab==='log' ? renderLog() :
    activeTab==='journal' ? renderJournal() :
    activeTab==='memorize' ? renderMemorize() :
    activeTab==='dashboard' ? renderDashboard() :
    activeTab==='community' ? renderCommunity() :
    activeTab==='account' ? renderAccountTab() : ''
  );
  // A full innerHTML rebuild on every render() call is what makes every navigation feel like an
  // instant page-reload rather than moving between screens. render() runs constantly though (every
  // keystroke in a search box, every tick of a timer), so the entrance animation below only plays
  // when the actual VIEW has changed since the last render — a "drill-in" (opening a profile or a
  // group) slides in from the right like a native navigation push; switching between top-level
  // tabs just cross-fades. Anything that re-renders the same view (typing, a background sync
  // completing) gets no animation class at all, so it stays instant as before.
  const isDrillIn = ownProfileOpen || !!viewedProfileUid || (activeTab==='community' && !!activeGroupId);
  const viewKey = activeTab + (ownProfileOpen ? ':ownprofile' : '') + (viewedProfileUid ? ':profile:'+viewedProfileUid : '') + (activeTab==='community' && activeGroupId ? ':group:'+activeGroupId : '');
  const viewChanged = viewKey !== lastRenderedViewKey;
  lastRenderedViewKey = viewKey;
  const viewAnimClass = viewChanged ? (isDrillIn ? 'view-enter-slide' : 'view-enter-fade') : '';
  app.innerHTML = `
    ${renderDesktopNav()}
    <div class="app-main">
      ${renderTopStrip()}
      ${renderGroupInviteBanner()}
      ${renderCheckinBanner()}
      ${renderGuestDataBanner()}
      ${renderInstallBanner()}
      <div class="view-root ${viewAnimClass}">${tabContent}</div>
      ${renderFooter()}
    </div>
    ${renderBottomNav()}
    ${renderSidebar()}
    ${renderNotifPanel()}
    ${renderDialogOverlay()}
    ${renderCommandPalette()}
    ${renderToastStack()}
    ${(currentUser && !ownProfileOpen && activeTab==='community' && communitySubTab!=='groups' && !activeGroupId) ? `
      <button type="button" class="fab-add-post" id="openPostComposerBtn" aria-label="New update">${icon('plus',24)}</button>` : ''}
    ${(!ownProfileOpen && activeTab==='today') ? `
      <button type="button" class="fab-add-post" id="openExtraSheetBtn" aria-label="Log extra reading" title="Log reading outside your plan">${icon('plus',24)}</button>` : ''}
    ${renderIntroOverlay()}
  `;
  attachEvents();
  wireIntroEvents();
  restoreFocus();
  animateDashboardMetrics();
}

  // right after auth resolves; someone brand new lands on the sign-up gate first, which handles

  if(!pendingGroupInvite || currentUser) return '';

// Dismissing this banner used to only hide the DOM node directly (el.style.display='none') —
// nothing was ever persisted, so the very next render() (any unrelated re-render, and certainly a
// page refresh) rebuilt it from scratch and showed it again. Fixed the same way the bell/inbox's
// own checkin nudge already works: dismissal is scoped to today's date and saved to localStorage,
// so it stays dismissed for the rest of today but comes back on its own if the gap is still there

const CHECKIN_BANNER_DISMISS_KEY = 'cultivateCheckinBannerDismissedDate';

try{ checkinBannerDismissedDate = localStorage.getItem(CHECKIN_BANNER_DISMISS_KEY); }catch(e){}

function attachPlanChooserEvents(){
  document.querySelectorAll('[data-preset]').forEach(btn=>{

      applyPlan(preset.id, preset.categories);
      planChooserOpen = false;
    });
  });
  const openBuilder = document.getElementById('openCustomBuilder');
  if(openBuilder) openBuilder.addEventListener('click', openCustomBuilder);
  const cancel = document.getElementById('cancelPlanChooser');
  if(cancel) cancel.addEventListener('click', e=>{ e.preventDefault(); closePlanChooser(); });
  const backToPresets = document.getElementById('backToPresets');
  if(backToPresets) backToPresets.addEventListener('click', ()=>{ onboardingStep='choose'; render(); });
  const addCat = document.getElementById('addDraftCategory');
  if(addCat) addCat.addEventListener('click', addDraftCategory);
  const saveBtn = document.getElementById('saveCustomPlan');
  if(saveBtn) saveBtn.addEventListener('click', saveCustomPlan);

  document.querySelectorAll('[data-name-for]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const cat = customDraft.find(c=>c.id===inp.dataset.nameFor);
      if(cat) cat.name = inp.value;
    });
  });
  document.querySelectorAll('[data-color-for]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.colorFor);
      if(cat){ cat.color = btn.dataset.color; render(); }
    });
  });
  document.querySelectorAll('[data-remove-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=> removeDraftCategory(btn.dataset.removeCat));
  });
  document.querySelectorAll('[data-add-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.addBook);
      const select = document.querySelector(`[data-book-select-for="${btn.dataset.addBook}"]`);
      if(cat && select) cat.books.push(bookObj(select.value));
      render();
    });
  });
  document.querySelectorAll('[data-remove-book]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.removeBook);
      if(cat) cat.books.splice(Number(btn.dataset.idx), 1);
      render();
    });
  });
  document.querySelectorAll('[data-move]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = customDraft.find(c=>c.id===btn.dataset.cat);
      if(!cat) return;
      const idx = Number(btn.dataset.idx);
      const dir = btn.dataset.move === 'up' ? -1 : 1;
      const swapIdx = idx + dir;
      if(swapIdx < 0 || swapIdx >= cat.books.length) return;
      [cat.books[idx], cat.books[swapIdx]] = [cat.books[swapIdx], cat.books[idx]];
      render();
    });
  });
}

// morning/noon/night period as the whole app theme (effectivePeriod()), so the card's corner

// Ambient loops (glow pulse, twinkle, cloud drift) get NEGATIVE animation-delays derived from

    const due = getDue(cat.id);

    const lastEntry = entriesToday[entriesToday.length-1];
    let statusHtml = '';
    if(lastEntry){
      if(lastEntry.status==='complete'){
        const shouldPop = cat.id === justCompletedCat && pillPopRenderedFor !== cat.id;
        if(shouldPop) pillPopRenderedFor = cat.id;
        if(justCompletedCat === null && pillPopRenderedFor === cat.id) pillPopRenderedFor = null;
        statusHtml = `<span class="status-pill complete ${shouldPop?'pill-pop':''}">&#10003; Completed today</span>`;
      } else {
        statusHtml = `<span class="status-pill skipped">&#8631; Skipped &mdash; pushed to next time</span>`;
      }
    }
    const priorLogsHtml = entriesToday.length ? `
      <div class="today-log-list">
        ${entriesToday.map(e=>`<div>${e.status==='complete'?'&#10003;':'&#8631;'} ${e.book} ${e.chapter} &mdash; ${e.status}</div>`).join('')}
      </div>` : '';
    return `
      <div class="card" style="--cat-color:${cat.color}">
        <div class="cat-name">${cat.name}</div>
        ${statusHtml}
        <div class="due">${due.book} ${due.chapter}</div>
        <div class="meta">Next up &middot; cycle ${(state.cycles[cat.id]||0)+1} &middot; ${state.cursors[cat.id]||0}/${cat.total} chapters into this pass</div>
        <div class="actions">
          <button class="btn" data-read-book="${due.book}" data-read-chapter="${due.chapter}">Read in ${READING_APPS[state.readingApp].label} &rarr;</button>
          <button class="btn primary" data-action="complete" data-cat="${cat.id}">Mark complete</button>
          <button class="btn" data-action="skip" data-cat="${cat.id}">Skip &rarr; next time</button>
          ${lastLogEntry(cat.id) ? `<button class="btn small" data-action="undo" data-cat="${cat.id}">Undo last</button>` : ''}
        </div>
        ${priorLogsHtml}
      </div>`;
  }).join('');

  // Shows the full picker until you've answered for this date, then collapses to a single
  // acknowledgement line instead of continuing to take up space at the top of the page — "Change"
  // reopens the picker if you want to revise today's answer.
  const existingCheckin = checkinFor(selectedDate);
  const checkinHtml = (existingCheckin && !checkinEditing) ? `
    <div class="checkin-done-line">
      <span>${isToday ? "You logged today's walk as" : "You logged that day's walk as"} <strong>${CHECKIN_LABELS[existingCheckin.value]}</strong>.</span>
      <button type="button" data-action="edit-checkin">Change</button>
    </div>` : `
    <div class="settings-box" style="max-width:none;">
      <h3>How's your walk today?</h3>
      <p style="font-size:0.82rem; color:var(--ink-soft); margin-top:-6px;">Purely optional, just for you — no reminders, no tracking pressure.</p>
      <div class="checkin-icon-row">
        ${[1,2,3,4,5].map(v=>`
          <button type="button" class="checkin-icon-btn ${existingCheckin && existingCheckin.value===v ? 'selected' : ''}" data-checkin-value="${v}">
            <span class="checkin-icon-circle">${icon(CHECKIN_ICON_NAMES[v], 22)}</span>
            <span class="checkin-icon-label">${CHECKIN_LABELS[v]}</span>
          </button>`).join('')}
      </div>
    </div>`;

  // "Reading outside your plan" used to be a full form crammed at the bottom of the page — the
  // form now lives in a bottom sheet behind the floating + button (see renderExtraReadingSheet /
  // the fab-add-extra in render()). Anything already logged for this date still shows here as a
  // quiet list, since that's information, not chrome.
  const extraTodayEntries = state.extraLog.filter(e=>e.date===selectedDate);
  const extraLoggedHtml = extraTodayEntries.length ? `
    <div class="settings-box" style="max-width:none;">
      <h3>${icon('bookmark',16)} Outside your plan</h3>
      <div class="today-log-list">${extraTodayEntries.map(e=>`<div class="extra-log-row">${e.book} ${e.chapter||''} <button class="btn small danger" data-delete-extra="${e.id}" style="margin-left:6px;">Remove</button></div>`).join('')}</div>
    </div>` : '';

  return `
    ${renderConsiderHim()}
    ${checkinHtml}
    ${renderMemorizeReminder()}
    <div class="toolbar">
      <label for="dateSel" style="font-size:0.85rem; color:var(--ink-soft);">Logging for:</label>
      <input type="date" id="dateSel" value="${selectedDate}" max="${todayStr()}">
      ${!isToday ? `<button class="btn small" id="backToToday">Back to today</button>` : ''}
      <span style="font-size:0.8rem; color:var(--ink-soft);">${fmtDate(selectedDate)}</span>
    </div>
    <div class="grid">${cards}</div>
    ${extraLoggedHtml}
    ${renderTodayNotifStrip()}
    ${renderExtraReadingSheet()}
  `;
}

// One quiet line, not another card — Today stays minimalist. Only appears when there ARE verses
// still being learned and none of them has been reviewed yet today; vanishes the moment you
// review one (lastReviewed stamps today) so it never nags twice.
function renderMemorizeReminder(){
  const learning = (state.memorization||[]).filter(m=>m.status!=='mastered');
  if(!learning.length) return '';
  if(learning.some(m=>m.lastReviewed === todayStr())) return '';
  const label = learning.length===1
    ? `&ldquo;${escapeHtml(learning[0].reference)}&rdquo; is waiting for review`
    : `${learning.length} verses are waiting for review`;
  return `
    <button type="button" class="memorize-reminder" id="memorizeReminderBtn">
      ${icon('bookmark',14)} <span>${label}</span> <span class="mem-rem-go">Review &rarr;</span>

}

function renderLog(){
  const dates = Array.from(new Set(state.log.map(e=>e.date))).sort().reverse();
  if(!dates.length){
    return emptyState('calendar', "No readings logged yet — once you mark a chapter complete on the Today tab, it'll show up here.");
  }
  const groups = {};
  dates.forEach(d=>{
    const ym = d.slice(0,7);
    (groups[ym] = groups[ym]||[]).push(d);
  });
  const ymKeys = Object.keys(groups).sort().reverse();
  const monthName = ym => {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m-1, 1).toLocaleDateString(undefined,{month:'long', year:'numeric'});
  };
  return ymKeys.map((ym, i)=>{
    const rows = groups[ym].map(date=>{
      const cells = ACTIVE_CATEGORIES.map(cat=>{
        const entries = logEntriesFor(cat.id, date);
        if(!entries.length) return `<td></td>`;
        return `<td class="${entries.some(e=>e.status==='complete')?'cell-complete':'cell-skipped'}">
          ${entries.map(e=>`${e.book} ${e.chapter}${e.status==='skipped'?' (skipped)':''}`).join(', ')}
        </td>`;
      }).join('');
      return `<tr><td>${fmtDate(date)}</td>${cells}</tr>`;
    }).join('');
    return `
      <details class="month-group" ${keepOpenAttrs('logMonth:'+ym, i===0)}>
        <summary>${monthName(ym)} <span style="color:var(--ink-soft); font-weight:500;">${groups[ym].length} day(s) logged</span></summary>
        <div class="log-scroll">
          <table class="logtable">
            <thead><tr><th>Date</th>${ACTIVE_CATEGORIES.map(c=>`<th>${c.name}</th>`).join('')}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </details>`;
  }).join('');
}

/* ---------------- Community (Friends + Groups, unified tab) ----------------
   Friends and Groups now live behind one "Community" tab with a dual sub-tab switcher at the top.
   The Friends sub-tab additionally gets a lightweight status-update feed: a floating + button
   opens a one-field composer (text + optional photo), no likes/comments in this first version.
   Audience is derived from the existing profile public/private toggle at the moment of posting —
   friends can always see it; everyone can if the account was public when it was posted — rather
   than asking the user to choose a visibility per post, which would just duplicate a setting that
   already exists. Posts live in a per-user `users/{uid}/posts` subcollection (see firestore rules)
   so that "list a friend's posts" is a single scoped query, never a broad cross-user query. */
let communitySubTab = 'friends';
let communityPosts = [];
let communityPostsLoading = false;
let communityPostsLoaded = false;
let communityPostsError = '';
const POST_PHOTO_MAX_LEN = 300000;
let postComposerOpen = false;
let postDraftText = '';
let postDraftPhoto = '';
let postPhotoError = '';
let postCreateBusy = false;
let postCreateError = '';

function loadCommunityFeed(force){
  if(!fbDb || !currentUser) return;
  if(communityPostsLoaded && !force) return;
  communityPostsLoading = true; communityPostsError = ''; render();
  const myUid = currentUser.uid;
  const friendUids = friendLinksData.filter(l=>l.status==='accepted').map(l=> l.userIds.find(u=>u!==myUid));
  const uidsToFetch = [myUid].concat(friendUids);
  Promise.all(uidsToFetch.map(uid=>
    fbDb.collection('users').doc(uid).collection('posts').orderBy('createdAt','desc').limit(20).get()
      .then(snap=> snap.docs.map(d=>Object.assign({ id:d.id, uid }, d.data())))
      .catch(()=>[])
  )).then(results=>{
    const merged = [];
    results.forEach(arr=> merged.push(...arr));
    merged.sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
    communityPosts = merged.slice(0,40);
    communityPostsLoading = false; communityPostsLoaded = true;
    render();
  }).catch(err=>{
    communityPostsLoading = false; communityPostsError = (err&&err.message) || 'Could not load the feed.';
    render();
  });
}

function openPostComposer(){
  postComposerOpen = true; postDraftText=''; postDraftPhoto=''; postPhotoError=''; postCreateError='';
  render();
}
function closePostComposer(){ postComposerOpen = false; render(); }
function createCommunityPost(){
  if(!fbDb || !currentUser) return;
  const text = postDraftText.trim();
  if(!text && !postDraftPhoto){ postCreateError = 'Write something or add a photo first.'; render(); return; }
  postCreateBusy = true; postCreateError = ''; render();
  const visibility = state.profile.visibility === 'public' ? 'public' : 'friends';
  const doc = {
    text: text.slice(0,500),
    photo: postDraftPhoto || null,
    visibility,
    authorName: displayNameOr(currentUser.email.split('@')[0]),
    authorPhoto: state.profile.photo || null,
    createdAt: Date.now()
  };
  fbDb.collection('users').doc(currentUser.uid).collection('posts').add(doc).then(ref=>{
    postCreateBusy = false; postComposerOpen = false;
    communityPosts = [Object.assign({ id: ref.id, uid: currentUser.uid }, doc)].concat(communityPosts).slice(0,40);
    showToast('Posted.', { tone:'good' });
    render();
  }).catch(err=>{
    postCreateBusy = false; postCreateError = (err&&err.message) || 'Could not post that — try again.';
    render();
  });
}
function deleteCommunityPost(postId){
  if(!fbDb || !currentUser) return;
  fbDb.collection('users').doc(currentUser.uid).collection('posts').doc(postId).delete().then(()=>{
    communityPosts = communityPosts.filter(p=>p.id!==postId);
    render();
  }).catch(()=> showToast('Could not delete that post.', { tone:'bad' }));
}

function renderCommunity(){
  if(!currentUser){
    return `<div class="empty-note">Community requires an account, since it connects your progress with friends and groups. Create an account or log in from the Account tab.</div>`;
  }
  const showingGroups = communitySubTab === 'groups' || !!activeGroupId;
  const subtabsHtml = `
    <div class="group-tabs community-subtabs">
      <button class="${!showingGroups?'active':''}" data-community-subtab="friends">${icon('userPlus',14)} Friends</button>
      <button class="${showingGroups?'active':''}" data-community-subtab="groups">${icon('users',14)} Groups</button>
    </div>`;
  if(showingGroups) return subtabsHtml + renderGroups();
  return subtabsHtml + renderCommunityFeed() + renderFriends() + renderPostComposerSheet();
}

function renderCommunityFeed(){
  let feedHtml;
  if(communityPostsLoading && !communityPostsLoaded){
    feedHtml = skeletonCardListHtml(2);
  } else if(communityPostsError){
    feedHtml = `<div class="auth-error">${escapeHtml(communityPostsError)}</div>`;
  } else if(!communityPosts.length){
    feedHtml = emptyState('userPlus', "No posts yet — be the first to share a quick update with your friends.");
  } else {
    feedHtml = `<div class="community-feed">${communityPosts.map(renderCommunityPostCard).join('')}</div>`;
  }
  return `<div class="settings-box">
    <h3>${icon('notebook',16)} Updates</h3>
    ${feedHtml}
  </div>`;
}
function renderCommunityPostCard(p){
  const mine = currentUser && p.uid === currentUser.uid;
  return `
    <div class="card community-post-card">
      <div class="community-post-head">
        ${renderAvatarHtml({displayName:p.authorName, photo:p.authorPhoto}, 36)}
        <div class="community-post-meta">
          <div class="community-post-name">${escapeHtml(p.authorName||'Someone')}</div>
          <div class="community-post-time">${timeAgo(p.createdAt)}${p.visibility==='public' ? ' &middot; Public' : ''}</div>
        </div>
        ${mine ? `<button type="button" class="community-post-delete" data-delete-post="${p.id}" aria-label="Delete post">${icon('trash',15)}</button>` : ''}
      </div>
      ${p.text ? `<div class="community-post-text">${escapeHtml(p.text)}</div>` : ''}
      ${p.photo ? `<img src="${p.photo}" class="community-post-photo" alt="">` : ''}
    </div>`;
}

    <div id="postComposerBackdrop" class="sheet-backdrop ${postComposerOpen?'open':''}"></div>

      <div class="sheet-handle"></div>
      ${postComposerOpen ? `
        <div class="sheet-body">
          <div class="sheet-header">
            <h3>${icon('plus',16)} New update</h3>
            <button type="button" class="sheet-close-btn" id="closePostComposerBtn" aria-label="Close">${icon('close',18)}</button>

          ${postCreateError ? `<div class="auth-error">${escapeHtml(postCreateError)}</div>` : ''}
          <p style="font-size:0.82rem; color:var(--ink-soft); margin-top:-6px;">${state.profile.visibility==='public' ? 'Your profile is public, so this will be visible to everyone.' : 'Only your friends will see this.'}</p>
          <div class="auth-field">
            <textarea id="postComposerText" rows="4" placeholder="Share a quick update…" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; font-family:inherit; resize:vertical;">${escapeHtml(postDraftText)}</textarea>

function renderFriends(){
  if(!currentUser){
    return `<div class="empty-note">Friends & Family requires an account, since it connects your progress with someone else's. Create an account or log in from the Account tab.</div>`;
  }
  const myUid = currentUser.uid;
  const accepted = friendLinksData.filter(l=>l.status==='accepted');
  const incoming = friendLinksData.filter(l=>l.status==='pending' && l.requestedBy!==myUid);
  const outgoing = friendLinksData.filter(l=>l.status==='pending' && l.requestedBy===myUid);

  const searchResultRow = r => {
    const st = friendStatusWith(r.uid);
    let actionHtml;
    if(st.status==='friends') actionHtml = `<span class="status-pill complete">Friends</span>`;
    else if(st.status==='outgoing') actionHtml = `<button class="btn small" data-friend-cancel="${st.linkId}">Requested — cancel</button>`;
    else if(st.status==='incoming') actionHtml = `<span style="font-size:0.8rem; color:var(--ink-soft);">Check requests below</span>`;
    else actionHtml = `<button class="btn small primary" data-friend-send-uid="${r.uid}">Send request</button>`;
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
        <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml({displayName:r.displayName}, 32)}${r.displayName}</span>
        ${actionHtml}
      </div>`;
  };

  const addFormHtml = `
    <div class="settings-box">
      <h3>${icon('userPlus',16)} Add a friend &mdash; ${accepted.length} connection${accepted.length===1?'':'s'}</h3>
      <p style="font-size:0.85rem; color:var(--ink-soft);">Search by name or their exact email. We only ever share your name, last-active date, and current plan &mdash; never your journal or reading log.</p>
      ${friendRequestError ? `<div class="auth-error">${friendRequestError}</div>` : ''}
      <input type="text" id="friendSearchInput" placeholder="Search by name or email…" value="${friendSearchQuery}" style="width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:0.9rem; font-family:inherit;">
      <div style="margin-top:10px;">
        ${friendSearchBusy ? `<div style="font-size:0.82rem; color:var(--ink-soft);">Searching…</div>` : ''}
        ${!friendSearchBusy && friendSearchQuery.trim() && !friendSearchResults.length ? `<div style="font-size:0.82rem; color:var(--ink-soft);">No one found. If you searched their email, they need to have opened Cultivate at least once first.</div>` : ''}
        ${friendSearchResults.map(searchResultRow).join('')}
      </div>
    </div>`;

  const incomingHtml = `
    <div class="settings-box">
      <h3>Requests received (${incoming.length})</h3>
      ${incoming.length ? incoming.map(l=>{
        const reqAct = friendActivityCache[l.requestedBy];
        const name = reqAct ? reqAct.displayName : (friendNameCache[l.requestedBy] || 'Someone');
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
          <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml(reqAct||{displayName:name}, 32)}${name} wants to connect</span>
          <span style="display:flex; gap:6px;">
            <button class="btn small primary" data-friend-accept="${l.id}">Accept</button>
            <button class="btn small danger" data-friend-decline="${l.id}">Decline</button>
          </span>
        </div>`;
      }).join('') : `<div style="font-size:0.82rem; color:var(--ink-soft);">Nothing waiting on you right now.</div>`}
    </div>`;

  const outgoingHtml = `
    <div class="settings-box">
      <h3>Requests sent (${outgoing.length})</h3>
      ${outgoing.length ? outgoing.map(l=>{
        const otherUid = l.userIds.find(u=>u!==myUid);
        const act = friendActivityCache[otherUid];
        const name = act ? act.displayName : (friendNameCache[otherUid] || 'Waiting on a response');
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line);">
          <span style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">${renderAvatarHtml(act||{displayName:name}, 32)}${name}</span>
          <button class="btn small danger" data-friend-cancel="${l.id}">Unsend</button>
        </div>`;
      }).join('') : `<div style="font-size:0.82rem; color:var(--ink-soft);">Nothing pending.</div>`}
    </div>`;

  const acceptedHtml = accepted.length ? `
    <div class="settings-box">
      <h3>Connected (${accepted.length})</h3>
      ${accepted.map(l=>{
        const otherUid = l.userIds.find(u=>u!==myUid);
        const act = friendActivityCache[otherUid];
        return `
        <div style="display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);">
          ${renderAvatarHtml(act||{}, 40)}
          <div style="flex:1;">
            <div style="font-weight:700;">${act ? act.displayName : skeletonLine('120px')}</div>
            ${act ? `<div style="font-size:0.82rem; color:var(--ink-soft);">${act.planName ? act.planName + ' &middot; ' : ''}${act.activeDaysLast30||0} of the last 30 days active${act.lastActiveDate ? ' &middot; last read ' + fmtDate(act.lastActiveDate) : ''}</div>` : `<div style="margin-top:6px;">${skeletonLine('180px')}</div>`}
            <div style="display:flex; gap:6px; margin-top:6px;">
              <button class="btn small" data-view-profile="${otherUid}">View profile</button>
              <button class="btn small danger" data-friend-decline="${l.id}">Remove</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : emptyState('userPlus', 'No connections yet — search for a friend or family member above. This is meant to feel like company, not a leaderboard: no percentages, no comparisons, just knowing someone else is walking with you.');

  // A plain, on-screen troubleshooting panel — so if requests aren't showing up, what's actually
  // happening can be checked right here instead of needing to open browser dev tools. Shows exactly
  // what this account's live connection to Firestore currently sees.
  const troubleshootingHtml = `
    <details class="settings-box" style="font-size:0.82rem;" ${keepOpenAttrs('friendsTroubleshooting')}>
      <summary style="cursor:pointer; font-weight:600;">Troubleshooting</summary>
      <div style="margin-top:10px; color:var(--ink-soft); line-height:1.6;">
        <div>Signed in as: <strong>${currentUser.email}</strong></div>
        <div>Your account ID: <code>${myUid}</code></div>
        <div>Friend-link documents this account can currently see: <strong>${friendLinksData.length}</strong></div>
        ${friendsListenerError ? `<div style="color:var(--bad); margin-top:6px;">Listener error: ${friendsListenerError}</div>` : `<div style="color:var(--good); margin-top:6px;">No listener errors.</div>`}
        ${friendLinksData.length ? `
          <div style="margin-top:8px; font-family:monospace; font-size:0.78rem; white-space:pre-wrap; background:var(--bg-soft, #f5f2ec); padding:8px; border-radius:6px;">${friendLinksData.map(l=>`${l.id} — status:${l.status} requestedBy:${l.requestedBy}`).join('\n')}</div>
        ` : ''}
        <div style="margin-top:8px;">If you just sent a request and its document isn't listed above at all, the write itself didn't happen — check the Send request button for an error message. If it IS listed above but isn't showing in the right section, that's a display bug, not a data problem — let me know the exact line shown here.</div>
      </div>
    </details>`;

  return addFormHtml + incomingHtml + outgoingHtml + acceptedHtml + troubleshootingHtml;
}

/* ---------------- Groups UI ---------------- */
let requestedGroupIds = new Set(); // tracked locally so the button updates instantly after clicking
const NT_START_INDEX = BOOK_LIBRARY.findIndex(b=>b.name==='Matthew');
const OT_BOOK_NAMES = BOOK_LIBRARY.slice(0, NT_START_INDEX).map(b=>b.name);
const NT_BOOK_NAMES = BOOK_LIBRARY.slice(NT_START_INDEX).map(b=>b.name);

function renderGroups(){
  if(!currentUser){
    return `<div class="empty-note">Groups require an account, since they're shared with other people — a Bible study, table, or devotion group. Create an account or log in from the Account tab.</div>`;
  }
  const page = activeGroupId ? renderGroupDetail() : renderGroupsDirectory();
  // "Create a group" is a full-screen, one-question-per-step wizard (Hinge/Tinder-style onboarding)
  // that overlays whatever's already on screen, rather than replacing it — closing partway through
  // (even accidentally) returns you to exactly where you were, with the draft saved for next time.
  return page + renderGroupWizard();
}

const GROUP_WIZARD_STEP_META = {
  basics:     { icon:'plus',     title:"What's your group called?", sub:"Give it a name people will recognize." },
  pace:       { icon:'calendar', title:'How will you read together?', sub:'You can change this later.' },
  paceDetail: { icon:'calendar', title:'Set your pace', sub:'How many chapters should the group read each week?' },
  reading:    { icon:'bookmark', title:'What will you read?', sub:'Pick a preset, or choose specific books below.' },
  sessions:   { icon:'notebook', title:'Build your study guide', sub:'Session by session — what to read, and what to sit with. Members check each one off as they go.' },
  review:     { icon:'check',    title:'Review & create', sub:"Here's what your group will look like." },
};

function renderGroupWizard(){
  if(!groupCreateOpen){ lastRenderedGroupWizardStep = null; return ''; }
  const steps = groupWizardSteps();
  const stepIndex = Math.min(groupWizardStep, steps.length-1);
  const stepId = steps[stepIndex];
  const stepChanged = stepId !== lastRenderedGroupWizardStep;
  lastRenderedGroupWizardStep = stepId;
  const meta = GROUP_WIZARD_STEP_META[stepId];
  return `
    <div class="wizard-overlay open" id="groupWizardOverlay">
      <div class="wizard-card">
        <div class="wizard-topbar">
          <button type="button" class="wizard-close-btn" id="groupWizardCloseBtn" aria-label="Close">${icon('close',18)}</button>
          <div class="wizard-progress"><div class="wizard-progress-fill" style="width:${(((stepIndex+1)/steps.length)*100).toFixed(1)}%"></div></div>
          <span class="wizard-step-count">${stepIndex+1}/${steps.length}</span>
        </div>
        <div class="wizard-body" id="groupWizardBody">
          <div class="wizard-step ${stepChanged?'wizard-step-animate':''}">
            <div class="wizard-step-icon">${icon(meta.icon,26)}</div>
            <h2>${meta.title}</h2>
            <p class="wizard-step-sub">${meta.sub}</p>
            ${renderGroupWizardStepBody(stepId)}
          </div>
        </div>
        <div class="wizard-nav">
          ${stepIndex>0 ? `<button type="button" class="btn" id="groupWizardBackBtn">Back</button>` : `<span></span>`}
          ${stepId==='review'
            ? `<button type="button" class="btn primary" id="groupWizardCreateBtn" ${groupCreateBusy?'disabled':''}>${groupCreateBusy?'Creating…':'Create group'}</button>`
            : `<button type="button" class="btn primary" id="groupWizardNextBtn">Next</button>`}
        </div>
      </div>
    </div>`;
}

function renderGroupWizardStepBody(stepId){
  const errorHtml = groupWizardError ? `<div class="auth-error">${escapeHtml(groupWizardError)}</div>` : '';
  if(stepId === 'basics'){
    return `
      ${errorHtml}
      <div class="auth-field">
        <label for="wizardGroupName">Group name</label>
        <input type="text" id="wizardGroupName" placeholder="e.g. Tuesday Night Bible Study" value="${escapeHtml(groupDraftName)}">
      </div>
      <div class="auth-field">
        <label for="wizardGroupDescription">Description (optional)</label>
        <input type="text" id="wizardGroupDescription" placeholder="What's this group about?" value="${escapeHtml(groupDraftDescription)}">
      </div>`;
  }
  if(stepId === 'pace'){
    return `
      <div class="wizard-choice-list">
        <label class="wizard-choice ${groupDraftPlanMode==='free'?'selected':''}">
          <input type="radio" name="wizardPlanMode" value="free" ${groupDraftPlanMode==='free'?'checked':''}>
          <span><strong>Free pace</strong><br><span class="wizard-choice-sub">Everyone reads the same outline, at their own pace. No calendar, no pressure.</span></span>
        </label>
        <label class="wizard-choice ${groupDraftPlanMode==='paced'?'selected':''}">
          <input type="radio" name="wizardPlanMode" value="paced" ${groupDraftPlanMode==='paced'?'checked':''}>
          <span><strong>Paced schedule</strong><br><span class="wizard-choice-sub">The group moves through the outline together, week by week — good for discussing the same passage on the same week.</span></span>
        </label>
        <label class="wizard-choice ${groupDraftPlanMode==='sessions'?'selected':''}">
          <input type="radio" name="wizardPlanMode" value="sessions" ${groupDraftPlanMode==='sessions'?'checked':''}>
          <span><strong>Guided study</strong><br><span class="wizard-choice-sub">Build the study session by session — each with its reading, and an optional focus question. Works for Bible passages or any book (e.g. <em>Sit, Walk, Stand</em>). Everyone checks sessions off, and progress is visible to the group.</span></span>
        </label>
      </div>`;
  }
  if(stepId === 'paceDetail'){
    return `
      ${errorHtml}
      <div class="auth-field">
        <label for="wizardChaptersPerWeek">Chapters per week</label>
        <input type="number" id="wizardChaptersPerWeek" value="${groupDraftChaptersPerWeek}" min="1" style="width:120px;">
      </div>`;
  }
  if(stepId === 'reading'){
    return errorHtml + renderGroupWizardReadingBody();
  }
  if(stepId === 'sessions'){
    return errorHtml + renderGroupWizardSessionsBody();
  }
  // review
  if(groupDraftPlanMode === 'sessions'){
    const filled = groupDraftSessions.filter(s=>(s.reading||'').trim());
    return `
      ${groupCreateError ? `<div class="auth-error">${escapeHtml(groupCreateError)}</div>` : ''}
      <div class="wizard-review-card">
        <div class="wizard-review-row"><span>Name</span><strong>${escapeHtml(groupDraftName)}</strong></div>
        ${groupDraftDescription ? `<div class="wizard-review-row"><span>Description</span><strong>${escapeHtml(groupDraftDescription)}</strong></div>` : ''}
        ${groupDraftStudyBook ? `<div class="wizard-review-row"><span>Studying</span><strong>${escapeHtml(groupDraftStudyBook)}</strong></div>` : ''}
        <div class="wizard-review-row"><span>Format</span><strong>Guided study &middot; ${filled.length} session${filled.length===1?'':'s'}</strong></div>
      </div>
      <div class="wizard-session-preview">
        ${filled.slice(0,6).map((s,i)=>`<div class="wizard-session-preview-row"><span class="session-num">${i+1}</span> <strong>${escapeHtml((s.title||'').trim() || 'Session '+(i+1))}</strong> &mdash; ${escapeHtml(s.reading)}</div>`).join('')}
        ${filled.length > 6 ? `<div class="wizard-session-preview-row" style="color:var(--ink-soft);">+ ${filled.length-6} more</div>` : ''}
      </div>`;
  }
  const total = outlineTotalChapters(groupDraftBooks.map(b=>({book:b,chapters:chaptersFor(b)})));
  return `
    ${groupCreateError ? `<div class="auth-error">${escapeHtml(groupCreateError)}</div>` : ''}
    <div class="wizard-review-card">
      <div class="wizard-review-row"><span>Name</span><strong>${escapeHtml(groupDraftName)}</strong></div>
      ${groupDraftDescription ? `<div class="wizard-review-row"><span>Description</span><strong>${escapeHtml(groupDraftDescription)}</strong></div>` : ''}
      <div class="wizard-review-row"><span>Pace</span><strong>${groupDraftPlanMode==='paced' ? groupDraftChaptersPerWeek+' chapters/week' : 'Free pace'}</strong></div>
      <div class="wizard-review-row"><span>Reading</span><strong>${groupDraftBooks.length} book${groupDraftBooks.length===1?'':'s'} &middot; ${total} chapters</strong></div>
    </div>`;
}

// The session builder — the heart of the guided-study format. Deliberately three fields per
// session and nothing more: what to read, an optional name, an optional focus/discussion
// question. Enough structure that members see it was put together with intention, not so much
// that building one feels like course authoring.
function renderGroupWizardSessionsBody(){
  if(!groupDraftSessions.length) groupDraftSessions = [blankDraftSession()];
  const rows = groupDraftSessions.map((s,i)=>{
    const passage = detectBiblePassage(s.reading);
    return `
    <div class="wizard-session-row">
      <div class="wizard-session-head">
        <span class="session-num">${i+1}</span>
        <input type="text" id="sessionField-title-${i}" data-session-field="title" data-session-index="${i}" placeholder="Session ${i+1} — title (optional)" value="${escapeHtml(s.title||'')}">
        ${groupDraftSessions.length > 1 ? `<button type="button" class="msg-action-btn" data-remove-session="${i}" aria-label="Remove session">${icon('trash',14)}</button>` : ''}
      </div>
      <input type="text" id="sessionField-reading-${i}" data-session-field="reading" data-session-index="${i}" placeholder='Reading — e.g. "Philippians 1–2" or "Sit, Walk, Stand ch. 1"' value="${escapeHtml(s.reading||'')}">
      ${passage ? `<div class="session-passage-hint">&#10003; Links to ${escapeHtml(passage.book)} ${passage.chapter} in your Bible app</div>` : ''}
      <input type="text" id="sessionField-note-${i}" data-session-field="note" data-session-index="${i}" placeholder="Focus or discussion question (optional)" value="${escapeHtml(s.note||'')}">
    </div>`;
  }).join('');
  return `
    <div class="auth-field">
      <label for="wizardStudyBook">What are you studying? (optional)</label>
      <input type="text" id="wizardStudyBook" placeholder="e.g. Sit, Walk, Stand — Watchman Nee. Leave blank for a Bible study." value="${escapeHtml(groupDraftStudyBook)}">
    </div>
    <div class="wizard-session-list">${rows}</div>
    <button type="button" class="btn" id="addSessionBtn" style="width:100%; margin-top:10px;">${icon('plus',14)} Add session</button>`;
}

function renderGroupWizardReadingBody(){
  const bookCheckbox = name => `
    <label class="book-tile" style="--tile-color:${colorForName(name)}; --tile-soft:${softColorForName(name)};">
      <input type="checkbox" data-group-draft-book="${escapeHtml(name)}" ${groupDraftBooks.includes(name)?'checked':''}>
      <span class="book-tile-name">${escapeHtml(name)}</span>
    </label>`;

  const fq = bookFilterQuery.trim().toLowerCase();
  const matches = name => !fq || name.toLowerCase().includes(fq);
  const otSelected = OT_BOOK_NAMES.filter(n=>groupDraftBooks.includes(n)).length;
  const ntSelected = NT_BOOK_NAMES.filter(n=>groupDraftBooks.includes(n)).length;

  const total = outlineTotalChapters(groupDraftBooks.map(b=>({book:b,chapters:chaptersFor(b)})));
  let summaryHtml;
  if(!groupDraftBooks.length){
    summaryHtml = `<div class="empty-note">No books chosen yet — pick a preset above, or open the list below to choose specific books.</div>`;
  } else if(sameBookSet(groupDraftBooks, BOOK_LIBRARY.map(b=>b.name))){
    summaryHtml = `<div class="reading-summary-line"><strong>Whole Bible</strong> &middot; ${total} chapters total</div>`;
  } else if(sameBookSet(groupDraftBooks, OT_BOOK_NAMES)){
    summaryHtml = `<div class="reading-summary-line"><strong>Old Testament</strong> &middot; ${total} chapters total</div>`;
  } else if(sameBookSet(groupDraftBooks, NT_BOOK_NAMES)){
    summaryHtml = `<div class="reading-summary-line"><strong>New Testament</strong> &middot; ${total} chapters total</div>`;
  } else if(groupDraftBooks.length <= 14){
    summaryHtml = `
      <div class="book-chip-list">
        ${groupDraftBooks.map(name=>`<span class="book-chip">${escapeHtml(name)}<button type="button" class="chip-remove" data-remove-draft-book="${escapeHtml(name)}" aria-label="Remove ${escapeHtml(name)}">${icon('close',12)}</button></span>`).join('')}
      </div>
      <div class="reading-summary-line">${total} chapters total</div>`;
  } else {
    summaryHtml = `<div class="reading-summary-line"><strong>${groupDraftBooks.length} books selected</strong> &middot; ${total} chapters total</div>`;
  }

  return `
    <div class="reading-preset-row">
      <button type="button" class="btn small" id="pickWholeBible">Whole Bible</button>
      <button type="button" class="btn small" id="pickOT">Old Testament</button>
      <button type="button" class="btn small" id="pickNT">New Testament</button>
      ${groupDraftBooks.length ? `<button type="button" class="btn small" id="pickNone">Clear</button>` : ''}
    </div>
    ${summaryHtml}
    <details class="book-picker-details" ${bookPickerOpen ? 'open' : ''}>
      <summary>Choose specific books</summary>
      <div class="book-picker-body">
        <input type="text" id="bookFilterInput" placeholder="Filter books…" value="${escapeHtml(bookFilterQuery)}">
        <div class="book-picker-section">
          <div class="book-picker-section-label">Old Testament (${otSelected}/${OT_BOOK_NAMES.length})</div>
          <div class="book-picker">${OT_BOOK_NAMES.filter(matches).map(bookCheckbox).join('') || `<div class="empty-note-inline">No matches.</div>`}</div>
        </div>
        <div class="book-picker-section">
          <div class="book-picker-section-label">New Testament (${ntSelected}/${NT_BOOK_NAMES.length})</div>
          <div class="book-picker">${NT_BOOK_NAMES.filter(matches).map(bookCheckbox).join('') || `<div class="empty-note-inline">No matches.</div>`}</div>
        </div>
      </div>
    </details>`;
}

function renderGroupsDirectory(){
  const q = groupSearchQuery.trim().toLowerCase();
  // The search box only appears on the Discover tab, so it only filters Discover — My Groups
  // always shows everything you've joined, regardless of whatever was last typed in that box.
  const mine = groupsDirectory.filter(g=> myGroupIds.includes(g.id));
  const discover = groupsDirectory.filter(g=> !myGroupIds.includes(g.id) && (!q || g.name.toLowerCase().includes(q)));

  const groupCard = g => {
    const isMember = myGroupIds.includes(g.id);
    const requested = requestedGroupIds.has(g.id);
    let actionHtml;
    if(isMember) actionHtml = `<button class="btn small primary" data-open-group="${g.id}">Open</button>`;
    else if(requested) actionHtml = `<span class="pending-note">Requested</span>`;
    else actionHtml = `<button class="btn small" data-request-join="${g.id}">Join</button>`;

// ---- Reading streaks + consistency heatmap (v31 "beyond basic" dashboard) ----
// A "reading day" = any completed plan chapter OR any outside-plan chapter logged for that date.
// The current streak forgives an unread TODAY (you haven't fallen behind until the day is over),
// but breaks on any fully-missed day before that.
function readingDaySet(){
  const days = new Set(state.log.filter(e=>e.status==='complete').map(e=>e.date));
  state.extraLog.forEach(e=> days.add(e.date));
  return days;
}
function isoShift(base, deltaDays){
  const d = new Date(base.getFullYear(), base.getMonth(), base.getDate() + deltaDays);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function readingStreaks(){
  const days = readingDaySet();
  const today = new Date();
  let current = 0;
  let offset = days.has(isoShift(today,0)) ? 0 : -1; // today not read yet ≠ broken streak
  while(days.has(isoShift(today, offset - current))) current++;
  // Longest run anywhere in history: walk the sorted unique days, counting consecutive dates.
  const sorted = Array.from(days).sort();
  let longest = 0, run = 0, prevKey = null;
  sorted.forEach(day=>{
    const [y,m,dd] = day.split('-').map(Number);
    const key = Date.UTC(y, m-1, dd) / 86400000;
    run = (prevKey !== null && key - prevKey === 1) ? run + 1 : 1;
    longest = Math.max(longest, run);
    prevKey = key;
  });
  return { current, longest };
}
function renderActivityHeatmap(){
  const counts = {};
  state.log.filter(e=>e.status==='complete').forEach(e=>{ counts[e.date]=(counts[e.date]||0)+1; });
  state.extraLog.forEach(e=>{ counts[e.date]=(counts[e.date]||0)+1; });
  const today = new Date();
  const cells = [];
  for(let i=83; i>=0; i--){
    const iso = isoShift(today, -i);
    const n = counts[iso]||0;
    const lvl = n===0 ? 0 : n<=1 ? 1 : n<=3 ? 2 : 3;
    cells.push(`<span class="hm-cell hm-${lvl}" title="${fmtDate(iso)}: ${n} chapter${n===1?'':'s'}"></span>`);
  }
  return `
    <div class="settings-box" style="max-width:none;">
      <h3>${icon('chart',16)} Consistency &mdash; last 12 weeks</h3>
      <div class="hm-grid">${cells.join('')}</div>
      <div class="hm-legend"><span>Less</span><span class="hm-cell hm-0"></span><span class="hm-cell hm-1"></span><span class="hm-cell hm-2"></span><span class="hm-cell hm-3"></span><span>More</span></div>
    </div>`;
}
function renderDashboard(){
  const uniqueChapters = new Set(state.log.filter(e=>e.status==='complete').map(e=>e.book+'|'+e.chapter));
  const totalPassesAcrossAll = ACTIVE_CATEGORIES.reduce((s,c)=>s+(state.cycles[c.id]||0),0);
  const yearInReview = renderYearInReview();
  const monthlySummaries = renderMonthlySummaries();
  const totalCompleteCount = state.log.filter(e=>e.status==='complete').length;
  const coveragePct = Math.round(uniqueChapters.size/BIBLE_TOTAL_CHAPTERS*100);
  // Guided-study sessions you've checked off across all your groups (mirrored into state by
  // toggleSessionDone, so this needs no live group listeners to count).
  const groupSessionsTotal = Object.values(state.groupSessionsDone||{}).reduce((s,n)=>s+(Number(n)||0),0);
  const streaks = readingStreaks();
  // data-count-key/data-count-to feed animateDashboardMetrics() (see JS above) — it compares the
  // target against whatever value it last saw for that key and, if it actually changed, plays a
  // quick count-up instead of the number just silently being different on the next render.
  const summary = `
    <div class="dash-summary">
      <div class="stat"><div class="num"><span data-count-key="currentStreak" data-count-to="${streaks.current}">${streaks.current}</span> day${streaks.current===1?'':'s'}</div><div class="label">Current reading streak</div></div>
      <div class="stat"><div class="num"><span data-count-key="longestStreak" data-count-to="${streaks.longest}">${streaks.longest}</span> day${streaks.longest===1?'':'s'}</div><div class="label">Longest streak ever</div></div>
      <div class="stat"><div class="num"><span data-count-key="uniqueChapters" data-count-to="${uniqueChapters.size}">${uniqueChapters.size}</span> / ${BIBLE_TOTAL_CHAPTERS}</div><div class="label">Unique chapters read at least once</div></div>
      <div class="stat"><div class="num"><span data-count-key="coveragePct" data-count-to="${coveragePct}">${coveragePct}</span>%</div><div class="label">Whole-Bible coverage</div></div>
      <div class="stat"><div class="num" data-count-key="totalCycles" data-count-to="${totalPassesAcrossAll}">${totalPassesAcrossAll}</div><div class="label">Total category cycles completed</div></div>
      <div class="stat"><div class="num" data-count-key="totalComplete" data-count-to="${totalCompleteCount}">${totalCompleteCount}</div><div class="label">Chapters logged complete (all-time)</div></div>
      ${groupSessionsTotal ? `<div class="stat"><div class="num" data-count-key="groupSessions" data-count-to="${groupSessionsTotal}">${groupSessionsTotal}</div><div class="label">Group study sessions completed</div></div>` : ''}
    </div>`;

  // Per-category book progress starts COLLAPSED (the summary tiles above stay visible) — these
  // lists are what made the dashboard a scroll marathon. Native <details> handles the toggle;
  // dashOpenSections remembers which ones you've opened so the constant full-DOM re-renders
  // (count-up ticks, background syncs) don't snap them shut again mid-look.
  const blocks = ACTIVE_CATEGORIES.map(cat=>{
    const stats = bookStats(cat);
    const catCycle = state.cycles[cat.id]||0;
    const catPct = Math.round((state.cursors[cat.id]||0)/cat.total*100);
    const rows = stats.map(b=>`
      <div class="book-row">
        <div>${b.name}</div>
        <div class="bar-track"><div class="bar-fill" data-bar-key="${cat.id}:${b.name}" style="width:${b.progress}%; background:${cat.color};"></div></div>
        <div class="passes-badge" title="Times fully completed this cycle count">${b.passes}&times; read</div>
        <div style="text-align:right; color:var(--ink-soft);">${b.progress}%</div>
      </div>`).join('');
    return `
      <details class="cat-block dash-collapse" data-dash-section="${cat.id}" ${dashOpenSections.has(cat.id)?'open':''}>
        <summary>
          <h3><span class="swatch" style="background:${cat.color}"></span>${cat.name}</h3>
          <span class="cat-sub">Cycle ${catCycle+1} &middot; ${catPct}% through current pass</span>
          <span class="dash-collapse-chevron">${icon('back',14)}</span>
        </summary>
        ${rows}
      </details>`;
  }).join('');

  return yearInReview + summary + renderActivityHeatmap() + renderCheckinHistoryCard() + monthlySummaries + blocks;
}
// Which dashboard category sections are expanded — session-scoped on purpose: every visit starts
// clean and collapsed (that's the anti-scroll design), it only needs to survive re-renders.
let dashOpenSections = new Set();

// ---- Generic "stay open across re-renders" for <details> ----
// render() rebuilds the whole DOM constantly (keystrokes, timers, background syncs), which
// silently reset every native <details> back to its default state — this is exactly the reported
// "Consider Him commentary collapses on its own" and "invite link auto-collapses" bugs. Any
// details carrying data-keep-open="key" now records toggles here and re-renders with the state
// the user last chose (falling back to its declared default the first time).
let detailsOpenState = new Map();
function keepOpenAttrs(key, defaultOpen){
  const open = detailsOpenState.has(key) ? detailsOpenState.get(key) : !!defaultOpen;
  return `data-keep-open="${key}" ${open?'open':''}`;
}

// The check-in itself only ever showed a single line for whichever date you had open ("You logged
// today's walk as…") — once a day passed, that answer had nowhere to actually surface again, which
// read as "it's not being logged anywhere." This makes the history visible without building a full
// chart: a plain two-week strip, oldest to newest, with a dash for any day nothing was logged.
function renderCheckinHistoryCard(){
  if(!state.checkins.length) return '';
  const days = [];
  for(let i=13;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));
  }
  const items = days.map(iso=>{
    const c = checkinFor(iso);
    const [y,m,dd] = iso.split('-').map(Number);
    const weekday = new Date(y,m-1,dd).toLocaleDateString(undefined,{weekday:'narrow'});
    return `<div class="checkin-history-item" title="${fmtDate(iso)}${c ? ': '+CHECKIN_LABELS[c.value] : ''}">
      <div class="d">${weekday}</div>
      <div class="v ${c?'answered':''}">${c ? CHECKIN_LABELS[c.value] : '&ndash;'}</div>
    </div>`;
  }).join('');
  return `
    <div class="settings-box" style="max-width:none;">
      <h3>Spiritual check-in &mdash; last 14 days</h3>
      <div class="checkin-history-row">${items}</div>
    </div>`;
}

/* ---------------- Events ---------------- */
// The min-height:100dvh fix (see body{} above) stops the bottom nav from jumping due to the
// browser's address-bar chrome differing between a short tab and a tall one. But that's only half
// of the "nav bar pops when switching to tabs with less content" bug: if you'd scrolled partway (or
// all the way) down a tall tab and then tap over to a short one, the page's scrollable height
// shrinks out from under the browser's existing scroll position, and the browser has to forcibly
// snap scrollTop back down to the new (smaller) max — THAT snap, on top of the address bar
// re-expanding because the new content no longer justifies staying collapsed, is what reads as a
// visible pop/jump. Resetting scroll to the top ourselves, before the new tab's shorter content
// ever gets a chance to force that snap, removes the jump instead of just reacting to it.
function scrollAppToTop(){
  if(typeof window !== 'undefined' && window.scrollTo) window.scrollTo(0, 0);
  if(typeof document !== 'undefined' && document.body) document.body.scrollTop = 0;
  if(typeof document !== 'undefined' && document.documentElement) document.documentElement.scrollTop = 0;
}
// Shared by the desktop top-tab nav, the mobile bottom nav, and the mobile "More" sidebar — all
// three ultimately just switch activeTab, so they share one handler instead of three copies.
function switchToTab(tabId){
  activeTab = tabId;
  sidebarOpen = false;
  ownProfileOpen = false;
  if(viewedProfileUid) closeViewedProfile();
  // Warm both sub-tabs' caches the moment Community opens, so switching between Friends/Groups
  // (or typing in either one's search box) feels instant rather than waiting on a fetch.
  if(activeTab === 'community'){
    loadFriendDirectory();
    loadCommunityFeed();
    if(!activeGroupId) loadGroupsDirectory();
  }
  scrollAppToTop();
  render();
}

          // Center-crop to a square, then downscale to a small fixed size — keeps every photo
          // roughly the same (small) footprint in Firestore regardless of what the user uploads.
          const SIZE = 200;
          const canvas = document.createElement('canvas');
          canvas.width = SIZE; canvas.height = SIZE;

          const side = Math.min(img.width, img.height);
          const sx = (img.width - side) / 2;
          const sy = (img.height - side) / 2;
          ctx.drawImage(img, sx, sy, side, side, 0, 0, SIZE, SIZE);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.72);
          if(dataUrl.length > PROFILE_PHOTO_MAX_LEN){
            profilePhotoError = 'That photo is too large even after compressing — try a different one.';
            render();
            return;

          updateProfilePhoto(dataUrl);

  const msgEditSaveBtn = document.getElementById('msgEditSaveBtn');
  if(msgEditSaveBtn && activeGroupData) msgEditSaveBtn.addEventListener('click', ()=> saveEditedGroupMessage(activeGroupData.id));
  const msgEditCancelBtn = document.getElementById('msgEditCancelBtn');
  if(msgEditCancelBtn) msgEditCancelBtn.addEventListener('click', ()=> cancelEditGroupMessage());
  const msgEditInput = document.getElementById('msgEditInput');
  if(msgEditInput && activeGroupData){
    msgEditInput.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ e.preventDefault(); saveEditedGroupMessage(activeGroupData.id); }
      else if(e.key === 'Escape'){ e.stopPropagation(); cancelEditGroupMessage(); }
    });
  }
  if(groupMessageInput && activeGroupData){
    groupMessageInput.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        if(mentionDropdownOpen){
          const matches = mentionMatches();
          if(matches.length){ selectMention(matches[0].uid); return; }
        }
        sendGroupMessage(activeGroupData.id, groupMessageInput.value);
      } else if(e.key === 'Escape' && mentionDropdownOpen){
        closeMentionDropdown(); render();
      }
    });
  }
  document.querySelectorAll('[data-mention-uid]').forEach(btn=>{
    btn.addEventListener('click', ()=> selectMention(btn.dataset.mentionUid));
  });
  document.querySelectorAll('[data-set-role]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [uid, role] = btn.dataset.setRole.split('|');
      if(activeGroupData) setMemberRole(activeGroupData.id, uid, role);
    });
  });
  document.querySelectorAll('[data-remove-member]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!activeGroupData) return;
      customConfirm('Remove this member from the group?', { confirmLabel:'Remove', danger:true }).then(ok=>{
        if(ok) removeGroupMember(activeGroupData.id, btn.dataset.removeMember);
      });
    });
  });
  document.querySelectorAll('[data-approve-request]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [uid, name] = btn.dataset.approveRequest.split('|');
      if(activeGroupData) approveJoinRequest(activeGroupData.id, uid, name);
    });
  });
  document.querySelectorAll('[data-decline-request]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(activeGroupData) declineJoinRequest(activeGroupData.id, btn.dataset.declineRequest);
    });
  });
}

// A group invite link looks like ?joinGroup=<groupId>&code=<inviteCode>. Captured once at load;
// consumed (and stripped from the URL) the moment we know whether someone's signed in — if not,
// a banner prompts sign-in/signup first and the join happens automatically right after.
let pendingGroupInvite = null;
(function(){
  try{
    const params = new URLSearchParams(window.location.search);
    const gid = params.get('joinGroup'), code = params.get('code');
    if(gid && code) pendingGroupInvite = { groupId: gid, code };
  }catch(e){}
})();

// ---- Global keyboard shortcuts ----
// Registered exactly once here (NOT inside attachEvents(), which reruns on every render() call —
// adding a document-level listener there would stack a fresh duplicate on every single render).
// Cmd/Ctrl+K opens the quick-jump command palette from anywhere; Escape backs out of whichever
// overlay is currently on top (palette, then dialog, then the group-create sheet, then the
// notification panel, then the mobile "More" sidebar), matching how these layers actually stack
// visually (see their z-index values).
if(typeof document !== 'undefined' && document.addEventListener){
  document.addEventListener('keydown', (e)=>{
    if((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')){
      e.preventDefault();
      openCommandPalette();
      return;
    }
    if(e.key === 'Escape'){
      if(commandPaletteOpen){ closeCommandPalette(); return; }
      if(activeDialog){ closeDialog(activeDialog.mode==='confirm' ? false : null); return; }
      if(groupCreateOpen){ groupCreateOpen = false; render(); return; }
      if(shouldShowGate() && authView === 'signup'){ forceShowGate = false; authView = 'login'; authError=''; authWizardError=''; render(); return; }
      if(notifPanelOpen){ notifPanelOpen = false; render(); return; }
      if(extraReadingSheetOpen){ extraReadingSheetOpen = false; render(); return; }
      if(ownProfileOpen){ ownProfileOpen = false; profileEditMode = false; render(); return; }
      if(sidebarOpen){ sidebarOpen = false; render(); return; }
    }
  });
}

// ---- Same-day rollover ----
// selectedDate (and therefore the check-in prompt/"Today" cards) is only ever set once, when the
// script first loads — a PWA left open overnight (very normal; phones background apps rather than
// quitting them) never re-evaluates what "today" actually is on its own. That's what made the
// check-in look like it "doesn't reset daily": if you'd already answered for the date the app
// happened to load on, it kept showing that same answered date's acknowledgement forever, even
// after midnight had genuinely passed. This checks whenever the app becomes visible again (the
// natural moment a rollover would matter) and advances selectedDate — but only if you were already
// sitting on "today" and hadn't deliberately navigated to a past date, which stays exactly where
// you left it.
let knownTodayStr = todayStr();
function checkForDateRollover(){
  const current = todayStr();
  if(current === knownTodayStr) return;
  const wasOnToday = selectedDate === knownTodayStr;
  knownTodayStr = current;
  if(wasOnToday){ selectedDate = current; checkinEditing = false; }
  render();
}
if(typeof document !== 'undefined' && document.addEventListener){
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState === 'visible') checkForDateRollover(); });
}
if(typeof window !== 'undefined' && window.addEventListener){
  window.addEventListener('focus', checkForDateRollover);
}
// Belt-and-suspenders for embedded/webview contexts where visibility/focus events can be
// unreliable (some in-app browsers, some Capacitor configurations) — cheap enough to just poll.
if(typeof setInterval !== 'undefined') setInterval(checkForDateRollover, 60000);

refreshNotifStatus();
render();
initFirebase();
// The native splash screen (see capacitor.config.json: launchAutoHide is off) stays up until this
// fires, so the very first thing a person sees on iOS is a finished screen, not a half-built one —
// a no-op on GitHub Pages/any regular browser since capacitorPlugin() finds nothing there.
hideCapacitorSplash();
// Safety net for the web splash (see hideAppSplash): every real code path already clears it —
// firebase missing, a placeholder config, an init error, or a normal auth-state callback — but if
// something upstream hangs entirely, don't leave the app stuck behind the splash forever.
setTimeout(hideAppSplash, 4000);

/* ---------------- Service worker registration (installable + offline) ---------------- */
if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{ /* ignore, app still works without it */ });
  });
}
</script>
